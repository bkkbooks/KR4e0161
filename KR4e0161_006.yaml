body:
  text: 竹澗集卷六明潘希曽撰序二十六首秋日寫懷詩序詩三百篇尚矣而非必始諸此也歌非必始諸虞謡非必始諸堯之時則詩也者古今人心之形也謂詩始諸心可也是故觀乎其詩可以知其人矣古人發泄性情矢口而成抑揚短長協而成聲皆不得已而鳴非如後世規規為之者自楚騷一變為漢魏古詩再變以極于唐律若蘇子卿陶靖節少陵昌黎諸君子名節志義鬱中發外卓然名家矣學之者或不得其心其有至焉者鮮矣草窗童廷瑞先生以秋官大夫請老一日過余出其使蜀時秋日寫懷詩若干首屬引數語余三復而歎曰是雖託于唐音何其善鳴性情也抑將有鬱于中如昔之君子乎何以至是也先生讀書三十年逾四十筮仕未六十即角巾林下將必有鬱焉者乎詩始諸心請質之先生閒庵詩序閒庵潘翁徽之隱君子也其居在婺源山谷間有田園之饒泉石之美竹樹蔭翳魚鳥上下翁樂之可以忘老日惟携琴杖藜命酒賦詩或課子弟讀古人書優游卒歲他無復事事因自號閒庵云𢎞治壬戌子珍玉卿舉進士大夫士與游者胥為賦之既成帙屬序於豫乃有感焉余郡二守玉汝先生者翁從子也其心亷而靜其政平而裕余昔從游也久乃今與玉卿為同年復見其有兄之風豈文獻舊邦士之生乎其間者類多賢耶抑家傳爾耶世之擾擾匆匆以沒齒者何限翁獨自處於閒賢於人逺矣其子若姪克世其德以效于用顧豈無以哉余聞作德心逸見大心泰逸且泰而後天下之物不足以撓吾斯閒矣是雖居官致理可也獨隱居也哉昔老莊以虛無為閒禍天下者也巢由以離遁為閒遺天下者也翁之閒適乎理趣要非異端者流而佳子姪又推之以協贊皇化視彼一於遺世者孰優耶余方慶世之太平無事而翁之庵之得以終於閒也是亦諸賦詩者意也三覲圖稿序二守婺源潘先生往者以名進士令湖之蘄水循例凡三入覲朝廷凡三錫敕諭先生祗若休命既終厥功間嘗謄黃成帙仍繪見賀辭三圖于首而以當時諸紀行詩附焉總題曰三覲圖稿闕廷想像于丹青綸綍昭回乎簡册而大篇之舂容短章之寂寥具見其感時撫事之實近以示某俾序之豫見近世為縣令有能稱者一再入覲率被徵書取顯官去之惟恐弗亟乃若久任而後遷既遷而不忘其初在行役無獨賢之歎慕君而終身焉者不其尤難哉先生清節惠政茂著蘄陽直以情性冲淡亷於取名故三載一覲覲且至于三而當路未之甚異也久之序遷今官或將熱中焉先生方懼弗稱手録敕文朝夕披閲蓋將推其作縣者以倅郡大其惠蘄者以惠吾婺也其冠以圖者所以繫其戀闕之忱而附之詩者又以歌詠其勤苦焉若先生者可謂篤於忠愛矣抑詩言志凡誦子美詩者必憐其忠也先生諸詩發乎心聲之自然是以詞氣蕭散興寄悠逺有感慨而無怨尤焉要當與知杜者論然後信余言之非誇而先生之平生庶乎可識矣送武義令劉引之入覲序今天下司府州縣之長率三載一入覲朝廷察其治行而勸懲加焉其事與古之述職試功一也縣親民而屬府𨽻司司府之令必由縣以下於民簿書叢委催科不息聽斷無虛日而送迎疲道路猾胥奸民窺伺舞弄而上之人又從而掣其肘令之職蓋其難矣吾婺為江南劇郡凡領縣八其間號難治莫如武義彭城劉引之令武義之三年當入覲其僚屬請余言贈之初君受命闕下余獲傾蓋焉觀其器宇宏深言論慷慨真有豐沛豪傑之氣非若拘拘章句儒者固已知君之才不患其難矣自下車來果能沛然處之刑簡政清徭均賦足强者服慝者革聲實流布而上下安之余然後歎縣無難易視令為難易令無難易視人品為難易抑又自信管窺之無謬也君行涉赤墀覲天顔吏部考績與天下循良吏當無多讓朝廷三考陟明具有成憲亦且還君以終惠其民矣二三君子奚用悵兹别哉於其請姑道余之嘗知君者以觀其成贈潘守固授陰陽正術序金華潘守固拜郡之陰陽正術正術亦流官也而行縣視事不出鄉郡人皆華之士君子與游者且喜其學見用也友人陳正之屬豫贈言惟聖人開物成務莫大乎陰陽理與數非二物也後世泥於術數而吾儒燮理之用漫不之省司馬遷父子論六家之指遂以儒與陰陽並列則世儒之不道陰陽陰陽家者之不得自附於儒非一日矣堯命羲和主厯象而庶績熙舜命重黎司地天而人心正周以太史正歲年卜日馮相氏掌歲月辰日二十有八星之位保章氏辨吉凶觀妖祥降豐荒之祲象而六典始備是皆具乎吾儒之書而陰陽之為說卒莫能外焉乃若忌諱之拘畏妖誕之降格祿命風角之禍福泯泯棼棼偏泥乖隔彼陰陽者豈端使然哉今京師欽天有監諸郡邑陰陽有學小大執事皆務得人以稱國家稽古若天之意守固推於鄉舉於有司受秩於銓曹以歸其知厥職矣乎律有瀆神明事邪術妄言禍福之條非獨法吏之所當知也守固其嘗考之乎夫職茍思稱則雖抱關擊柝不可輕道茍可以行則固不必發䇿决科橫金紆紫而後為快守固通儻喜文儒其知所從講久矣其能本之經參之律以效厥官也審矣儒者燮理之用雖未可輕語而明夫人以息邪慝於一方亦深有望焉余既重陳請又嘉守固不徒幸鄉人之華而將無負乎士君子之喜也乃為之言贈福建僉憲婺源潘公序今天子嗣大厯服萬邦奔走稱賀吾金華則婺源潘公以别駕至公未至旬日天子特簡命為閩憲僉事方兹拜表成禮將奉敕之新任凡吾鄉之仕于朝者喜其來而榮其行胥圖所以贈或曰公讀書起家進士厯郡縣凡幾書最有文學有政事賢勞二十餘年所至不挈家尤有清苦之節是以不近名而名自隨不狥人而人自知聖王御宇首膺顯陟縉紳士罔不竦聽改觀蓋公之被遇於斯為盛而其所樹立亦至此而有徵是則可慶也已余曰以是慶公非公所慶也士君子生天地間要自有所樹立而遇不遇所性弗存焉惟夫生于其鄉而風流習染之有自仕于其邦而興起持循之有地則固其所深願而不可得兼者婺源朱子闕里也其山川清淑之氣磅礴而無窮故家遺俗文獻可考公育秀其間沾溉膏馥不啻孟軻氏近聖人之居而私淑焉者矧今往按全閩又親履其講學過化之地當時武夷諸精舍與考亭諸書院而今尚無恙否其為政規模布在同安其施諸臨漳者尤詳不識甘棠猶蔽芾否其所料簡諸書在經史閣所刋四經四子在漳郡視今世所行書亦有可參互否公於是重有感焉則所謂生於其鄉而風流習染之有自仕于其邦而興起持循之有地兼得之矣仕優而學則古今考驗皆有定見而體者益明學優而仕則施為依據皆有成法而用者益大昔朱子不遇於時未究其用公其將遇於今而益𢎞厥施矣乎夫如是亦不足慶乎或曰誠哉子之言第有一焉公之佐吾郡于兹八年吾民之德公亦與日積一旦奪公以去而吾黨顧為是言如吾鄉吾民何於是相顧憮然若有不能不介于懷者請書以為公慶而并以識吾私贈進士陳君正之授瀏陽令序有地百里而為之長今之令尹猶古之子男爾古者民淳事簡諸侯各君其國各子其民所為達於天子不過六年一述職十二年一巡狩而已故其勢易後世民僞日滋文移旁午農桑學校賦役獄訟盜賊之務去古奚啻什百而縣領於郡𨽻於監司風㫖意向稍有異同即不能以自達故其勢難故事大縣非名進士不輕任及任而著政績有旌異有徵取尋進而職部臺髙官膴仕自此升矣士由進士宰百里膺簡任而負期待有子男之國而處其所不易此其官豈不貴而道豈不可行哉進士陳君正之令湖之瀏陽或曰龎士元非百里才蔣琬為廣都衆事不治蓋才大難為用而清廟之器或非窮鄉下邑所宜以正之宰瀏陽交游私惜之余謂不然古之君子體具用周而無所擇於官後之君子學力弗逮而資禀用事故有能有不能矧一邑者天下之式經濟之士固宜究心者也彼卑之而不屑為易之而不思所以為者皆非也正之碩學逺抱有通敏才蓋知令之不可易而盡心厥職者他日湖南稱循吏第一必吾正之也臺端拜監察御史有入自湖南者必吾正之也正之先大父憲使公文學政事有名于時先君憲副公實同朝焉而余於正之學同業仕同時契好厚矣於其别宜不能無惜若其被命出宰蓋將為朝家得人慶為一方得父母慶而奚以惜也正之明年當述職再逾年當被徵書官內臺所為相過從相砥礪以協贊太平吾黨可翹足待則其别又奚以惜也於是崇酒載肉相與祖餞之且以斯言諗之正之以為何如送蔣廷元遊南雍序丹陽蔣廷元應貢至京既廷試將卒業南雍同官湯君仁甫謂余曰廷元吾友也吾宦游諸鄉人圖贈之言以壯其行以朂其有成子知我者雖未知廷元願為我一言廷元世儒家兼邃軒岐之術或以醫顯或以儒仕凡十三四傳而姓益著廷元又蔣氏佳子弟也種學績文有志當世雖場屋數竒而不怨不怠今方游南雍友天下士以博其所見聞而要其所成立其所存可知已今世士如廷元子茍知之雖弗吾以猶將喜稱焉而顧獨吾靳哉余惟范文正公有言大丈夫不作宰相當作明醫以活天下則醫與儒非二道也儒之用調燮元化整齊庶政而民得其所醫之用護植元氣攻劫衆疾而身得其安顧其事有大小功有廣狹而所為利于物者豈有二乎哉古之人急於利物故不得為宰相寧願為明醫彼為宰相而不足以濟世固不若為明醫而足以濟人之為愈也廷元之於醫余不知其得於家廷者何如而獨種學績文有志當世蓋亦舍其小者狹者以就其大者廣者至於場屋數竒不為世用謂宜反求諸醫以姑酬其利物之心可矣乃確有定守而得失利鈍不一動其中輕數千里來貢京師又輕數千里往游南雍觀其志若將必得其願欲而後已者余聞貧賤憂戚天所以玉其成而古人當大任往往出於勞苦拂鬱之境他日收晚成之功以𢎞醫國之用者安知不在廷元耶傳曰三折肱知為良醫又於廷元之行卜之送進士徐君朝儀序皇上敕禮部采輯中外事蹟修先朝實録禮部請簡有學行進士分遣天下於是永康徐朝儀使池廬諸郡大夫士知朝儀者咸榮之瀕行徵余言贈之余惟君子處世必有出乎人之所難而後能擅夫人之所榮斯其可榮者在我而外物之烜赫不與焉夫自成周賔興之法易後世得人莫盛於進士一科士由庠序舉於鄉升於春官而後進於天子之廷率千百之什一其選既精則其才愈難而進士於是乎榮於人人孔子謂誦詩三百不能專對雖多亦奚以為而先王遣使臣必曰每懷靡及曰周爰咨諏蓋宣德達情非有用之學鮮不辱君命者其事既難則其遣不輕而使命於是乎榮於人人若夫史氏之學世又孰不榮之亦孰不難之昔司馬遷以不羈之才足跡殆遍天下網羅放失考論行事卓然成一家言而後之君子猶或病之然而卒無以及之者史固豈易哉朝儀學舉進士才堪史命而是行也訪求采托實與史氏之責焉所謂必有出乎人之所難而後能擅夫人之所榮者朝儀有焉雖然難事之在人無窮而榮名之加已未可以遽足故以自强不息為德業不尤難歟以令聞廣譽為文繡不尤榮歟是固吾儒所為無待於外者而朝儀所自勉也彼恆情之所榮而衆人之所難抑又其餘也朝儀余益友鄉舉同年故因大夫士之榮其行也為之申其說而復以其至者望之贈平原令李仲實序遷安李仲實以鄉進士分教欣州既考最擢山東平原令同官王君汝溫一日告余而屬為贈言余未嘗傾蓋仲實而知王君實深君端人也取友必端故弗辭為之言竊惟循吏之賴于民關于治理不為輕矣始傳班史者龔黃諸守相而已再傳范史而後荀陳諸令長有聞焉豈古之時為吏者多循故難指名而先漢之時為令者猶多循故未可一二舉耶夫親民者莫如守而於民最親者莫如令守與令未有能輕重之也顧為守者崇以專而為令者卑以詳惟卑也則張弛舉措恆見掣肘惟詳也則詳者覽者答者判者智揣者心計者又往往不暇給守令之難易於是乎有間哉平原古齊郡地夫子謂其一變至魯再變乃能至道蓋自太公之教壞於管仲而夸詐餘習至漢猶不變今欲變而之道其難易未知視昔何如夫令不易稱也平原不易治也畀以不易稱之職而委之不易治之地朝廷待仲實者甚不易也仲實其易之耶其將沮於其不易耶昔者劉寵令平陵民懷其仁韓韶為嬴長賊相戒不入境嬴與平陵皆咫尺平原而二子者固登名循吏者也今仲實職似地鄰古今人豈必不相及也雖然二子未聞道也未及乎儒也儒之用不但如循吏而已也余聞仲實儒者其聞道久矣往教欣州士多化之今推以治平原也民獨不然乎余方慶齊之俗將變而之道也他日史氏傳之與漢之循吏並俾天下後世知循吏足以安民息冦而聞道者化民成俗也不其盛哉仲實其毋迂吾言壽封君王翁序天地久長之氣得之則壽故物有松柏龜鶴而人有耆老耄耋然物無知而人有欲物茍壽焉斯已矣人幸而壽則非富不養非貴不榮非逸不樂必兼得而無遺焉然後能足其願欲故天之於物也易為功而於人也難為力昔者楚邱垂老不免於貧賤季子位髙金多而不終帝堯憂壽多辱憂富多事周大夫有位而歎賢勞豈非造物無全功而事固不能盡如意耶故人之願欲壽考而享富貴逸樂而無所係纍者古人不可得而兼矣世之君子於古人之不可得兼者而或得焉獨非所值之至幸者乎吾婺封刑部主事王翁壽躋六十子銓秉衡以繫官京師未遂歸寧乃屬余言將寓歸為壽余違鄉未久念翁往時矍鑠喜徒步目瞳漸方色若孺子雅歌投壺終日對賔客弗倦有以知翁之壽蓋未艾也翁諸子賢而克家秉衡以清才粹學致身天朝用是家纍千金而竒贏㑹計之務一無所與跬步未始出鄉井而封官如其子所謂壽考而享富貴逸樂而無所係纍余方為翁喜幸羡慕之不暇亦復何言雖然天不可必而在人者可必聖賢或不得其常而君子惟語其常翁天性孝友與物無忤讀書樂善以義方成諸子古所謂鄉先生者翁其人也則夫得全於天而足其所願欲蓋有德集福之驗也他日逍遙上壽而子之榮養益致其極皆理之可卜者請以是壽翁并為翁祝且用告鄉之人俾登堂觴翁者不徒幸其得於天而深慕其有諸已焉亦或錫類之一助也贈湖州太守何侯序古者天子所與分國而治者有諸侯焉後世罷侯置守而良二千石實與天子共理世稱郡守古侯伯信矣然周之時大國不過百里其次七十或五六十今天下百里之制皆縣也郡之制其為縣凡幾也此小大之勢也聖人久於其道而天下化成而今之從官者易地而治計日而遷視彼世守其國以服習其民者果孰難易耶夫以郡守之貴與諸侯等且勢大而時難君子之立乎其位茍非志定而才副者孰能不奪於富貴而使德澤加於民聲實流於人哉湖守何侯奏績京師同官陳聲伯謂余曰侯閩人舉進士歷官兩京守吾湖且三載其度廓然以宏其德溫然以厚其政平易而規法不廢故民樂而安之臺臣嘗薦于朝天官卿兹復書最蓋不惟湖人德之而當路亦知之舉朝皆信之乃今旋斾吾湖吾幸湖之人獲終惠也余聞而歎曰是所謂志定而才副者非耶何其德澤如此聲實如此不奪於富貴如此士方窮時以勳名自期慷慨發憤真若可致洎其得志往往汩沒於聲利而卒無以表見於世或者有立而弗逮不能用大而濟斯則志才不足之過也以侯之所樹立卓卓若此其志與才過人逺矣即使由郡國而推之藩服由藩服而推之天下又惡有弗勝者哉古之諸侯入為王朝公卿漢三公擢自守相是亦今日朝廷用人之典也聲伯欣然應聲曰吾固以是望侯矣願屬筆為侯贈王氏家譜序嗟乎世之人孰不愛其身惟目前之圖而不重其本輕其身者也抑孰不愛其子孫規規身後之利而無以維繫其心棄其子孫者也枝幹崢嶸必植其根而後千花萬葉於焉以榮天下未有本撥而末茂者獨木乎哉是故祖父吾本也兄弟其枝幹子孫其花葉也吾父之視吾兄弟猶吾於子也吾祖之視吾從兄弟猶吾於孫也自鼻祖至於耳孫愈逺愈分而氣脉所貫固一本而無二世之人惟不知本也是以骨肉之親至同途人喜無慶而戚無弔也平居不相得而患難不相拯也貴且陵賤也貧且忮富也將其身之不保而欲以及其子孫不可得也家之有譜所以重本始而維繫乎族屬君子之善愛其身與其子孫舍是無所用心矣古者因生賜姓胙土命氏使民有别而不混又立大宗小宗之法使民有所統而不離後世宗法廢而襲冒興益以淆亂其猶可見先王之遺意者惟譜焉耳隋唐間譜掌於官五季以來其法復廢士大夫之家間能為之而或旁援貴顯以為榮駕空於不可考之世以自詭則又愈失古之意而亦奚用譜為哉余友王秉衡自其祖壽四翁居婺之北關子姓繁衍蔚為吾鄉望族秉衡懼其族大而難合也則謀為之譜王在晉宋間江東最盛浙之諸王多其苖裔秉衡皆不敢取信斷自所知壽四翁以下凡七世圖其宗系疏其字名生卒之詳為譜昭穆秩然可考嗚呼是殆有識而合於古者乎秉衡名銓舉進士歷官刑部員外蓋亢宗者也而用心若此其賢於人逺矣夫為人後而能使先世之祀有所藉以延於無窮者孝也使夫人皆興於孝天下不幾於治乎余竊有意於斯觀秉衡之為而重感焉故樂為序之送陳教授先生序滌齊陳先生以選部推擇教授于金華九載當奏績上京士大夫華其行而重其去也則思以言贈顧謂豫曰先生自此升矣吾黨之小子誰與造就風俗誰與陶成吾儕里居奚所遊從而咨訪於其别不可無言豫惟儒者學古通經砥礪名節固將有益於斯世斯人非徒善其身而已故用之朝廷足以尊庇用之郡邑足以承宣或者不為世用亦必傳道授業以淑諸人人是故孔聖思裁狂簡孟氏樂育英才而說者謂教澤所及顧有大於守一官效一職者皇家化民成俗設國學以教於上設郡縣學以教于下師有官弟子有廩非如昔之聖賢不用於世而自相授受者也其任不亦重乎其遇不亦幸乎先生以明經舉京闈兩典郡邑教事老成學行為時推重循資而升必得太學右職所謂作人才而勵風化者當為天下慶不當為一邦惜也若夫游從咨訪之私固人情也豫亦奚以釋諸君南封録序正德七年春希曾以刑科右給事中奉天子命偕翰林編修湛君若水持節往封安南國王人賜上公服一襲榮使逺也明年正月入其國授封行禮信宿而返蓋自京師至廣西之憑祥水陸萬里然後達于安南而安南之往返僅二十日耳又明年復命上錫宴于光祿勞行役也仰惟皇明統一海宇九夷八蠻重譯獻琛西南海嶠諸國惟安南尤秉禮我國家待之特厚若其嗣世襲封則寵以詔敕齎以冠服而將命之使必簡侍從文學之臣充焉皇上之所以誕敷文德惠綏逺外者何其盛哉希曾空疏蹇拙謬膺是行仰仗王靈不煩專對從容指授而使事畢矣重惟遭際明時目覩盛事歷萬里絶域幸不辱命不宜泯焉無所紀述乃取在安南所賦詩歌二十二首回京奏疏一通手録為卷又以安南國王詩二首書二通陪臣詩五首綴之卷末題曰南封録序而藏之凡山川之迂險風土之竒詭與夫往來交際之始末一覽可見古者太師陳詩以觀民風采之里巷歌謡春秋以狄視秦而車鄰駟驖諸詩三百篇取焉是録也豫不得以淺俚自嫌且俾外國之什得附見者固不以夷而棄之也擇焉不精覽者庶無我疵東園看月詩序正德甲戌中秋前一日閣老西崖先生李公即所居之東園開樽肆筵召其門人司業魯振之少卿張汝吉太史趙爾錫李宗易通政李守正王時芳宫允李夢弼洎希曽為看月之㑹于時久雨新霽殘暑已退夕陽落陰凉風時至公坐諸生于左右或論文或誦詩或觀古書名畫時一命酒以待明月之出少選栖鳥漸集暝色四合獨鶴唳空氷輪皎然於林薄之上公仰視久之忽顧謂曰嫦娥差瘦一分秋仲魯尚記憶否此蓋希曽十三年前從公閣試八月十六夜賞月句也於是諸生起為公壽因自相勸酬振之雅故善飲獨舉公去嵗中秋詩作楚調歌之歌畢請用韻紀興公顧坐客八人俾各占一字為句首濡筆引紙就月下書一律命屬和焉酒罷漏下三鼓矣後希曽謁謝公又請得連夕所作乃并公招飲手柬裝為一卷而以諸屬和詩附焉庶用備他日故事惟公文章勳業固已被今垂後學士大夫莫不尊信而師資焉顧當謝政引年之日於門下士猶且不忘汲引至於片言可采歷十餘年之久尚挂齒頰是固公之盛德而其所為誘掖奬進者不識當何以副也詩曰采葑采菲無以下體公之録善也又曰肆成人有德小子有造公之樂育也希曽謬託龍門無所底就特序其事以自識贈御醫吳先生還鄉序御醫吳晦叔先生謝事南還於是年七十矣而聰明矍鑠若後生且戒行吾鄉里之仕京師者飲餞于其邸酒半客執爵而歎曰賢哉先生去就若先生亦誠賢矣乃顧謂余曰贈言之誼以屬子余惟賢者處世身為先用次之身必有以立用必有以及物故學術以立身也宦業以及物也其或所遇不齊所就雖異二者無歉焉可也是故太上則周孔之事其次以職其次以藝賈誼稱古之聖人不居朝廷必在卜醫范希文謂大丈夫不作宰相當作明醫活人其理同也正直平蕩之道塞世途多艱賢者益難為全為其大而莫之全孰愈為其小而終始之全也先生故業儒尤精於醫成化間被檄供太醫院事尋擢本院吏目進今官首尾凡三十年所活都人士不可勝計朝廷眷遇方隆而先生懇辭以老其亦知退而全身者耶其亦小試而畢其及物之志者耶夫賢者心事未易測識漢二疏之去使人歎息稱道於千載之下亷頑立懦有遺風焉則史氏之言為之張本也先生歸矣他日知先生者或有徵於余言贈長沙府推官項君序余鄉項君瑞周以太學生試天官頴出儕輩拜湖廣長沙府推官余暨陳大理馮進士則君之執友且聫姻若周侍御應職方亦君瓜葛若徐秋官陸武庫唐侍御胡江夏朱邵二進士皆與君有場屋舊若陳李二上舍又同君偕計者于時咸在京師初君未至時吾黨思鄉里之彥必曰瑞周思士之篤學清修出可守官而處可敦俗者必曰瑞周悵悵焉惟恨其至之晚比至則倒屣迎之下榻館之恐後每公退宴集秉燭夜闌相與道故舊商古今靡不心醉形忘不啻疇昔之處鄉曲也君承檄當之官吾黨屬余贈言余惟長沙為湖南大郡領州縣十有二山深土曠江右川洛之民多流其間里族雜而獄訟繁視舊志所謂民朴而淳者有間矣國家設推官以聽一郡之訟其任甚重君治長沙實重且難雖然余聞諸子思在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣君信乎友若是其於獲上治民何難哉易稱君子以明慎用刑書稱惟刑之恤又君素所誦習者舉而措之吾知長沙無寃民矣請拭目以觀其成滁陽贈言序滁介江淮之間阻山抱澗舟車罕通唐以前未顯也宋歐陽子作守文章節義竦動一世游觀品題形勝拔出自是名人韻士往往聞風願遊而天下知滁矣逮我皇明實登畿輔尋建太僕寺總攝馬政則以其地為桃林華陽而天間之往來冠蓋之南北日交乎滁之陽矣蓋滁之遭莫盛於今而歐陽子之遺迹過而訪者益多於昔山川顯晦固自有時哉正德丙子希曽由諫司來二太僕吾兄柏軒先生適分教于泰滁泰相去僅三百里而各縻于官猝難㑹晤或託音書或形夢寐不勝陟岡之感乃丁丑秋吾兄便道過滁數年悒鬱一旦傾瀉爰命軟輿從以殽酒相與登豐山入琅琊追醉翁之風流潄玻瓈之潔清于時秋髙木落風日清朗樵歌鳥哢如倡如和遊興所極不知日之既暮於是環滁之景盡在心目而友于之情亦少慰其一二獨非幸哉已而吾兄將還泰同寮諸先生咸贈以詩更倡迭和積成巨卷題曰滁陽贈言惟諸先生之作鏗鏘振發金舂玉應所以侈山川之竒觀嘉天倫之樂事揄揚借譽蔑以加矣獨念豫兄弟自幼侍先君宦四方未嘗一日相舍既長筮仕各自為途離合可勝歎哉昔蘇子由與其兄子瞻相約早退為閒居之樂子瞻亦謂宦遊相别之日淺而退休相從之日長顧豫與兄今雖未敢言私幸齒髮未艾後樂有日則兹别也安知不為終老之聚晤而兹遊也安知不為故園之美談耶豫既屬和卷末復序此以俟五山先生吟稿序五山先生宫保大司馬何公吟稿凡六卷其子南京太僕寺丞汝𢎞所輯也將鍥梓俾希曾序諸簡端公少有異質博涉經籍其為詩矢口信筆多不屬稿即屬稿亦漫不置意或至焚棄其中之所存蓋有大焉而於詩若未暇數數然者故汝𢎞所輯止此公起家進士厯事三朝垂五十年守令之民庸風紀之賢勞藩服之楨幹卿列之股肱經綸匡濟思日孜孜洎參留務典本兵值時多故尤極勞瘁故其發之乎詩率皆隨事應酬一時興寄之作固不暇歲煆月鍊句拾而章綴之也卒之澤生民功社稷名竹帛而其稿之僅存而可見者又皆和平暢達有非苦吟雕蟲之士所能及焉嗚呼古之所謂大臣者類如此士果貴於多言乎哉公吾浙人先大夫辱交焉希曽頃居諫司獲侍論議兹又與汝𢎞為同寮仰先達之風烈且嘉汝𢎞能傳業也乃不辭􅦓薄而序之云爾公居新昌之五山學者稱為五山先生因以名稿云潘氏家乘序乘所以載也家乘者家之所載凡以論撰其先世傳之後人者也古者諸侯世國卿大夫世家有家之事國史載焉國史亦有謂之乘者焉後世世祿廢而譜狀猶掌於官五季以來其法復廢世之君子乃家自為乘乃天理人倫之不容已者而可以義起也惟我潘氏世居浙東遺文往事久而散漫於是竊不自揆編家乘八卷首以纍朝誥敕之典次以吾宗世系之譜而凡銘狀表傳祭挽贈送之作亦附焉顧子寡陋無似採掇未備其事雖核而文不能無闕矣為之歎曰嗚呼此一家之書也而關繫之大不獨于一家而已也是故覩綸綍之昭回則思篤忠貞審宗系之聫絡則思崇孝弟誦文辭之紀述則思濟世美如是而孝不可興忠不可移俗不可化者吾弗信也語有之求忠臣于孝子之門又曰人人親其親長其長而天下平夫然則兹乘豈徒為一家之書哉潘氏之子孫尚念之哉送思州太守俞君序俞君一中由後軍都督府經歷擢守貴之思州且戒行㑹廷臣伏闕爭大禮皇上震怒大臣罰俸者二十餘人百執事逮杖者二百餘人中外凛凛相視莫敢發一言君獨抗疏請恤已故宥垂亡則威福並行凡懷忠者無復以言為諱皇上霽威答之於是言路復通聖人不忍人之心益明我國家無疆之休端在於此而君之忠誠激切首批逆鱗不亦戞戞乎其難哉先是幕府蔣君某輩謂豫與君同里閈雅相友善以贈言見屬豫時方自訟且為君危之未遑也幸君之言足以悟主大夫士靡不深嘉而樂道之豫其可終無言乎嗟乎君子之於天下也誠未易也才氣弗充則弱學識弗到則暗諳練弗熟則妄弱則見義而懾暗則迷先幾而不知妄則舉動輕率而顛踣隨之如是而欲有為於天下誠未易也君視豫十年以長嘗同為黌舍生直言徑氣素為儕輩敬服歷艱苦浩然不撓其才氣何如也自少喜吟詠涉獵羣籍上下古今數千百載如指諸掌以周易纍舉不第復以蔡氏書取捷非經生專門者比其學識何如也由進士拜冬官郎左遷倅蘄尋倅惠州延平二郡乃參戎幕二十年間掣肘挽心者幾紛錯震撼者幾其諳練何如也今日一鳴而國體增重士類胥賴夫豈偶然者哉推是道也於一郡何有哉抑思州去京師八千里地僻而小蠻夷雜處君守思或者弗滿焉豫謂行乎蠻貊尤未易也君誠不鄙夷其民而惠綏之威鎮之文化之治之以不治焉則昔之諳練而未及者在斯行也他日大用以有為於天下斯行又一助也賀封禮科給事中章翁序吾金華之蘭溪處士章翁子處仁任禮科給事中今年夏四月朝廷以尊崇禮成推恩凡京官父母存者先封之翁乃被封如子官配某封孺人於是孺人壽躋六十而翁逾年亦六十矣是歲秋九月處仁奉命册封某府往返瀫水之上得稱觴為父母壽宦遊諸鄉人羡翁偕老而遭異數享樂事屬豫序之因處仁寓歸以賀豫之再來京師也朋舊落落如晨星得處仁與遊甚歡也處仁才氣英邁問學博洽直言宏論有聲諫垣豫蓋嘗稱願曰幸哉有子如此比聞翁志慤行端周于孝義讀書論古今事有卓見居鄉不刓方為圜而閭里多求直焉誨子弟惟禮惟義乃知處仁得於過庭者非偶然也揚子雲嘗稱無是父無是子翁之謂也又稱無是子無是父處仁不得辭也抑先王勞使臣恆閔其不遑將父今處仁奉使而獲寧親蓋良便也聖天子之恩至渥也則其衣錦承歡能不思聖天子之恩乎詩云式遄其歸翁尚為子誦之而保王躬補衮職尤處仁顯親之大也請因賀而申其說贈錢以時授大名節推序進士錢君以時授大名節推或曰大名外郡也節推刑官也重內輕外其來非一日而簿書獄訟殆非君子所貴之道也夫士之釋褐進士也或游藝詞林或攄忠臺諫或分職部屬近天子之清光樂職事之優暇蓋其所也以時以正德庚辰舉南宫越四年而奉廷對又逾年而就選視諸同年士不謂不久也其學充其行飭其與人信其應務達槩諸同年士不得多讓也而官之于外勞之于刑不猶棲鳯凰於灌木策騏驥於羊腸也乎豫則曰君子之仕也將以行道也茍將以行道也則內外一爾輕重奚計精粗一爾勞適奚計易曰山上有火旅君子以明慎用刑而不留獄謂刑乃君子之所慎也書云刑期于無刑民協于中謂刑罰之精華與禮樂教化同歸也果孰精孰粗耶矧國家任人歷試諸難內除者或外遷外選者或內補今台鼎股肱之臣大率皆更歷中外之士也果孰輕孰重耶使以時才器之美盡心審克以成明允之功不三數年且膺召命進京秩矣又由是加勉焉崇功廣業髙銜膴仕不難到矣不猶鳯凰起灌木而回翔千仞之上騏驥歷羊腸而馳騁於康莊也乎以時先翁為順慶二守文學政事有名以時蓋能世其業而又大之者也豫與以時同里閈聫姻婭不敢謂非相知而凡與以時游者莫不韙豫言之非阿且足以相朂也因請為以時贈壽榮録序福莫先乎壽壽莫貴乎榮壽且榮夫人樂之而人子之樂其親不啻于其身然獲焉者亦罕矣獲焉而思所以永之此壽榮録所為作也太常寺卿汪君用之之母太夫人唐氏故禮部右侍郎兼翰林學士贈禮部尚書寅軒公之配以用之兄弟繼武登仕纍封至太夫人歲壬午行年八十在廷公卿游用之父子間者喜太夫人壽且榮也相與賦詩為文以頌以祝所謂章毋德而侈家慶者渢渢乎其盛矣用之承歡之餘鍥梓以傳蓋將永其所樂乎親者于無窮詩曰孝子不匱永錫爾類其用之之謂乎用之歷事三朝勳名茂著仰世德而作求迓天休之滋至今兹樂事夫豈幸致而亦詎有涯哉夫孝所以事君也忠所以顯親也太夫人有孝子我國家有忠臣也希曽忝用之同年辱以序見屬不敢以不敏辭而樂為天下道也送鳯陽令何世卿序武義何世卿嘗從豫受經玉溫金純磬折其恭其學博而知要其文清麗而達其才無施不宜而不敢肆少游鄉校纍舉于有司弗售比壯應貢卒業南雍近謁選來京師朝夕過從甚勤蓋别豫者既久而其所自得者益深矣無何天官試優等奏授鳯陽縣令同鄉諸士夫屬豫贈言豫於世卿固將有以贈也夫今之學者非孔氏之書弗讀士賢而聖孰不嘐嘐自許也而考其設施求如漢世循良吏不可多得豈嚮之學者不足用耶抑措之用者非所學耶吾謂世卿兹行亦自信而已矣亦無舍所學而已矣昔者子游為武城宰而弦歌之聲聞教人以道也成人有其兄死而不為衰者聞子臯將為成宰遂為衰誠能動物也子賤治單父得賢於已者五人而事之故衆悅巫馬期戴星出入以身親之而單父亦治一尚賢一勤民也夫子教子貢之宰信陽也曰治官莫若平臨財莫如亷善子路之治蒲也曰恭敬以信矣忠信而寬矣明察以斷矣凡此賢令之事具載孔氏之書而世卿所素學也篤信力行在世卿而已雖然今之為令者視古蓋難矣矧鳯陽我國家所基兵民雜處宗室羣居驛使南北無虛日加以饑饉荐臻冦盜竊發呻吟之民生理未復視他縣蓋尤難矣世卿審時與勢因人情土俗為之張弛而無失孔氏之家法焉庶幾講習之素不托諸空言而循良之績卓越乎常流矣昔人有云不遇盤根錯節無以别利器豫於世卿兹行見之竹澗集卷六
