body:
  text: 竹澗集卷二明潘希曾撰古今詩一百十六首次韻寄項司訓聘之故人過我竹間廬襟抱重開十載餘親老共榮毛義檄官清仍載鄴侯書瀟湘景好何妨遠鄒魯風回定不虛去矣一氊堪卧起等間塵土莫驅車送萬太守季崇致仕秋色南來鴈影隨使君歸興浩難追離情且盡當筵酒世事徐看罷局棊召伯甘棠終戀戀竇家仙桂更竒竒清風千古西江水濯取長纓趣自知同年章道充過訪奉贈深山何意故人來石徑苔荒掃不開正憶看花曾並轡休辭對菊且銜杯江湖未有忘憂地廊廟惟應濟世才一笑出門仍遠别暮雲翹首重徘徊滌齋為陳掌教賦千年心學託盤銘醉夢紛紛獨喚醒直與聖賢相啓沃了無塵土翳虛靈河濵洗耳風斯下澤畔彈冠事不經猶愧煩襟消未盡願因一滌試清泠春日即事林下光隂味轉長春來物我兩相忘煙波戲藻魚知暖花徑銜泥燕竊香白日一壺陶令醉青山雙屐阮孚狂荷鋤鄰叟歸來晚見説農桑事漸忙杖藜夢破餘酲在杖藜臨曉風關心春圃緑掃迹市塵紅聽鳥勝絲竹栽花亦事功未須論管樂祗合卧隆中抱拙抱拙從人笑投間得自由學仙時叩齒延客誤科頭竹院藜牀晚藝窗茗碗秋濟時無上策聊共麴生謀山窗日色滿花枝山窗睡起遲髮經秋易脫身未老先衰可是陶潛醉惟應鮑叔知間中亦多事客至與圍棋送郭大參于漢致仕江上秋風作曉寒扁舟款乃下重灘一千里外蓴鱸興三十年來嶽牧官去國尚嫌名太潔到家應喜夢初安論文未卜重逢日極目浮雲正渺漫送趙太守叔鳴入覲傾蓋無何又别筵行塵望斷似登仙九重日月三陽近萬里朝宗五馬先有喜天顔瞻咫尺無聊民瘼賴旬宣江湖放浪仍迂拙擊壤遙陪祝萬年山中六言二首山日欲落未落梅花一枝兩枝悵望幽人不見碧溪流去多時敗葉漫山不掃孤雲在岫方間采藥仙人何處黃昏獨鶴飛還次韻溫內翰民懷夜坐見寄靜院隔塵境微涼生暮天寫懷詩俊逸投我意勤拳鶴夢風驚覺花神月與傳想應箕踞處清極不成眠再次前韻答溫內翰相逢話相别三載卧江天水果珍菱角山殽飽蕨拳字從携酒問詩懶向人傳長樂鐘初聽終宵欠穩眠送陳生益之京國相逢地秋風話别天携書冨蝌蚪仗劒寶龍泉名久賢關著身初故里還慚吾一日長望子九霄騫海岱增竒氣風雲入壯年此行休草草得處勝師傅陳節婦挽詞同年應元忠母芳名留死後苦節在生前不負共薑誓仍齊孟母賢人憐同穴計天與未亡年旌詔殷勤意綱常萬古傳送鍾太守邦臣之廣州十年粉署足清譽作郡初分海上墟風土最便鄉國近循良端使漢廷書荔支日暖熊車穩椰子風清燕寢虗庾嶺梅花春更早一枝消息定何如送張都憲總制陜西出入三朝位望崇又歌文武發元戎西師共仰韓招討回紇遙驚郭令公祖餞衣冠明曉日先驅旗纛起秋風九重宵旰蒼生意應賴全收不殺功寒夜不寐朔風無賴攪清眠敗壁殘燈共客邉雪色在窗天易曙更聲到枕夜如年重依鳯闕慚尸位乍别鱸鄉憶釣船幽夢不成魂欲斷無慿身世轉茫然喜仲實兄轉龍溪教諭十年江海廣文寒忽報龍溪漫轉官絳帳已專新講席青氈不改舊吟壇夢回好句慿誰寄别久幽懷稍自寬却幸星槎假良便一尊非晚話團圞時豫奉使將取道龍溪故先及之送潘僉憲玉卿之山東峨冠著豸帶生花攬轡都門意氣賖十載瓊林曾共宴兩州喬木本同家官聮烏府名方重路出牛山景更嘉見説潢池多竊弄洗塵甘雨喜隨車次韻簡趙李二內翰三年不入未央宫侍從誰期此日同仙島往還無弱水鵬程搏擊有剛風子昻筆陳千人廢太白騷壇一世雄間掃藥欄須枉顧酒錢三百挂青銅同館會分韻相見釋褐初交情何歡洽論文玉堂夜聮鑣試春祫參商十載來餘韻不可押人生本無期世路多險狹詎意今日會盤羞間蔬甲秋菊馥當筵把玩笑相狎努力及良辰斗酒同一呷花枝枯復榮頭白堪再插良會今何夕秋風灑客衣翻疑别是夢不覺醉忘歸露下黃花瘦樽前紫蟹肥髙歌無别調列炬有餘輝霄漢諸公在風波往事非亦知吾道拙敢與世情違嵗月驚虛擲歡娛幸未稀金蘭存道義四海永相依次李序菴退朝韻天上樓臺五鳯攢回頭咫尺俯長安太平宇宙難為象嵗晏冰霜苦不寒日過午門初放杖雲連甲第盡峨冠空談仁義何禆補慚愧重來舊諫官次韻趙太史爾錫喜燈花見寄蕭條空齋夜燈燼花蘃燦故人忽詩來尺素寫強半取詩就燈窺讀之百憂散鏘然球玉鳴爛若盤珠轉緬懷瓊瑶報面目良有靦想當孤詠時焚香坐清宴深憂渺江湖信斷衡陽鴈兵戈久未息疇與當一面空抱濟世竒回腸不成斷嘯歌自發舒託寓復沖淡旨哉非浪言三復吾不厭起舞唾壺缺顧影巾紗岸空囊獲至寶富貴俄可辦燈花信有徵錢財奚足願除夕次李序菴韻過眼流年又涉虗了知天地等籧廬後來世事三春夢前此間愁一夕除未靜風塵羞肉食忽驚梅栁憶山居燈前強和陽春曲醉拂雲箋任草書遣悶三十六年吾已過一百五日春又來栁稍煙雨緑於染馬首塵埃紅作堆上表未攄諸葛憤校書寧有子雲才悠悠如此亦何益空礙東風笑口開次韻詠王侍御彥聲行臺松蒼松帶老色偃蹇繁華天落日欹翠蓋踈風㵼清泉逈無塵俗纍杳與雲氣連嵗寒千載意魯論有遺編君家舊槐庭此樹宜光前梁家莊阻風次韻答湛內翰元明小兒造化雖靡常隂晴變幻略相當順風千里忽一阻達觀不用回愁腸美人俟我河南渚青眼奈此黃塵妨須臾風定塵亦息凌雲萬里同翺翔慶壽圖為郭處士賦竹有高節梅有香嵗寒之松鬱蒼蒼先生比德梅與竹先生致壽松俱長春風吹筵酒波緑畫圖輝映人如玉醉來飽嚼千年苓索笑梅花間杖竹福州控海樓尚市舶宴上作萬里登臨一繫舟八閩形勝此危樓水通溟渤來重譯山入雲霄壯上遊題句只疑南斗避倚欄還為夕陽留主人興劇誰能盡舉白頻勞向客浮題鍾太守邦臣誥勑謄黃卷家學一經在天香雙桂榮父兄皆仕誥鸞凡幾軸符虎又專城炎海晴無瘴陽春政有成漢家循吏傳黃霸早馳名廣州海珠寺巨海環山寺叢筠護石提混涵天上下升墜日東西到恨浮槎晚歸疑去路迷萍蹤久漂泊愧爾定僧栖廣州小金山樂山何必髙山高徒峻嶒樂水何必深水深或崩騰嶺南小金山一水碧洄縈香火何代寺空階蝕潮痕地絶往來少林幽鳥弄音登眺凌虗空恍在揚子心還疑清淺流盈盈到蓬瀛三洲巖客遊過端溪心目曠煙水忽覩三洲巖巋然俯清泚艤舟往從之天風送高舉巖深洞口暗既入殊可喜玲瓏若神剜虛明自天啓石門陳廣樂雲液凝鍾乳安知神仙流羽化不自此玄鶴夕未歸落日空徙倚梧州吕仙亭次韻酬薛僉憲子純鬱鬱蒼梧山高高吕仙臺山川故無恙仙人去不回空餘千嵗松根深茯苓埋當時鶴不見白雲晝成堆故人拉我遊一笑萬里來兹辰屬嵗暮瞻望徒徘徊宇宙難可窮人生亦勞哉謝君斗酒意臨風渺豫懷夜泊藤縣次韻酬湛內翰泛舟蒼梧來又泊藤江口去國萬餘里遙夜瞻北斗冉冉嵗月逝厥柄忽臨丑銀河注清淺經緯爛星宿低頭閴無人圖書陳左右殘燈耿明滅爐煙細當牖正爾不能寐憂來欲皓首迢迢江湖心匪為行役久望眼不可極雲山互纒糾中道欲何依賴兹同心友珠玉時見投繆戾亦豫咎駑馬逐驊騮竭力常恐後潯州東津驛書感沿回左江湄至止東津驛遊子懷往事惻愴淚沾臆昔在景泰中蠻獠禍孔棘我祖憲府英提兵此駐節疆場賴敉寧蛇狶就俘馘王事誠辛勤營星隕中夕去今六十載相傳猶仰德嗟豫小弱孫寡昧何所識王命使南交幸兹弔遺迹天涯嵗云暮寒風吹獨立橫州道中見日光識喜蒼梧南來一千里扁舟牽挽窮山水蠻煙瘴雨動浹旬長晝冥冥無午已僕夫泥塗簑作衣青蕉裹飯不療飢蕭條行李潤生醭寂寞炊竈寒無輝愁豫兀坐篷窗下忽覩陽光射雲罅千林生色嵐霧開須臾變幻疑昏夜人言此方風土乖冬雨苦久晴頗佳乍晴不堪還乍熱鬱蒸癘氣生隂崖我望青天再下拜太陽高照元無外蕞爾遐荒特可憐覆盆何礙乾坤大橫州馬伏波祠烏蠻灘上伏波祠萬里南來酹一巵薏苡不妨成貝錦功名終許勒宗彛雲連草樹疑精爽地雜華夷仰護持屈指雲臺舊時將幾人廟食尚天涯獨卧獨卧篷窗晚滄浪聞嘯歌窮年行路遠歸夢入春多緑樹蠻村合紅霞瘴雨過相忘祗鷗鳥泛泛共煙波除日永淳道中得風扁舟江上久沿洄十幅蒲帆頃刻開除日并將孤悶去好風先向隔年來分香夜泊梅花岸帶暖時傾柏葉杯早晚咨諏王事畢五雲回首即蓬萊癸酉元日自涉名途十二年年年元日不同天九重日馭三回侍萬里星軺兩度旋哀苦嘗勞烏借力艱危僅脫虎垂涎逆瑾之害悠悠往事成春夢謾把今春付醉眠新年作嵗事屬更始東風扇微和郊原萋動色桃李艷已花遊子行萬里眷之感慨多感慨故有懷簡書可奈何尺素託雙鯉淪沒愁長波肅肅隨陽鴈遲豫同爾徂凌山驛次湛內翰韻四首隂雨忽開霽江雲散曉霞日升林影動一徑見山家嘉樹晴光艷澄江春水深漁翁坐曬網顧婦作蠻音風日春來好江村藹衆芳簷暄嬉婦子隴夕下牛羊南裔行將盡荒村僅自存蕭條村裏驛日午不開門人日新嵗易為感遐荒獨自行雨晴人日好天逺使星明望闕輕隂轉思鄉芳草生無情江上鴈肅肅背豫征病中遣懷經旬抱微瘵悶悶向天涯夜雨長汀草春風開野花無功終屏藥有夢只還家漫學長生術朝來咽日華南寧太平之間巖石竒絶纍日玩之不厭兩涯回石壁悅玩竟忘疲混沌何人鑿玲瓏一世竒纍纍鼎象物隱隱畫藏詩絶頂雲昏處惟應仙鶴知龍州仙巖次湛內翰韻煙霞靄平野孤巖敞幽扉仙人此脫屣千載鶴不歸而我萬里來矯首空遐思東風散微雨古木泛斜暉賔主聊盡歡一尊本無期宿布村泥塗日已夕草閣雨猶寒美睡方知倦羈栖自鮮歡泉聲回澗底花氣藹林端往路還何許沉沉夜欲闌出鎮南關關外即安南境崔嵬分茅嶺鎮南扼雄關持節始入交山路何鬱盤喬林映前旌鳴騶歷層巒綸命自天下恩光回日南道路盡膜拜冠帶爭駿奔語言雖假譯文物亦可觀藐兹溟海壖聲教古所漸次安南坡壘驛萬里安南第一程停驂此日快新晴喧林鼓吹晨分隊耀野旌旗夜宿兵土俗衣冠猶自異春風草木有餘榮乾坤覆載何遐邇正北紅雲是玉京北峨歌北峨驛前江水流百折直到蒼梧州蒼梧去海幾千里江水朝宗勢未已桃花昨夜飄小紅大海浮去春風同不慱驛曉枕鳥啼山館曙睡思共春濃香裊沉檀細花明錦繡重簡書仍往路嵗月只孤蹤稍稍荒煙外﨑嶇又幾峰卜鄰驛交地褊小往往迂其路以示險卜鄰之驛誰與鄰荒山四面徒嶙峋白雲當簷來往頻長藤古木相依因蕭條溪谷少人民時有翠鳥啼青春我嘗御風遍八垠徒步北斗趨紫宸回頭一瞬隘九真蹊徑詰曲難具陳華風漸染何時淳僕山道中次湛內翰韻四首看花難得早春同花好休教盡意紅我欲回時重見靣恐因爛漫易隨風不知春色幾多深是處青山鳥弄音我亦有懷難了了天涯相伴作微吟空谷來鳴何處騶前驅旗鼓逝如流盤旋盡日無村郭一笑真成汗漫遊緑楊沿路綵旗垂春日悠悠何所之忽覩好山雲外起欲淩絶頂自題詩丕禮道中我行丕禮墟交路將過半田疇稍連絡山勢亦平緩竹樹交逺村雞鳴煙火晏士女作隊遊語笑不可辨維時王正月桃李已零亂好風自東來流鶯道邉囀天地信廣大兹遊未知倦人間多桃源亦復不常見壽昌河初辭壽昌驛復渡壽昌河岸靜連蒼竹潮平漫緑波墟人喧鳥語海舶起漁歌行盡天涯路春風亦自和發市橋驛細雨青林暗市橋五更燈火促星軺紫泥擎出天恩重赤土分來海國遙正朔不殊堯日致封疆何用漢時標午風披拂輕隂散春色還同喜氣饒發吕瑰驛至王國山郭自為國江春不作寒百蠻奔海嶠雙鳯下雲端封建昭周禮威儀盛漢官停驂聊信宿歸計又長安次韻答安南國王兼辭其贐皇家聲教古無前此日春風動海天龍節逺輝南斗外鳥星長拱北辰邉藩垣義在思分土獻納才踈愧濟川臨别何須重金幣贈言餘意憶他年回渡富良江二首江本不閣而操舟者循岸沿洄以示險富良江頭風日晴王子乘春送客行一棹中流歌未畢隔江花栁已相迎江北江南從此辭江波瀲灔似來時春風送客無南北帶得鶯聲過水涯回至吕瑰再次王韻辭其贐久依香案玉皇前手捧綸音下九天不用槖金酬使越須知封土在安邉周爰歸去風生袖長揖分離思滿川從此相望無逺邇謳歌同答太平年次韻酬安南國王餞别之作萬里觀風百越春瘴煙消盡物華新車書不異成周制飛躍元同大造仁稍自滄溟輸海錯永依朱鳥奠炎神畏天事大無窮意裁入新詩寄我頻即事二首平疇水漫緑成行正月交人已插秧記得中原舊遊處雪消晴隴麥初長無雪元知麥不宜家家餅餌秫為之前村日暮菜花發錯望黃雲傍短籬回次坡壘示伴送陪臣朅來辭交州忽復至坡壘咫尺見南關春色不類始香風老松花繁隂變桃李不問舊路迷所嗟嵗月駛歸鴻雖北徂萬里方自此依依南枝鳥為爾憐毛羽南交紀事往返南交道東風浹二旬諏詢雖未廣風土亦堪陳漢將標銅地堯官致日辰鄙夷甘異習凋謝盡遺民百年來中原遺黎盡矣祝髮無男女加冠别縉紳髮稍覆額被頸惟使中國者乃長髮黑牙喧鳥雀多啖檳榔齒黑如墨惟孩提不爾赤腳走荆榛男女皆跣惟有官者有履席地多盤膝操舟悉祼身野栖茅覆屋露積竹為囷斷雪無牟麥分秧及早春檳榔生咀嚼橘柚雜芳辛蕉實黃初熟椰漿白頗醇珍竒難得象躔度易占鶉沉水來猶逺生金出豈頻盛陳兵肅肅絶少馬侁侁蛇虺當筵舞螺蝦入鼎珍稍依瀕海利難與大方倫文亦同王制圭仍析帝臣方言時假譯職貢嵗常親自適飛潛性相忘覆載仁我歌聊志異何日盡還淳次韻答張東所廷實出塵心迹了無纓三十年來四海名詩酒對時聊爾爾行藏於世只平平春風偶下賢人榻南國空慚使者旌牡蠣門牆菊花徑白雲深鎖不勝情讀宋茂名尹潘公家傳公名惟賢宋亡不屈而死長子斗輔死焉少子梅窗潛遁以存祀元運方興宋祚危正是桑田滄海時從容一死酬君父辛苦餘生為本支殷室有仁堪並駕史家無傳合題詩等間成敗都陳迹惟有芳名百世垂送高掌教之贛州幾年吾婺賴儀刑化雨平分贛水汀毛義宦情勞捧檄韋賢家學慣傳經故山榕葉歸時見官舍灘聲靜裏聽君路漸南豫漸北飛鴻消息愈𡨕𡨕送高掌科潁之册封便道焚黃五月官河雨乍通星槎東下更乘風周家典禮藩封盛漢國河山帶礪同衣錦會看過故里焚黃仍得報先公秋來好是旌歸日青瑣封題待納忠送令尹施天瑞之南靖栁陌塵銷暑雨殘故人騎馬出長安三場舊識凌雲氣百里今為應宿官丹荔黃柑知地勝天涯民力賴君寬元方若見慿傳語侍從年來愧素䬸時家兄亦官閩中即席次徐正郎庭實韻思君咄咄困愁城笑語重逢僕欲更嵗月有痕惟短鬢乾坤無用是虗名故園水竹三生夢上國煙花萬里情自是同心堪細酌坐沉槐月聽鴉鳴送丁司訓器之赴建平幾年場屋擅才名教鐸初持向建平燕市濁醪談舊雨潞河文鷁泛新晴通家有分垂三世遊宦無端隔兩京珍重青氈携去好講壇髙擁六經橫八月十四夜西涯閣老園亭看月奉次限韻二首此月難同恨往年樹頭今夕喜將圓風流不是尋常地露坐分明尺五天共愛蟾光浮酒斚還教鶴影舞花筵夜闌更覺明宵近秋色催人醉帽偏此回情景勝常年樹杪清光望欲圓風掠暮雲沉碧海露含涼氣洗青天共求妙句傳他日還許高歌徹四筵夜漏未央狂未己秋來幽事我能偏十五夜戲效八音體疊前韻二首金氣行秋年復年石亭秋半月還圓絲傳律吕風回壑竹逗清寒露滿天匏爵不辭歌既醉土殽隨意秩初筵革更叵奈光隂速木影中宵幸不偏金波洗眼送流年石假山頭鏡影圓絲鬢暗驚行樂地竹簾高捲未雲天匏成濩落堪豪飲土不塵埃合肆筵革鼓鼕鼕宫漏杳木犀花底興方偏送吳御醫晦叔致仕一入都門三十年秋風歸興忽翻然久供尚藥回天眷賸有良方與世傳白髮光隂間後好青山杖屨醉來便門前瀫水深如許流澤應同橘井泉林節婦挽詞員外文纘母天地無窮恨何年返藁砧箕裘遺腹事鐡石到頭心持此堪生死留名亘古今表門貞節字愧殺白頭吟送胡司訓之河澗故家文獻素相聞上國秋風喜見君捧檄忽驚千里去傳經不負一生勤祖筵漫對黃花雨離思遙牽碧樹雲莫厭寒氈淹嵗月棟梁榱桷是竒勳大興隆寺齋居次韻簡何中舍仲默古寺來春夕溶溶月滿亭忽聞歌白雪獨坐歎晨星蠟炬生花赤沉煙作縷青故人妨促席腸斷暮雲停宿神樂觀次前韻不到仙家久清虗尚此亭十年渾昨日一宿又明星醒眼當誰白寒松比舊青出門塵境别勒馬幾回停早春次韻答李內翰序菴吹面東風漸可迎春來天氣快新晴欣欣栁色如相得脈脈河流亦有情登眺我猶妨阮屐校讎君不讓韓檠久同禁署非淪滯嵗月令人重友生次韻李宫允夢弼二首春色今年稍較遲賞心猶自託深期緑情紅意無消息漫和陽春一闋詞兩日東風作意吹栁稍黃淺緑回遲踈慵頗怯紅塵陌羸馬探春獨不疲追挽王正郎先生洛下風流憶昔賢投簮當路正青年賢勞舊著司徒績退隱新登太史編化去迹陳猿鶴怨讀殘書在子孫傳千年嵩嶽收靈氣灑淚徒勞弔九泉追挽王憲副先生擬賦招魂欲斷腸曾於髫丱挹威光乘驄尚憶同先子附驥偏憐得季方其弟拱之豫同年進士翰苑才名元獨步柏臺風度更流芳高墳宿草年華去悵望空慚一瓣香次韻詠徐秋官廳事槐柏二首西曹清景屬槐堂酒興詩情取次償細蘂綴黃臨短檻新梢抽緑過東牆午隂謾喜先秋桂春色何妨後野棠日永風清官事了羡君揮塵據胡床夭喬滿目孰媸妍偃蹇寒姿特可憐空谷移根天自别古堂分影地逾偏終於晚節知君子不向春風競少年賸與詩家添好興四時蒼翠鎖雲煙贈陳司訓潔之浦江人物從來説浦陽斯文未喪有書香年來後學多狂簡事在先生為主張寶婺夜晴風月好龍門春靜薜蘿長絶憐官舍鄰豫舍千里因君話故鄉盆荷次韻李宫允二首坐困炎蒸百事慵對花猶覺野情濃亭亭不盡淩波意淡淡初回暈酒容眼底西湖非幻景尊前泰華有竒峯緑漪清淺香風細愛護仍愁急雨舂賞心吟事病來慵尚愛荷香一味濃翠蓋偶傾如故好紅粧微笑為誰容出塵已絶三千界過雨空疑十二峯更謝主人能好客留連不覺醉高舂壽司空陜西李公關西自昔盛賢豪晚節如公一世高八座勳名垂竹帛七旬風月老林臯眠雲華嶽仙為侣屑玉藍田露作膏笑看斑斕環膝下年年介壽進春醪次韻李宫允賞蓮四首騷壇意氣許同袍百戰如公一世豪花畔相攜容易醉又知公瑾本醇醪納涼深院憐荷靜共折荷筒當酒杯十二闌干明月轉酒酣花睡兩忘猜酒傍芰荷香自别肉兼絲竹調還高晚來暑退堪行樂坐待銀河洗髮毛碧荷凝露夜涼新命酒催詩第幾巡痛飲狂歌花事了我猶忘我豈知人望雲圖為張掌科季升題東華塵土紅作堆生綃咫尺青山開山頭秋氣洗天碧惟有白雲間往來臨風引領者誰子思親梁公無乃似諫議平生忠孝心依稀寫出丹青裏送張主政用載之南京秋風送新涼垂楊蔭官道載酒城東門話别何草草嗟君璠璵資特逹知名早觀光上國春奏賦長楊曉俄承公府檄獨理金陵棹周官重空土經濟攄逺抱燕山何迢遙江流殊浩渺南北不可期使我懷憂悄願言崇令德永以慰交好贈王處士幽人家住西湖曲曉集芙蓉夕䬸菊湖光山色怡心神七十康強面如玉一朝乘興汗漫逰遍厯齊魯窮燕幽素衣不慣緇塵涴片帆歸去天風秋寄贈鍾處士富川雲水草堂深想見先生抱膝吟獻玉未明和氏泣絶絃誰識伯牙心漁舟小泛沿荷浦書卷間開傍竹隂搔首日高猶散髮更無魂夢到朝簮送童二守栗卿之姑蘇十年萍梗事堪嗟猶喜相逢鬢未華州縣豈宜清廟器詩書元自大方家黃花暫醉離亭晚鴻鴈同征去路賖回首吳江楓落夜詩成須向故人誇送杜司訓世良之豐縣豐沛英雄入彀來春風桃李待栽培千金久負屠龍藝一笑重經戲馬臺雲暗楚天鴻鴈杳酒酣燕市菊花開分攜話及鄉邦事二十年前首重回次韻張亞卿寓懷見寄抱瘵秋欲暮間居寡朋儔當軒理朱絃聊以寫我憂明月忽在袂好風如相求神交有形外曲終不待酬輪蹄紛九逵役役無時休誰能謝來往頗厭紅塵浮藹藹籬下菊氣味何芳柔采之遺所思庶為遐齡謀次韻答李序菴搔首流年萬事新交遊贏得故情真未論車馬來今雨直許金蘭到古人邀月酒杯頻入夜傍花棋局不沾塵多君滿腹琅玕在閶闔終須次第陳閣老石淙楊公司空鶴山李公都憲東臯王公為同年之會豫以年家子與席奉次石淙公韻二首台星瑞世纍朝來鼎立春風壽域開宿德已為天下老流芳還擬嵗寒梅題名三百元同榜入會兒孫幾舉杯樂事也知須盡興踈簾遲日任西頽四海通家有自來登堂今日綺筵開試看當鼎調和手都是先春馥郁梅盛世喜成嘉會禮後生叨進旅酬杯三山並峙真堪範竟日酣歌玉不頽竹澗集卷二
