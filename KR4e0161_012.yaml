body:
  text: 竹澗集奏議巻四明潘希曾撰治河十九首本兵三首疏支河以防水患疏題為疏支河以防水患事臣奉命總理河道事務才薄而任重無任競懼然不敢不竭其愚圗濟大事竊惟近年沛漕沙淤旋挑旋塞蓋由秋水泛漲黄河奔衝所致嘗考河流故道非一其大而要者若孫家渡經長淮衛地方趨淮入海其一也若趙皮寨經符籬橋出宿遷小河入海其一也若沛縣飛雲橋經徐州趨淮入海亦其一也孫家渡趙皮寨乃上流之支河飛雲橋乃下流之支河𢎞治以前三支分流㑹于淮而入于海故徐沛不受其害漕渠不為所淤邇來上流二支俱就湮塞全河東下併歸於飛雲橋一支下束徐吕二洪上遏閘河流水溢為游波茫無畔岸於是决隄壅沙大為漕患今日之計固當挑濬舊漕以通糧運加築隄岸以防衝决然非疏上流之支河將來秋水復發沙雖挑而難保其不復淤隄雖築而難保其不復决探本之論固有在矣近因趙皮寨開濬未通該巡撫河南都御史潘塤等題稱仍將孫家渡責成河南管河副使該戸工二部議題孫家渡責成潘塤督行管河副使加意疏濬以殺河勢不許推避誤事節奉聖㫖卿等説的是欽此臣惟探本之論正在疏孫家渡以殺河勢此撫臣經國至計而該部㑹議相同蒙皇上斷然行之真明見萬里也臣私憂過計尤恐巡撫事繁副使力寡萬一疏濬遲悞未免貽患漕渠伏望皇上軫念國計下工部計議合無請勑一道叮嚀都御史潘塤即便嚴督管河副使調集黄河夫役選委相應官員上緊將孫家渡疏濬一應合用錢糧聽其便宜區處務令渡口深闊支河流行剋期成功臣仍公同本官閲實奏報庶㡬河勢可殺而漕患可免矣縁係疏支河以防水患事理未敢擅便謹題請㫖治河疏題為治河事臣本菲才誤蒙皇上采之廷推特勅總理河道事務既加憲職復聽便宜無非重國計而急水患也臣勉圗報稱夙夜靡寜本年九月中躬率管河郎中李重山東副使陳文沛兖州府同知花魁大名府通判郭從道徐州判官林桐等自濟寜放舟沛徐以觀被淤故道及所挑新河復沿黄河東岸陸行沛豐單等縣以觀大小决口奔衝之迹詢諸父老究其縁由乃知漕渠廟道口以下忽淤數十里實由决河西來横衝廟道口之上并掣閘河之水東入於昭陽湖以致閘水不復南流而沛縣飛雲橋之水時復北漫故沙停而淤耳沛以下即無淤者以飛雲橋之水南流故也計濟沛間漕渠只宜加築東隄以遏入湖之路更築西隄以防黄河之衝俾其自北而南常由故道自無沙淤之患雖舊日之淤猶有存者量加挑濬亦自通行已經劄付郎中等官李重等并續到河南副使周忠山東左參政邊憲㑹議得單縣林臺集至沛縣舊城隄一百四十餘里相應脩築長隄則民地得免淹没運道可保無虞又經督行各該司府議處及轉行各處鎮巡知㑹臣思脩隄備患事不可緩而地方災傷民不堪役及今糧運未行河道人夫空閒乃㑹計工程量調附近河夫二萬餘名每名照依則例日給銀壹分五釐犒助今冬做工二箇月至十一月中暫放來春做工二箇月至三月中可完又查得本年七月九月間黄河水漲二次皆得趙皮寨分流但水落寨口㣲淤仍責河道官夫隨淤隨挑以備分殺及照孫家渡係彼處撫臣督濬亦就查催以慿閲視仰仗朝廷洪福欲俟稍見功効方敢陳奏近准工部咨該本部具題奉聖㫖你部裏説的是河道事情已命侍郎潘希曾提督整理不必再差官員還行與他著用心經畫區處應奏請者具奏定奪欽此欽遵臣感激聖明委任懼無以副宵旰憂勤之萬一謹昧死言臣既愚且拙不敢求新竒之功不敢為茍且之計區區報國之誠惟欲因舊以為功從省以濟事順水性以除患故捨新河而脩舊漕者圗其易也沿黄河為隄者防其傍溢使順流也隄去河五六里或七八里者因地勢也停槩派十數萬夫僅用河夫二萬餘者恐民勞也罷顧募而行犒助者慮錢糧難繼也以次而挑舊淤培東隄者審其時也查濬趙皮寨孫家渡者以皆黄河故道亦先朝所嘗濬也夫漕渠之淤因黄河之傍衝黄河之衝因上流之未疏察其事勢參諸廷議莫如脩漕隄以防衝决疏支河以治本源臣盡心竭力猷為止此然未敢自信也伏望皇上軫念河患特勑工部㑹官詳議或俯察邇言或别示長䇿使臣得一意行事庶於國家大計可無誤也縁係治河事理未敢擅便為此具本專差承差厲思智親齎謹題請㫖謝恩疏奏為謝恩事嘉靖八年正月初六日承差劉堯臣於本部順領頒賜明倫大典一部到臣除望闕叩頭捧受外伏以惟聖盡倫不越因心之孝惟皇盡制必稽知禮之言大典肇脩彛倫攸敘揭中天之日月開流俗之昏迷盥手啟編荷恩增懼誦敷言而㑹其有極由孝道而移以為忠臣不勝感戴天恩之至為此具本專差承差任舉親齎謝恩謹具奏聞自陳求退以彌災變疏奏為自陳求退以彌災變事邇者地方多災星霾迭異皇上宵旰靡寜克謹天戒在廷羣臣罔不省躬待罪臣本菲才謬膺治水重寄多方脩濬所至勞費迄今半年未得成績盖羣臣中宜早退者也伏望聖明將臣罷歸田里别任賢能則天工不曠而天意可回矣縁係自陳求退以彌災變事理未敢擅便為此具本專差承差劉堯臣親齎謹具奏聞伏候勅㫖乞命憲臣兼管河道疏題為乞命憲臣兼管河道事臣惟黄河自河南泛濫歴千餘里分三數道趨徐淮以入海先年河溢開封大名曹州地方嘗脩沿河一帶長隄以保運道而在開封者則屬之河南管河副使在大名曹州者則屬之整飭曹濮兵備兼管河副使分任責成有備無患近年河溢豐沛徐地方兩淤沛漕一淤徐州洪又淤淮安清河口即今疏上流於河南以分其勢築長隄于單豐沛以禦其患惟單縣係曹濮兵備官該管而豐沛徐淮黄河缺憲臣管理事難責成看得整飭徐州淮揚兵偹副使呉昻常在徐州住劄前項河道堪以兼管乞勑該部計議請㫖令徐州兵偹官兼管豐沛徐淮黄河凡人夫工料防守脩濬之宜照依開封大名曹州整理以後仍載入本官勅内則河南山東直𨽻一帶黄河皆有憲臣分管而運道可保矣縁係乞命憲臣兼管河道事理未敢擅便為此具本專差承差張譽親齎謹題請㫖脩長隄以保運道疏題為脩長隄以保運道事節據山東按察司管河兼整飭曹濮等處兵偹副使陳文沛呈據直𨽻大名府管河通判郭從道呈蒙本道案驗奉欽差總理河道事務工部右侍郎兼都察院左僉都御史潘希曾劄付坐委卑職督領本管人夫脩築豐沛長隄工程竊照前項創築之隄為防西水衝噬之患自沛縣淤塞運道以來無人不欲興築此隄者也今隄功報成足以為經乆之計矣合無照依直𨽻山東事例或設老人或置鄉夫時常巡邏看守則隄功不致損頽而運道可保無虞等因到道查得直𨽻山東河南三省一帶黄河北岸先年設有長隄月隄以防水患兩畔揷柳一以䕶隄為長乆計一備採稍為河患用又每三里蓋鋪一座撥夫看守仍設老人往來巡視合無備行單豐沛三縣將一帶新隄照依前項三省舊隄規矩等因到臣看得三省舊隄連接五百餘里外防黄河内保運道各設管河副使同知通判主簿等官管束河道人夫栽揷楊栁採辦樁草看守鋪座脩填隄岸每於夏秋水發之時併力捲埽防禦河患遇有淤淺亦就挑濬近年河決單豐沛地方沙淤沛漕該臣議築三縣長隄一百四十里續據單縣官民申呈增築長隄至本縣戴富家後共一百五十里蓋造隄鋪凡五十座所以防黄河而保運道與三省舊隄事體一同今單縣河道係山東管河副使該管豐沛河道已經題准係徐州兵偹副使兼管惟州縣管河官員及守隄人夫尚未議處謹將應設官夫查照舊隄事例參酌地方事宜開欵于後伏望皇上垂察特勑該部計議施行則長堤可垂永久而運道無虞矣縁係脩長隄以保運道事理未敢擅便為此開坐具本專差承差張譽親齎謹題請㫖計開一兖州府單縣河道官夫查得本府城武縣近年河患已逺管河主簿郭景輝在任事簡乞將本官改注單縣管河就將單縣均徭河夫二百二十九名隣近金鄉縣均徭河夫一百六十八名令其管領守隄每三鋪設一老人巡視平時脩隄揷栁採辦椿草夏秋水發之時聽本府管河同知調度於𦂳要處所併力捲埽以防河患其城武縣河夫仍聽同知總管則官免增設夫免加僉而事亦有備矣一徐州豐沛二縣河道官夫查得本州管河判官例該沛縣住劄宜令兼管豐沛黄河沛縣管河主簿宜令兼管本縣黄河豐縣欠管河官乞照例設主簿一員令近隄住劄就將蕭縣近年僉復閘溜淺夫并原存淺夫共六百二十七名碭山縣近年僉復閘溜淺夫并原存淺夫共三百八十二名分撥豐沛二縣主簿各管領守隄每三鋪設一老人巡視平時脩隄揷栁採辦樁草夏秋水發之時聽本州管河判官調度如或不敷量調徐沛運河人夫於𦂳要處所併力捲埽以防河患則官不缺人役不擾民而事亦有備矣一查得徐州洪閘官夏時先經總理河道侍郎章拯薦其警敏知事令同沛縣主簿寗時智往來脩濬該本部覆題各官果能盡心職務河患平息聽總理河道官奏請量擢自去年冬臣委本官於豐沛地方捲埽脩隄尤能效勞成事且熟知河患可使防守如蒙准設豐縣管河主簿乞將夏時陞補則河道亦有頼矣異常大水幸保運道疏題為異常大水幸保運道事節據河南按察司管河副使周忠呈據開封府同知閻祺潘國臣呈嘉靖八年六月初五日據管工義官孟雷報稱本日子時黄河泛漲將孫家渡口衝决灌入新開河内隨帶本官親詣孫家渡相看河水委實洪大奔趨本口順流滿漕而下其深大約丈餘隨有木客郭愷郭亨等木筏三十餘座亦隨水而下通流無阻又據開封府蘭陽縣申本年六月初五日黄河泛漲水發一丈本日亥時將新挑趙皮寨河衝開見今通流又據直𨽻徐州沛縣申本年六月初七日夘時水勢陡漲出岸衝入街市午時水至縣門夜三皷將察院倉庫監獄六房各官宅舎渰倒巻案般救不及儒學文廟西廡欞星門諸生號房教官宅舎亦被淹倒黄水平有三尺又據委官城武縣主簿郭景輝禀報沛豐長隄本月初七日辰時黄水溢出岸上流至隄下深者五六尺淺者三四尺瀰漫洶湧掃衝隄埽乞行相度防䕶庶保無虞等因各到臣竊照今年五月以來兖濟地方雨水大發近日黄河泛漲尤甚决孫家渡灌趙皮寨渰沛縣漫長隄三日之間千里并至除沛縣拯恤事宜係撫按衙門施行外看得長隄初成而黄河驟漲頼脩築頗堅不被衝决隄裏田廬免于渰沒而濟沛一帶漕河由其故道黄沙無自來淤塞不復作即今糧運通行水勢漸平且孫家渡既淤下流受害連年挑濬工未及半一旦自决而通夫豈人力皆由我皇上憂勤一念仰格天心故天相成功渡口乆塞而忽通長隄甚危而獲安也臣仍行河南管河官俟黄河落後查勘孫家渡趙皮寨二河如有淤淺之處量加挑濬以偹分疏及行山東直𨽻管河官將單豐沛長隄再加脩培以垂乆逺庶運道自此無虞矣縁係異常大水幸保運道事理為此具本專差承差任舉親齎謹具題知議處河道官員疏題為議處河道官員事據河南按察司管河副使周忠呈稱孫家渡開自𢎞治六年迄今脩濬不知凡㡬但既濬之後水或暫通而不復為偹沙旋淤塞賀村以下今改須水流入則浮淤自可蕩滌惟渡口二千五百歩水落泥積宜時常脩濬合於鄭州添設判官一員責令渡口住劄就將該州并所屬四縣河夫共九百七十六名分作兩班每年量調一班自二月初興工三月終止如或積泥頗重用夫數多將該州并屬縣年例堡夫二百名調撥協濟庶民不久役而水可常行矣又稱儀封縣先年因黄陵岡衝决添設主簿一員專管河事近年河患已徙於紙房杜勝等處係𨽻東明縣地方見今員缺似應裁革等因到臣看得孫家渡既已挑通必須專官管理庶免復淤其儀封縣管河官委的事簡可省及查得虞城縣縣丞李希蕙年資久而守不渝脩濬勤而績已著用之管河足以稱職乞勅該部計議合無將儀封縣管河主簿裁革於鄭州添設管河判官在孫家渡住劄管束該州并屬縣河夫以時脩濬仍查訪縣丞李希蕙如果相應就以本官陞補鄭州判官則河道有備而官使亦得人矣縁係議處河道官員事理未敢擅便為此具本專差承差任舉親齎謹題請㫖及時疏河以防水患疏題為及時疏河以防水患事據河南按察司管河副使周忠呈報挑濬過榮澤縣孫家渡自本渡口起至鄭州地方姚店止長三十三里一百四十三歩於本年六月三十日工完又自渡口西北挑濬舊河形長二千二百歩於本年十月初二日工完河水通流船筏往來等因到臣查得先為疏支河以防水患事該臣具題奉聖㫖是潘希曾所奏漕河壅塞原委明白甚為有益足見用心便冩勑與都御史潘塤着嚴督管河副使調集夫役選委相應官員將孫家渡上𦂳疏濬務在深濶以殺河勢功成之日還著潘希曾閱實具奏工部知道欽此嘉靖八年四月二十六日准工部咨為應詔陳言以彌災異事該本部題議得治河通運國計重大夏秋水漲正在春暮用工不宜停罷如果人民災困支給在官夫價多方逺糴救其饑餒督其工力務使河工不誤而民命兩全奉聖㫖是這工程事干運河着巡撫官㑹同督理河道侍郎潘希曾公同計議從實具奏定奪欽此本月二十八日隨准工部咨為及時疏河以防水患事該本部題近查巡撫河南都御史潘塤奉有欽依致仕遺下前項脩河工程無官督理况今四月將終正在𦂳急用工之際合無降勑一道星夜差人齎付彼處巡按御史胡效才將都御史潘塤遺下一應治河事務通行嚴督整理仍一面行文本部右侍郎兼都察院左僉都御史潘希曾亦要不妨運河往來總督整理不得因而推託誤事其巡按御史奉勑以後河功懋著比之潘塤事有成效聽侍郎潘希曾具奏上聞奉聖㫖是治河工程依擬寫勑與巡按御史胡效才嚴督管河等官趂時整理通行侍郎潘希曾往來公同督視勿得推託誤事待巡撫官員到日另行具奏定奪欽此臣欽遵節行管河副使周忠嚴督官夫如法挑濬及親詣孫家渡閲視外看得去任都御史潘塤督過工程僅及三分之一御史胡效才奉命接管乃能究河道之始末念工力之繁難議處錢糧人夫選委官屬督同副使周忠及時經理又於河漲口决之後察其水落沙淺之形加力挑通為國逺計使河流分於上而運道安於下且頻年難成之功四越月而告成厥功懋矣乞勑該部議處合無將御史胡效才副使周忠量為陞賞庶以勵賢勞也除巡按衙門徑自造冊奏繳外縁係及時疏河以防水患及節奉聖㫖功成之日還着潘希曾閲實具奏并節奉欽依巡按御史奉勑以後河功懋著聽侍郎潘希曾具奏上聞事理未敢擅便為此具本專差承差劉世臣親齎謹題請㫖河功告成疏奏為河功告成事據委官管河郎中丁洪李重管閘主事李邦直山東管河兼漕濮兵偹副使陳文沛兖州府同知陳約徐州判官温文標等各冊報築過黄河北岸長隄自沛縣舊土城起歴豐縣至單縣戴富家後止共長一百五十里一百二十二歩下埽二千三百九埽嘉靖八年四月十七日工完造過隄鋪五十所每所瓦房三間共一百五十間本年六月二十一日工完濬過沛縣至濟寜運河淤淺九十二處共長三千八百丈五尺培過隄岸缺口七十二處共長一千九百五十丈三尺脩過橋壩共一十三處本年七月初六日工完幫過長隄一百一里二百二十四歩加埽二千四百三十一埽本年十一月初四日工完委役過官并吏老等役二百八十四員名人夫二萬九千二名匠役一百一十九名船戸四百八十三名動支過原脩河并河道銀共二萬六千九百一兩五錢一分七釐一毫五絲原脩河米豆共一萬四千五百七十八石四升五合二勺樁木杉條共一萬五千二百四十四根草葦栁稍雜柴共一百一十一萬六千六百二十一束檾繩草繩共一十三萬二百一十五條檾麻廢纜舊鐵器共一萬六千六百九十二斤甎瓦共一十二萬一千八百箇石灰五百䂖又據河南管河副使周忠呈報濬過趙皮寨口本年六月二十六日工完濬過孫家渡三十三里二千三百四十三歩本年十月初二日工完各到臣節該欽奉勑近年沛縣迤北漕河屢被黄河水漲衝開隄岸河流淤塞朝廷恐阻滯糧運節命侍郎章拯都御史盛應期等㑹同督理未見成功該廷臣㑹推爾素有才望特加憲職命爾前去督理該本部覆爾所奏以孫家渡為上流支河必先疏濬以殺河勢然後可以施功誠為有見已勑都御史潘塤嚴督管河副使等官用功疏濬爾可作急前去公同淮揚鎮巡及山東河南北直𨽻撫按官督同各該三司掌印及管河守巡等官親詣沛縣等處相度河勢斟酌計處待孫家渡疏濬成功之日然後以次隨冝舉行或挑濬舊漕以通運道或脩築隄岸以防衝决凡事千河道勑内該載不盡者悉聽爾便宜處置事體重大者具奏定奪爾為大臣受兹委任尤須竭忠盡力多方咨訪悉心區處務在日下成功欽此欽遵臣議得沛漕之淤塞因黄河之傍衝黄河之傍衝因上流之未疏今冝疏支河以殺其勢築長隄以防其衝然後挑通沛漕自無復淤之患乃先請勑河南撫臣督濬孫家渡續行河南管河官加濬趙皮寨口一面督行各該司府議處及轉行各該鎮巡知㑹分委郎中丁洪李重副使陳文沛周忠等查調河道官夫支放合用錢糧起築長隄于沛豐單三縣蓋造守隄舖舎候過暑雨仍加幫培又委主事李邦直管濬沛縣迤北漕河培補隄岸脩置橋壩仰頼皇上洪福一年之間各工次第報完支流疏於上而黄河之勢以分長隄障於下而黄河之沙不入沛漕挑通糧運徑過雖六月八月兩經大水無復淤塞之患矣除趙皮寨係本處河夫如常挑撈孫家渡係接管御史胡效才造冊奏繳外今將報到長隄并沛漕工程縁由查算相同除備造文冊畫圗貼説外縁係河功告成事理為此具本專差承差張譽親齎謹具奏㫖計開繳河功文冊一本畫圗貼説一本旌舉賢勞官員疏題為旌舉賢勞官員事先准工部咨内開本部右侍郎潘希曾奉命總理河道重務其河南山東直𨽻都布按三司并府州縣衛所等官有諳曉河事者從其選委事有成效聽本官從公舉薦等因具題奉聖㫖是欽此欽遵該臣議得沛漕之淤塞因黄河之傍衝黄河之傍衝因上流之未疏今宜疏支河以殺其勢築長隄以防其衝然後挑通沛漕自無復淤之患乃請勑河南撫臣督濬孫家渡及行河南管河官加濬趙皮寨口分委郎中主事副使同知等官一面起築長隄于單豐沛三縣一面挑濬沛縣迤北一帶漕河一年之間各工次第報完支流疏於上而黄河之勢以分長隄障於下而黄河之沙不入沛漕挑通糧運徑過兩經大水不復淤塞此雖資官府之財藉人夫之力以有成亦由各官盡心分理竭力趨事之所致也如調任虞衡司郎中丁洪處事周詳為人耿介都水司主事李邦直設施有序才行俱優調任霸州兵偹副使陳文沛剛敏有為操持克慎河南管河副使周忠蒞政精勤飭躬端謹皆分董大工共致成效者也如兖州府同知李仁陳約通判張儒大名府通判郭從道開封府同知閻祺潘國臣任府佐而各稱厥職如濟寜州判官楊時中徐州判官温文摽項情邳州判官楊政單縣主簿郭景輝貳州縣而各有所長皆分管工程效勞脩濬者也乞勑吏工二部查議如果臣言不謬將前項各官甄録量為陞擢則賢勞有勸矣縁係旌舉賢勞官員及奉欽依事理未敢擅便為此具本順差承差張譽親齎謹題請㫖多病乞休薦賢自代疏奏為多病乞休薦賢自代事臣自去年七月奉命治河夙夜兢惕勞心宣力今年六月以來半身頭面麻木手足痿痛服藥炙火醫治㒺效於時以河功未上不敢自陳勉强力疾狼狽至今加以腸風舉發失血日甚勢不得不自陳也竊思往年沛漕沙淤旋挑旋塞以黄河一溢則一淤也今既請濬孫家渡加撈趙皮寨以分其勢起築長隄于單豐沛三縣以防其溢挑濬沛漕通利糧運兩經大水不復淤塞又請勑除用兵偹副使兼管豐沛徐淮黄河則河南山東直𨽻一帶皆有憲臣管黄河矣又議處孫家渡趙皮寨撈淺官夫則支河可常通矣又議處單豐沛三縣守隄官夫則長隄可永固矣運河又有郎中主事等官如常管理矣使臣不患疾病不知止足亦不過坐靡廩禄無他猷為此臣今日所以得自陳也臣又思大臣有以人事君之議雖得謝不忘為國之誠查得先年督理河道嘗以都御史通政等官今訪得河南右布政使陶諧忠鯁著名老成行事副使周忠蒞政精勤飭躬端謹霸州兵偹副使陳文沛剛敏有為操持克慎且皆嘗任管河號稱諳練者也伏望聖慈賜臣休致以便調理仍勑吏工二部議請將陶諧等量陞一員代臣其過臣必逺矣縁係多病乞休薦賢自代事理未敢擅便為此具本順差承差郭喬親齎謹具奏聞伏候勑㫖薦舉河道方面官員疏題為薦舉河道方面官員事臣奉命治河一應河道事務督同各該三司掌印及管河守巡等官從宜議處頼以集事中間賢能官員臣不敢蔽除河南右布政使陶諧管河副使周忠霸州兵偹副使陳文沛素諳河事臣具薦自代外訪得山東右布政使邵錫歴官秉忠直之節敷政得承宣之體按察使顧應祥風裁表乎僚屬歴練優于政務左參政邊憲文學足以飭政端厚慎於行已張宏氣剛正而不撓事敏達而無滯天津兵偹副使姚文清司憲而肅紀綱詰兵而清河路僉事沈圻執法出自内臺秉公施於有政河南右參政伍全勤慎協于官箴老成堪總藩政副使樊繼祖署總司而憲度明正一已而屬吏服僉事祁鶴勤巡歴而政舉崇儉素而守嚴王洙能其風憲之官勵于清脩之行以上各官皆河道有千賢能堪薦者也乞勑吏部查訪如果臣言不謬將各官甄録量為陞擢則賢能有勸矣縁係薦舉河道方面官員事理未敢擅便為此具本專差承差郭喬親齎謹題請㫖薦舉河道郡縣官員疏題為薦舉河道郡縣官員事臣奉命治河一應河道事務督行山東河南直𨽻各該府州縣官從宜區處頼以集事中間賢能官員臣不敢蔽除管工同知等官李仁等另具旌舉外訪得兖州府知府劉夢詩愷悌得民牧之體明敏堪繁劇之任東昌府知府王杲用財省而宜于民守已嚴而達于政開封府知府劉漳政平易而近民性明達而有守淮安府知府葛木刑清而政兼舉守慎而民相安揚州府知府陶儼居官不携家累恤民尤重夫差大名府知府樂頀歴練而政疏通公平而民懐服皆作郡之賢能者也滋陽縣知縣谷鸞寛嚴之政適宜勤慎之行不茍山陽縣知縣姜潤身秉清節而民甚宜更劇邑而才始展江都縣知縣劉良卿器偉而操履端才長而廢墜舉長垣縣知縣王懋風紀素著賢聲遷調益諳政體沛縣知縣平世祥理疲弊之邑得張弛之宜豐縣知縣髙禄撫墊溺之民脩平易之政皆作縣之賢能者也以上各官俱堪薦舉乞勑吏部查訪如果臣言不謬將各官甄録量為陞擢則賢能有勸矣縁係薦舉河道郡縣官員事理未敢擅便為此具本順差承差郭喬親齎謹題請㫖謝恩疏奏為謝恩事嘉靖九年六月初三日准吏部咨為及時疏河以防水患事内開該本部具題嘉靖九年五月二十一日奉聖㫖潘希曾准加尚書俸級着照舊用心總理河道欽此臣欽遵望闕叩頭外伏念河流自昔靡常運道於今為重禀綸音以從事職分當然頼國福而幸成胼胝奚有乃蒙天恩㒺極日照不遺采吏工兩部之言錫俸級二品之盛福逾涯分惟深覆餗之虞報乏涓埃徒切傾葵之愫臣不勝感戴天恩之至為此具本專差承差張譽親齎謝恩謹具奏聞河道疏題為河道事據管河郎中黄行可呈蒙欽差總理河道事務工部右侍郎兼都察院左僉都御史潘批據直𨽻淮安府申前事批仰本職作速勘處通行回報備行淮安府轉行本府並淮大二衛掌印管河官員㑹同勘議停當呈來覆勘去後續據該府經歴司呈承准本府照㑹准通判李重牒稱㑹同本府掌印知府葛木并淮大二衛掌印管河指揮蔣繼爵等親詣信字方家二壩議勘得新莊閘口縁在淮河上流故其水勢常髙裏河數尺清江浦月河縁下新莊口二十餘里故水視彼已低二尺方家信字二壩又下月河二十餘里故水視月河又低二尺若於其旁開口置閘則裏水可以順出後或淮水涸落之甚而懼裏水走洩則閉閘而開月河又甚則閉月河而開新莊閘若或外河漲盛則三口俱閉而暫車壩隨宜開閉庻工力不致太費而運道可以無虞柰建閘地基在信字壩尚有不便蓋必由通津橋而東行二百餘歩轉折而北又須拆民居房室數家方可建置其方家壩則壩西觀音堂前已有空便基地且觀音堂係尼僧創建應合拆毁先作石閘一座仍將裏口新建板橋再加樁木築打中畱閘門立木枋挨牌啓閉節水可以祛水患通運道除已脩完方家信字二壩省令一應船隻俱由車盤外等因牒府備呈本職又經親詣閲視得清江浦月河與方家信字二壩地形水勢委漸低下除信字壩工費浩大難並建閘外合先於方家壩旁次及原議清江浦月河口各建石閘一座裏水可以順出酌量淮水消長隨宜開閉車盤若水落之甚仍開新莊故道經行糧運庻免妨阻之患實經久可圗之計也其通判李重欲以石閘之裏又造木閘似為重併無益又經公同知府葛木等覆議相同等因具呈到臣據此㑹同總督漕運兼巡撫鳳陽等處地方都察院右副都御史劉節議照淮黄合流自西而東初經新莊閘又東二十餘里經清江浦月河又東二十餘里經方家壩水勢趨東愈下故岸形迤東漸髙每年夏秋河漲湏閉新莊閘以防沙水内灌船由月河往來漲甚又湏閉月河口以防沙水内灌惟方家壩岸形稍髙可以開口行船且洩裏水之溢故郎中黄行可知府葛木等議要先於方家壩旁次及原議清江浦月河口各建石閘一座與新莊閘座隨宜開閉若或河漲大甚則三閘俱閉船由信方等壩車盤盖因時救患通漕之計也及照該府原申内開各屬淺夫原額雖有一千二百名除逃亡事故外實在工僅有一千餘名且各處築濬恐不敷用合仍顧覔人夫三百名相兼淺夫匠作併力掘砌其作閘物料聽管河郎中查取貯有河道錢糧去處動支買辦夫匠工食合量動漕運無礙官銀查照舊規日給銀三分淺夫亦宜日給米二升或銀一分計其勞費亦不甚多伏望皇上軫念地方水患及漕運急務特勑工部計議合無俯從所請於前項地方開設石閘二座合用人夫錢糧臣㑹同都御史劉節從宜區處府衛管工委官俱屬管河郎中黄行可提調督理事完造冊奏繳庻運道有備而水患亦稍除矣縁係河道事理未敢擅便為此具本專差承差王鼎親齎謹題請㫖黄河復由故道疏題為黄河復由故道事嘉靖九年十月初八日據河南管河副使周忠呈查勘得虞城縣原有小股河本年六月以來自上源衝開由歸德州丁家道口直至本縣地方横流往夏邑并直𨽻碭山縣去訖本月二十四日據兖州府單縣管河主簿郭景輝呈勘得黄河至曹縣地方胡村寺東衝開一道濶三里有餘東南至本縣賈家壩入古蹟黄河由歸德州丁家道口至徐州小浮橋入運河胡村寺東北衝開一道濶一里有餘又分為二支東南一支經虞城縣至碭山縣合古蹟黄河出徐州東北一支經單縣長隄盡頭至魚臺縣漫為坡水傍谷亭入運河其單豐沛三縣黄河賴長隄障迴即今沙淤平滿民多耕作不復為沛漕之患等因各到臣巻查節據兖州府管河同知陳約呈本年六月初二日黄河溢出河岸流至單縣長隄脚下深五六尺瀰漫東流徐州碭山縣申本年六月二十四日黄河泛漲自上源虞城單縣二處衝流入境開封府歸德州申本年六月二十六日黄河水大漲將上源梁靖口等處衝開漫入虞城縣境内已經臣督令各該管河官於河患處所加謹脩防候汎濫稍退流派可辯仍將河道變遷縁由勘報去後今據呈報前來查得黄河由歸德州至徐州入漕河者故道也永樂年間濬開封支河達魚臺縣入漕河者以濟淺也自𢎞治年來黄河改由單豐出沛之飛雲橋而歸德故道始塞魚臺支河亦塞然以其出於沛橋亦可資以濟淺以其逼近沛漕又恒有衝決沙淤之患朝廷連年脩濬勞頓甫息一旦全河復其故道則患害已逺支流達於魚臺則淺涸無虞矣雖河性靡常不可逆覩由今觀之實漕運之利而國家之福也縁係黄河復由故道事理為此具本專差承差王鼎親齎謹具題知薦舉河道方面官員疏題為薦舉河道方面官員事查得山東布按二司右布政使等官邊寭等河南布按二司右參政等官伍全等先嘗經臣薦舉者不復枚舉外訪得山東左布政使李緋承宣優大藩之任精練敏庻政之脩右參議何璦敷政宜於地方持身得於勤慎曹濮兵備副使嚴時泰飭武備而河防脩贍文詞而操守慎徐州兵備副使何鰲執法而汚吏有懲詰兵而河務兼舉僉事史臣巡歴勤而所守嚴刑獄慎而法事習河南按察使今陞右布政使林大輅總憲司而綱紀克嚴布藩政而蕃宣允稱以上各官或掌印或守巡或兼管河皆有禆河道賢能堪薦者也乞勑吏部查訪如果臣言不謬將各官甄録量為陞擢則賢能有勸矣縁係薦舉河道方面官員事理未敢擅便為此具本順差典吏髙志仁親齎謹題請㫖薦舉河道有司官員疏題為薦舉河道有司官員事查得山東兖州府知府劉夢詩直𨽻淮安府知府葛木大名府知府樂頀河南開封府同知潘國臣山東兖州府同知李仁等先嘗經臣薦舉外訪得直𨽻河間府知府徐景嵩公忠秉給諫之舊政理有循良之風滄州知州呉成禮性淳而守不失才敏而政益脩揚州府同知郝守正為人負宏深之器署印彰練達之才通判白鎰行已亷而輿論歸供事勤而厥職舉髙郵州知州曹曙才優而薦更劇州行謹而復諳河事淮安府通判李重佐郡素長幹理督工尤效勤勞山東東平州知州胡松年妙而學識優政勤而操持慎以上各官或掌印或管河皆賢能堪薦者也乞勑吏部查訪如果臣言不謬將各官甄録量為陞擢則賢能有勸矣縁係薦舉河道有司官員事理未敢擅便為此具本順差典吏髙志仁親齎謹題請㫖自陳乞罷以彌天變疏奏為自陳乞罷以彌天變事近日午門西樓雷震垂眷皇上過自貶抑諭羣臣同加脩省盖克謹天戒以奉迓天休即古帝王洚水自儆大旱自責之心也顧臣僚託體股肱不能為陛下代天之工而致天之譴罪復奚迯臣才識素劣衰病交侵叨貳本兵曾無寸補固冝罷黜者也伏乞聖恩賜臣退休簡賢能以充任使庻㡬天工不曠而天意可回矣縁係自陳乞罷以彌天變事理為此具本親齎謹具奏聞伏候勑㫖計處大政以圗治安疏題為計處大政以圗治安事職方清吏司案呈本部送吏科抄出廣東道監察御史郭希愈云云奉聖㫖該部看了來説欽此欽遵抄出送司案呈到部看得廣東道監察御史郭希愈題稱推陞兵部左右侍郎要於素在邊方曾經督兵及才識膽畧謀猷為衆所推服者註實請用内分一員専一講求邊方軍務一員専一講求腹裏軍務又各自選有智計屬官一二員為之贊畫遇有警報各照地方即與尚書言之以調度若聲勢重大亦各照地方即與贊畫屬官前去提督以决勝等因除准吏部咨稱議推兵部侍郎一節本部查覆外查得諸司職掌兵部尚書侍郎之職掌天下武官選授及天下地圗城隍鎮戌烽堠與夫傳驛廐牧戎器等政則凡邊腹軍務皆侍郎職分之所當理與尚書共濟者也似難分限以致乖隔其屬有四曰武選職方車駕武庫則凡邊腹軍務乃各該郎中員外郎主事分任而習理者也似難又專委一二人贊畫及照我國家百六十年來如遣將總兵率以公侯伯都督等官遣文臣總制或提督率以尚書侍郎都御史等官然皆臨時命文武多官㑹推堪任大臣二三員上請簡用事平則將歸於班行兵散於營衛故將無乆擅之權兵無不戢之患兹欲以兩侍郎分領邊腹軍務似未悉我祖宗臨事遣將之深意况預定左右侍郎將兵之任則各處撫鎮等官皆將觀望諉避不免誤事或所擬侍郎一有事故該地方用兵又將誰屬豈諸大臣中遂無一人可屬此亦似非通論臣等俱不敢擅擬其本官所陳武備事冝則皆切於時務合候命下移咨總制提督巡撫等官申明脩飭仍將某邊與某邊相隣某省要害與某省相接地里相距若干彼此可否策應山川形勢之險夷鎮戍城堡之脩廢軍民兵馬之精壯衰耗糧料有無足給器械有無堅利地方有無應合增脩事務及戰守機宜將領賢否等項各開欵備造小冊一本及畫圗貼説付公差人役附齎繳部以慿參考施行惟復别有定奪均乞聖裁縁係計處大政以圗治安及奉欽依該部看了來説事理未敢擅便謹題請㫖比例乞恩請給書籍疏奏為比例乞恩請給書籍事臣聞之禮曰天子聽外治后聽内職外内和順國家理治此之謂盛德三代而下此道㣲矣㳟惟皇上德隆神聖治務本原以大學衍義實治國之規三后傳訓實理家之要乃命工翻刻序之宸翰而以衍義進講於經筵傳訓示法於宫壼隨復頒賜臣工傳播遐邇此誠欲内外各正其位臣民咸式其言以成中興和順之治而上比於三代之隆甚盛舉也臣彼時以工部右侍郎奉命總理河道在外未預頒賜之列聞兹曠典實切欣慕久欲上請懼凟聖聰查得近該御史李美等奏請前書已蒙准給臣輒敢冐昧以聞伏望皇上一體頒給俾臣得日夕覽誦近以為脩身之模而什襲珍藏逺以為傳家之寳感荷恩私世世無極矣臣不勝願望之至縁係比例乞恩請給書籍事理為此具本親齎謹具奏聞伏候勑㫖竹澗集奏議卷四
