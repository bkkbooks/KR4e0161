body:
  text: 竹澗集卷七明潘希曾撰墓銘狀碑祭文二十三首東溪居士陳君墓碣銘浙之義烏有曰東溪居士者葬邑西楊村其子勤以墓文請予與居士同郡而勤嘗從予游故聞居士之風舊矣雖不敏弗容於辭居士姓陳氏諱俊字彦秀號曰東溪世居邑之倍磊為聞家其先有曰垠者任松楊教諭垠傳錝徐州知州錝三傳為啟聰甫樂善好施夀而且康即居士父也居士質性剛毅不事表襮讀書了大義自少孑立無兄弟事父盡歡喪母哀而有禮處宗族無間言賙鄰黨不靳嘗建居室以抑畏為扁衆目之曰此謹愿人也嵗饑應募輸粟有司榮以冠帶辭弗受又目之曰此古朴人也里閈之求直者率恂恂片言解紛以去又目之曰此忠直人也夫孝事其親仁睦其族而行義重於鄉之人一命弗沾一善莫名居士之於為人果何如也世有所謂隠君子者其殆斯人歟其殆斯人歟卒正徳二年三月二十七日享年五十有五配朱氏有賢行子三人曰惟正曰勤曰惟榮皆克家勤尤性敏嗜學駸駸嚮用居士隠徳将藉以顯矣銘曰倍磊陳氏太丘之裔雲仍多賢徳星恒麗湜湜東溪居士樂只源深流長比徳之美仁不必夀維名之垂才不必用維後之貽楊村之原穹碑在焉百世而下可誦以傳處士義翁潘先生墓碣銘婺源處士義翁潘先生既卒葬邑北之硤石源其配胡孺人附焉正徳辛未子錡舉進士奉先生從弟玉卿僉憲所為事狀請銘於碣錡嘗從余游而玉卿與余同年進士以是稔聞先生之風按狀先生諱瑛字玉英義翁其别號世居邑之桃溪其先閩之三山人唐末逢辰者避亂於此因家焉髙祖諱侑隠居行善當洪武初法禁嚴切獨以謹厚全門户曾祖諱虎克世其業祖諱勤成年二十早世父諱烱資幼孤長克自立以子貴贈文林郎蘄水縣知縣母齊氏贈孺人繼母胡氏封太孺人先生兄弟四人行第二其季曰珏官至福建僉憲先以治縣有績獲贈封父母云先生天性孝友肯堂肯構嘗作棣萼聯輝樓以怡兄弟學士篁墩程先生記其事平心率物不吝施予好詢人所行失得勇於克已宗族鄉黨咸愛且敬强者愧屈罔肆弱者得藉賴自立一日見餓夫墮溝中衆委之去獨起而飲食之得不死人稱之曰義翁先生聞而笑曰斯名詎取當顧名思義可也自是居常器用悉書義字蓋取盤銘之意性敏善記憶凡學庸語孟典謨訓誥皆能黙誦雅好觀史客至與論古人成敗歴歴指掌喜奨進後輩族黨賴以成者甚衆教子弟尤勤故僉憲君輩先後登庸為時名臣錡方接武仕途潘氏之所以益昌大者不偶然也孺人雲峯先生八世孫崇陽尹濬之姊勤儉孝敬協徳於夫每誦雲峯言曰一日茍存願存一日好心願為一日好人旦必焚香祝天務積隂徳以貽後嗣比先生歿矢心教子脱簪珥為費要於其成而後已克婦克母先生生正統辛酉以成化丙午卒春秋四十有七孺人生正統己未後先生十六年卒春秋六十有二長子銓次鏡次即錡長女適髙安程鳳次適富春吳深孫男五人天潤天活天清天潮天漢孫女四人銘曰賢哉義翁不愧其稱人則稱我我斯服膺貿貿斯世惟利是趨不詭以隨由我坦途宜其家人義形于内宜兄宜弟義著于愛子孫多賢維以義方鄉閭化之義聞孔彰孰利不害孰義不利賢哉義翁以克永世漁隠先生潘公墓誌銘𢎞治乙丑七月二十一日我伯父漁隠先生卒其子海門司訓榮之官舍扶柩歸葬寓書京師俾希曾銘其墓希曾時居諫司會多故未果越十三年乃克造銘勒石追瘞壙前嗚呼痛哉先生諱瑋字用夫姓潘氏世為金華儒籍曾祖諱彦亨洪武中徵取人才祖諱文華贈監察御史父諱洪官至廣西按察僉事贈奉政大夫修正庶尹母吳氏封孺人贈宜人兄弟六人長諱璁官至無為州節判次即先生次諱瑄次諱璋官至陜西按察副使贈中憲大夫希曾先府君也次諱璛次諱環先生自幼隨宦京邸佩服庭訓兄弟自相師友諸經子史多涉獵攻詩善屬文後從少司冦滁陽劉公游造詣益深景泰甲戌僉事府君卒於官時長兄不在側先生奉母攜弟妹歸喪萬里以禮襄事既免喪慨然歎曰老母在堂吾兄既縻於官吾不能復離膝下求仕進也諸弟勉之於是一意孝養愉婉承順務得親之歡心甘㫖饋祀門户一不以累其兄若弟如是者二十年母宜人以夀終節判府君遷轉三州先府君亦已成進士官朝行矣天順中郡縣薦先生才徳辭不就後屢以鄉飲請皆辭不赴成化乙巳訪先府君於蜀縱覽山水而歸𢎞治庚申就海門之養優游五載尋卒先生天性醇樸篤於孝友父母在不忍一日去左右處兄弟怡怡無間言教子姪講授不倦與人交謙恭以和生長宦族而能甘淡薄樂隠逸人尤難之自棄舉子業古文益髙詩極清婉書得歐虞筆意妙自成家晩年放情觴詠與星齋錢先生諸耆碩為北山詩社士大夫求文者交於門因家雙溪之涯自號漁隠鄉人稱為漁隠先生而論君子者必曰漁隠漁隠所著有應酬稿湖蜀紀行録若干巻先生生宣徳己酉正月十八日享年七十有七以卒之明年某月某日合窆於朱氏安人墓在武義縣柘塢先塋之側安人邑名族南京刑部員外郎璲之女年二十一歸先生甚宜於家姑年髙得末疾安人晝夜扶持經嵗無倦容尤注意教子家政内助居多成化癸夘五月三十日先卒其生在宣徳庚戌十一月四日享年五十有四男子二人長即榮今陞龍溪教諭次植側室楊氏出女子一人適永康王玻孫男四人燧焯焲燿孫女二人銘曰惟潘氏居婺儒籍有聞詩書簪組是貽是承嗟我伯父其生振振禄弗自取惟以成弟昆學不必用世其家以文孝友自靖儒素終身評髙於鄉報在其子孫福建按察司僉事進階中順大夫潘公墓誌銘公諱珏字玉汝姓潘氏其先閩之三山人唐末逢辰者上書闕下不報避亂於歙徙婺源之桃溪遂家焉厥後世有聞人譜牒具存曾祖諱虎祖諱勤成父諱烱資贈文林郎蘄水縣知縣母齊氏贈孺人繼母胡氏封太孺人公賦性醇篤自幼劬書十嵗作詩有驚人語十有二嵗從鄉先生張文輝受尚書歴五寒暑學成會户當逺役而母病兄弟皆弱時署府事閻經歴以御史左遷公持詩文謁訴閻才之遣補邑庠生免其役天順甲申也是年冬齊孺人卒戊子蘄水卒蘄水初得疾為公兄弟析産以水田若干畝佐讀書既終喪公請於諸兄合爨肆力問學作風樹圖以寄哀學士篁墩程先生守制休寧公以所學往質之篁墩恨相見之晩曰君名進士也成化癸夘領鄉薦連登進士乙巳奉檄督賦南畿明年授湖廣蘄水令公至縣閱倉粟得六百斛駭曰令為民父母而水旱無備奈何爰下令取贖刑及訟紙咸入粟縣治中門兩旁建倉貯之號阜民倉越二年大旱盡發倉儲以賑貧乏簡下户丁壯分𨽻上户俾得傭作自給多種麥為來年計復勸分助賑以濟不足是嵗饑不為害自是益廣儲蓄更建倉縣治之北號聚民倉前後積粟八萬餘石久益賴之縣之南門渡恃舟以濟水涸易以木梁嵗費百金不免覆溺之患公合二年費為浮橋經久不病又以廟學湫隘闢而新之作興士類每為講授成材甚衆邑故多盜公令鄉民聚居列柵啟閉盜乃沮義官劉洪者實黠盜其子恥與同惡洪殺之事洩亟遣人分捕并獲其黨十數輩既而司府将脱之公具獄請對卒如公按初荆府致幣於公公對使封貯官庫别以禮報之嘗使人諷公欲婚其子公不可既又以所作畫來賜公為啟事辭謝於是王知公不可干矣久之王以罪廢公無染焉治蘄凡十二載秩滿當去賦别思詩士民遮道共立去思碑李教諭復取别思詩梓傳之名甘棠集𢎞治戊午遷金華同知率如治蘄而職専清戎尤慎勾稽未嘗徇權勢為取舍有蘭溪民誣姪夜毆叔殺其救妾縣官治姪死罪寃累年莫辨公閲成案見其初驗屍時不云何衣悟曰此必就寢所計殺之也豈有婦人裸而救鬬者耶詰之果服坐叔故殺罪而出其姪巡按陳君不悦曰獄屢經臺憲矣何是矛盾耶公争之陳不能奪三載奏績便道省太孺人於家有歸志還次嚴州投牒告繳部檄郡人士相率挽留而上官亦弗許尋就職乙丑武宗即位公入賀陞福建僉憲奉勅督理屯田明年正徳改元公上任考簿書革奸弊豪猾侵尅之徒悉寘於法屯政漸復一日監斬夜歸病不能寢食歎曰戮人不當其罪而力不能救何以仕為乃遣人上京乞骸骨時逆瑾擅權所知恐其得禍勸止之尋以鹽法忤中貴人中貴人隂主去公戊辰吏部書公年老致仕瑾猶坐以他事罰米百五十石時公六十有三得謝為幸云歸數月太孺人卒居喪執禮休沐十有五年足跡不出山惟赴鄉飲避冦兩至縣耳優游林泉文詠為樂夜課諸孫誦習不倦訂輯譜牒作勸善碑於道側睦族化鄉之意老而彌篤嘉靖改元今上皇帝以尊號覃恩進階中順大夫其年七月二十九日公卒生正統丙寅五月二十四日享年七十有七初號雪竹軒入官曰澹翁晩更萬巻山人人多稱澹翁先生云所著有甘棠集三覲稿晩遊録澹翁稿雲萍唱和展驥集桃溪族譜凡若干巻公質直自信好義不好名久資常調世罕知其為人半生仕宦攜家者僅四載清苦儉素終其身可謂之古君子矣配吳氏邑名家女封孺人生正統乙丑十一月十一日卒正徳辛未二月二十二日享年六十有七葬邑之齊村程家坑公平生不内顧者以孺人賢也男子七人鐸鎧鎮欽鎰鉛録鎮邑庠生鎧鎰鉛録早卒女子一人適同邑引禮舍人胡琨孫男十人濟滋潢河沐澍泳澥津澎濟滋皆邑庠生潢連舉解元進士為樂清令有聲孫女八人曾孫男一人士懋曾孫女二人鐸等将以卒之明年某月日奉柩合葬吳孺人墓乃狀公行禆鎮走千里來乞銘昔公倅金華希曾以諸生受知嘗遣鎮洎從子錡受學錡後登進士而公從弟玉卿憲長與予同年故最為知公不敢以不敏辭銘曰舉世脂韋以茍富貴直道事人不卑下位俗雖不合民則我懐令邑倅郡循良之才晩奉璽書僉被閩臬風裁獨持權璫見厄載歌歸來幅巾深衣古貌古心為鄉人師噩噩遺集不朽之器矧子若孫厥美世濟人之不遇一時謂何天定勝人公得孔多程坑之陽有封若斧公斯合葬其永千古封孺人劉氏墓誌銘孺人諱祥字淑鳳姓劉氏順天府丞菱溪石公之配大鴻臚介菴府君之子婦父諱廷茂國子上舍母柴氏二族皆滁之望故上舍擇壻必求如菱溪者孺人性聰慧幼習姆教稍長通書數年十六歸公逮事姑王宜人姑悦其孝夫賴其賢及公舉進士官京師以姑年髙不忍離留侍於家公尋以監察御史進階孺人遂有封號已而公按廣東王宜人夀終孺人黽勉大事竭其哀誠初以不克隨宦勸公置側室視其子不異已出晩得痰疾甚危既蘇謂公曰吾旦夕且不保宜及吾存為二子計乃均分貲産無毫髮私其所出又以母柴無後迎養十餘年迄送終焉以勤儉居富貴以恭讓處娣姒以讀書守身教子孫奉賔祭必盡禮御臧獲務使得所樂善賙貧終其身不衰凡宗黨語内則莫不稱孺人云孺人生成化丁亥四月五日以嘉靖癸未五月九日卒得年五十有七男子二人繼芳國子生繼先庠生女子一人許嫁士族繼芳嫡長也孫男四人坦庠生餘幼孫女二人卜葬於城南龍蟠山白水村之陽将以其年之十二月十日襄事公乃手狀淑行丐余銘余寓滁頗久雅與公善聞大夫士稱孺人之行如公言乃為之銘銘曰詩詠葛覃以著婦則載歌螽斯式彰母徳婉婉孺人衆美在躬以宜其家以代有終命服光華偕貴君子徳音不磨貽範閭里惟兹窀穸白水之陽勒辭堅珉千載其藏孺人李氏行狀孺人姓李氏金華處士王先生之配進士銓之母也父諱寶觀金華名族有隠徳母王氏孺人自幼端淑工女紅為父鍾愛嘗指謂母曰是女他日必能昌大其家及笄歸先生舅克厚翁一見異之曰是婦福器過人吾宗其賴之孺人修舉婦職協相家政王氏之産日裕以隆初為冢婦諸叔尚幼躬為縫浣飲膳比就外傅恒竭力資給叔瑁早世以其子為後至壯猶為諱䕶不令知自己出瑁遺一女與孺人女年相若且先後嫁孺人憫其失怙裝資必加厚焉姑邵嘗目之曰新婦好心地如此他日有好子孫是其報也先生善教子孺人一意贊之量諸子資性教以治生讀書各有専業𢎞治戊午銓舉浙江鄉試第三人明年成進士孺人每得報輒愀然曰吾舅姑望吾兒久矣顧弗及見奠告墓所哀若初喪其誠孝尤能追逺如此居常儉約至於禮賔䘏族曾不少靳處妯娌得其歡御婢僕得其力撫諸姪若已出故卒之日闔族大小痛惜之不獨其所親之哀也孺人生正統丁夘九月十三日卒𢎞治庚申正月二十五日得年五十有四男子四人長鑰次錦次即銓次鐸為叔瑁後女子一人適同邑周某孫男二汝謙汝嘉孫女一皆幼以卒年夏五月己亥葬城西畫堂光塋之側壬戌之秋銓詣其友人潘希曾請狀其事飲泣具道如此嗚呼婦徳如孺人可無稱述使就泯沒哉曩希曾在鄉校與孺人子銓相友善蓋嘗知孺人之為母矣銓少俊敏士人多樂與游孺人教以尊師取友逺無益交儕輩有為游戲者銓輒不敢近曰母将不悦也尤好為子聚書聞有典籍不吝重購一日比鄰弗戒於火延爇且迫時銓適他出孺人倉卒攬取羣籍一切蓋藏棄不暇顧是皆卓卓耳目所覩記者其可使無聞哉肆并述之以竢立言君子采焉令尹吕侯去思碑人有久而不能忘事有無所為而不能已此徳澤之孚而人心之公也義烏縣令吕侯盛去邑且三載邑之耆民陳良積輩将刻石以繫其思乃介醫官陳節之丐予文予蓋嘗識侯者而節之予友也其言曰侯建平人也起家進士莅吾邑凡六載始至聲色不少動久之民安士習胥若徒咸畏以服去之日衆弗忍舍既去益思之至於今不已其政則農桑學校是急抑强植弱平徭息訟取力於隙而百廢興殖財於儉而上供備約俗於正而異端詘條教有式追呼不擾用是家給人足風俗淳美當時臺臣具薦於朝而侯不以喜暨被徵命顧眷眷若弗欲棄去者蓋侯之績莫可殫述而侯之心誠不忍吾民矣吾徒野人思之不置則圖所以繫其思而傳於後微吾子之文則亦無所繫而又不必信於後之人予聞而歎曰民不難感亦不易感也撫我則徳虐我則怨世蓋有疾視其上者蓋有攘臂以亡其上者况乎去而思思而不忘若是耶詩曰樂只君子民之父母謂能子其民而民父母之矣又曰永言孝思孝思維則謂人子於父母思慕之不忘矣然則侯之見思固可以觀徳而若等所為惓惓兹舉固可以驗人心之公假使上出於干譽下涉於獻諛則去未必思思未必久而兹舉也未必待今日矣夫又奚取哉昔者子産遺愛孔子稱之何武去思史以為美談愚敢竊附其義為若等書匪惟繫一邑之思抑以示勸於将來祭外舅太守梅澗先生文嗚呼坦夷豁達町畦不立思公之徳其古遺直作牧名州甘棠勿拜思公之政其古遺愛歸休二紀文酒自娛官不滿能惟後之貽年髙七十太平遺老歸全造物曷挂懐抱我先大夫公表兄弟不才受知館甥于貳言念疇昔垂髫侍側撫我誨我期我成徳既長筮仕驅馳靡寧嵗月幾何訃音路聞棺不知殯竁弗及瘞拊膺痛心慚負無地始自策勵将用報公迂愚忤時速戾厥躬賦命自天何尤於人矢心弗渝敢墜大恩我酒既酹我殽亦薦陳辭敘哀神其來鑒祭湛母太孺人文惟靈徳嫓孟母子成鉅儒操觚翰苑黼黻帝圖惟帝乃嘉恩封是錫冠帔輝煌式章有徳潘輿就養萊綵承歡優游夀域聿終天年某託交賢子獲拜北堂瞻望弗及敬奠一觴尚饗祭盧母文惟靈夙抱懿質長歸名門主饋貞吉竭誠藻蘋禮相夫君家道日熾偕老八旬為人中瑞厥有賢子克由義方歴敭中外端委班行禄養既娛板輿方導俄焉告終豈天弗弔某等鄉里後生通家末誼緘詞逺将一觴敬酹尚饗祭太守徐廷實文惟公性敏而淳行恭以和問學夙成登名甲科仕逾一紀平生不渝明慎刑獄累遷大夫惟賢惟能帝心簡在擢守大邦藩垣攸賴一卧三冬竟以不起慶門未集弔途俄啟生稟之懿孰其畀之勳業之就孰令已而豈山川清淑之氣偶鍾人世倐散而逝雖造化亦莫知其所謂嗚呼生死旦夕彭殤何殊公於此理諒已不疑顧公之遺憾若在其身後而縉紳之流涕則悼夫仁者之不夀公易簀時援筆作書有姪曰杲可以後予公之繼室名門令徳育孤承祀矢死靡慝惟兹得所亦可以死死而有知目終瞑矣某等鄉里朋舊義同兄弟死喪之懐曷其有既方圖舉公之棺歸𦵏東峴薄奠致誠眉宇如見嗚呼哀哉尚饗祭孫母文嗚呼修短隨化物理之常惟徳之懿可以流芳閨壼之行無非無儀惟子之賢厥徳可知昔者軻親侃母皆以其子有聞百世之下雖死猶生安人篤生賢子甲科蜚英清才雅識慈範具存俄一疾以溘逝亦何歉於遐齡某等宦遊是邦辱交令子一奠之陳情弗能已尚饗祭憲副鶴軒戚先生文嗚呼古今人世惟夀匪易然夀或不足於富貴而富貴或不免於子孫之累豈造物無全功而人生難乎其值抑多福自求而本乎有徳之致先生登名甲科歴官臺寺早辭金紫之榮久樂林泉之味諸子競爽宦學世濟孫曾繩繩引之弗替是以身康心寧逍遥九十巋然人中之瑞矧先生儒業世承苦節自勵居鄉抗正直之風在公著氷蘗之譽不詭不隨惟禮惟義此先生徳之可見者而福夀所自也某等鄉里後生猥託姻契緬懐儀型悼兹長逝将微忱於薄奠庶來格之不昧尚饗祭俞夫人文猗歟夫人夙嫺姆教作嬪於俞尊章是孝惟勤惟儉葛覃之風子孫蟄蟄螽斯其同相厥夫子歴敭仕路三紀勳名罔復内顧夫子之賢惟邦之楨晩荷簡注掌憲帝廷來自南服夫人爰及榮膺誥封入朝宫掖翟冠霞帔有徳之章胡弗遐夀一疾溘亡某等辱知夫子咸仰内則一奠之将不勝哀惻尚饗沛縣飛雪橋祭大河文惟河導自積石會歸於海潤澤厚土通利舟楫功施博矣邇來河南支流多淤専趨沛徐遂貽運河之患兹非神意實任事者之責也某奉天子明命來治河事方議疏支河以殺上流修長隄以保運道躬率官屬閲視至飛雲橋敢竭誠致祭用祈神休惟神祐國祐民相予成功以報天子神其鑒之尚饗單縣祭后土文邇年黄河横溢運道屢淤天子特命某來治其事既議疏支河於河南以利導之爰築長隄始於單之林臺歴豐以迄於沛将以防横溢而保運道也兹者卜吉興工敢告於神惟神鑒之佑其成功尚饗沛縣飛雲橋再祭大河文去嵗之秋天子以河患未弭漕渠被淤特命某來治其事謹嘗告神疏支河於河南以分上流築長隄於沛豐單以防傍決方今春和厥工並興而裏河舊淤亦就挑濬庶幾運道通而河患不復作也凡此實賴神休相其成功惟神鑒之尚饗單縣再祭后土文往年河溢漕淤頗妨國計天子特命某總理其事既疏支河於蘭陽滎澤以分其勢爰築長隄於單豐沛以障其溢今厥功告成漕渠以寧實厚徳黙相之力也敢申祭告以彰報謝惟神鑒之永祐皇國尚饗滎澤縣孫家渡祭大河文自九河不分河患頗殷大明御宇地平天成雖間嘗決溢亦治以寧邇年支流堙塞單豐沛下決漕渠沙淤糧運阻澀惟是孫家渡故道可尋上命巡按河南御史督濬甚勤河伯效順忽決若傾人力因之厥功告成某叨總河事來視兹隅幸渡口與趙皮寨口二支並疏庶下流永奠而運道無虞也敬陳牲醴用報神休惟神鑒之翊我皇猷尚饗山川壇祈雨文社稷城隍同贛自六月不雨以至於今秋陽益驕晩禾日瘁民庶皇皇罔有攸賴匪民之辜實吏於土者不徳之致某忝鎮南邦良切競懼謹率羣屬惟神是籲神其早賜甘霖我民允濟謹禱開平忠武王廟祈雨文王開國元勳遺澤兹土廟食有年民實賴止今暵旱滋甚百榖将死王其終惠我民大沛甘雨庶我百職咸荷靈祉謹禱江東廟祈雨文惟神顯靈在在仰之矧是章貢為桑梓墟有災輒禱固民之私有禱必應亦神之宜自夏迄今旱魃猖披民則既病神豈罔知某恫瘝在身爾神是祈甘澤不靳三日為期謹禱靈山廟祈雨文古者國有凶荒則索鬼神蓋人力所不及舍神無以致其誠某憂時之旱不能為時之霖賴爾靈山降雨出雲庶幾相予濟此困民謹禱竹澗集巻七
