body:
  text: 竹澗集奏議卷三明潘希曾撰都臺下六首更任官員疏題為更任官員事據江西南安府申稱所屬南康縣地方衝要人民悍頑健訟知縣彭寅賦性純篤事難分理况兼各項公務冗沓切照上猶縣民淳地僻知縣洗滌年力壯强頗堪幹濟合無將各官更任管理庶乎才識各冝公務畢舉等因到臣竊照南康地要事繁非强幹之才莫任上猶地僻事簡則純篤之性所冝况彭寅到任已逾三月洗滌在任又逾二年其才性行事皆已可見故該府申請更任無非為地方計也伏望皇上勑吏部計議合無俯從所請將洗滌改南康縣知縣彭寅改上猶縣知縣則官使隨器而民牧皆得人矣緣係更任官員事理未敢擅便為此具本順差千戶陳琢親齎謹題請㫖自陳不職乞罷黜以弭災變疏奏為自陳不職乞罷黜以弭災變事近見邸報該禮部㑹奏修省等因節奉聖㫖兩京四品以上官著自陳竊念臣猥以疏愚誤蒙任使自受命以來將及二年於地方軍民之寄殊無寸補雖兢惕之心靡寧而災變之來未己况本年二月中嶺東殘冦竊發即今用兵剿捕勞民傷財實臣之罪如臣者蓋尤不職者也伏望聖明將臣早賜罷黜委任賢能則人事克修而天意可回矣緣係自陳不職乞罷黜以弭災變事理為此具本順差舍人劉髙親齎謹具奏聞伏候勑㫖自陳乞休以嚴考察疏奏為自陳乞休以嚴考察事竊惟朝廷黜陟之典所以勵世人臣進退之道在於審已臣年五十有二竊祿兩京歷官十任雖葵藿之誠向陽不改而蒲栁之質望秋先零兹當一面之寄尤為百責所萃驅策不前瘝曠是懼揆諸今年考察之例固應罷黜者也伏望聖慈賜臣休致庶免重臣之罪臣無任瞻仰悚懼之至緣係自陳乞休以嚴考察事理為此具本專差舍人來儀親齎謹具奏聞伏候敕㫖謝恩疏奏為謝恩事近准吏部咨該臣奏為給由事該本部覆題查得臣歷俸三年考滿例應給由止該引奏復職見奉勑提督前項地方軍務難以離任合無照例行令本官就彼復職管事等因具題奉聖㫖潘希曾准令就彼復職管事欽此欽遵備咨到臣除望闕謝恩遵依復職管事外伏念臣章句粗知才猷素劣謬膺風紀復詰戎兵連四省之邊疆徒慚坐鎮勤九重之南顧曷克少紓三載當考而績弗彰五十知非而分冝退乃蒙天地曲成不以草茅遽棄俾之復職俟其後功感懼益不自勝報謝莫知所措臣敢不鞠躬盡瘁期有補于明時偃武修文以無負其所學為此具本專差百戶林思恩親齎稱謝謹具奏聞剿平流劫叛賊疏題為剿平流劫叛賊事據江西按察司帶管整飭兵備分巡嶺北道副使林大輅呈據贛州府衛同知伍佐指揮使姚璽呈嘉靖六年二月二十九日抄奉欽差提督南贛汀漳等處軍務都察院右副都御史潘鈞牌為地方緊急賊情事先該調委江廣贛州南韶惠潮等府縣衛所通判等官董鳴鳳等統領官兵各赴有賊處所夾剿仍差官齎執令旗令牌催發并行各省該道守巡兵偹守偹等官嚴督進兵今照前賊勢尚猖獗行仰各職統領見操機打并黃鄉保葉芳等兵夫多方設法不分彼此界限攻圍夾剿務期搗巢搜捕盡絶有功員役從厚給賞其軍中事情不時差人馳報承委官員務要計出萬全事圖必克以憑旌奏等因及蒙江西布政司帶管分守嶺北道左參政方楷按察司帶管整飭兵備分巡嶺北道副使林大輅案驗俱奉本院鈞牌前事遵依統兵直抵龍南縣太平保駐劄本年三月初六日把隘團長李諫等於小江口拏獲强賊一名張仕鉞十四日伏路機兵溫珊等於程坑徑拏獲强賊一名王汝言把截本府知事劉璣於陂頭隘擒獲强賊曹宗文等二名馬二匹職等隨差鄉導分投瓜探前賊俱在廣東和平縣浰頭賊首盧源巢寨屯劄就於四月初五日統領安逺縣知縣劉信龍南縣主簿蘇圭原發失事贛州衛指揮劉鏜等官兵遵照軍門指授方略直抵前巢初七日各賊恃險迎敵我兵奮勇自卯至午連戰數合賊腹背受敵大敗擒斬首從賊人賊級鬼吹角談天秀李聰即李鳳等一百七名顆奪獲黃旗一面腰刀長槍二百三十五件馬五十五匹將巢燒燬餘賊奔潰隨督各哨官兵於初八日追至九連山下攻圍曲潭石柘二巢斬獲賊級八顆奪獲槍刀四十六件當用火箭縱燒賊壘房屋三百餘間燒死賊徒男婦數多因火焚化不得割取首級餘賊漫散遁入九連山等處又奉本院鈞牌務將殘賊搜捕盡絶遵依督發龍南縣隂陽等官廖思欽等官兵追至地名秋湖槽碓坑等處生擒甲從賊林危等二十四名又該原發失事贛州府捕盜通判董鳴鳳帶領家人董福等追至地名梅花寨等處生擒從賊劉汝觀等一十名主簿蘇圭在地名兩頭塘五花障嶺等處擒斬賊人賊級楊崇堅等二十六名顆俘獲賊屬何氏等一十八名口奪回被虜男婦劉奎謝氏等一十二名口信豐千戶所百戶雷雄擒獲從賊一名李大頭南康縣主簿張仕擒獲從賊一名華浩龍南縣典史沈璇上猶縣哨官尹志爵等擒獲從賊黃思紹等二名報效吏鍾文等敵殺賊級一顆及督據龍南縣知縣臧志觀搜捕賊人張孟猶等二十名前後奪獲刀槍二十三件除將馬匹軍前給賞獲功人役器械給兵領用賊人賊級男婦旗號傎解提督軍門發審外即今賊巢已空殘黨俱盡地方寧謐前項軍兵遵照明文掣放訖并准守備福建汀漳都指揮僉事吳山開報督率哨下官兵擒斬賊人賊級二十名顆俘獲賊屬男婦七名口守備江西南贛都指揮僉事明德開解賊犯劉經等五名及贛州衛百戶俞洪盤獲賊犯一名羅二等因各到道㑹同分守左參政方楷案查節奉本院鈞牌備仰本道親詣各該地方嚴督原調各官兵人等分投截殺隨賊嚮往追趕合兵夾剿務期盡絶有功官兵本院從厚旌賞敢有違誤定以軍法議處事完通將驗過功次用過錢糧造冊繳報查考等因依奉嚴督各哨官兵人等夾剿及紀驗造報續奉軍門批發各哨官兵擒斬首從賊人賊級并賊屬男婦贓仗仰道審報依奉將首級驗明梟示生擒賊犯審係情真無詞者解赴軍門審决其有詞及情有可疑者俱行查勘明白呈允釋放俘獲賊屬男婦審發贛縣變賣被虜及原不知情男婦給親認領贓銀九兩五錢七分贓物一封黃旗一面并解到器械二十三件俱發府貯庫解到牛馬一十一頭匹行令賣價入官等因并據廣東按察司分巡嶺南道僉事劉喬呈為地方緊急賊情事據韶州府呈先據翁源縣申報被和平浰頭强賊盧源等突來包圍巖寨等情已經依奉鈞牌行本府捕盜通判符錫領率千戶等官袁鏜等選集軍壯鄉兵前去約㑹惠潮龍南官兵前進九連大山夾剿續准本官陸續牒解擒斬賊首從李英等一百六十六名顆到府已將見在黃政季清等九十四名并病故賊首李英首級一顆俱經差人解赴南贛提督軍門斬獲首級一十三顆與解出中途病故及監故共五十八名俱斬取首級發翁源縣梟示賊屬五十五名口查得數內黃氏等七名口并章竒解審外其湯氏等四十七名口變賣價銀五十兩九錢馬四匹內一匹倒死三匹賣銀四兩五錢縀絹綿葛布匹衣服共一百一十件賣銀八兩零八分五釐牛一十七頭賣銀三十三兩其奪獲器仗二十件隨給兵壯殺賊連將翁源縣變賣賊屬黎氏等一十八名口價銀三十七兩五錢并追出贓銀解送到府俱貯庫及查本官先准守偹南韶都指揮僉事孫瑛手本奉明文將原調官兵於本年六月初闕日通行掣放等因又據南雄府呈稱行准委官推官趙珩牒稱奉委親詣各縣督率縣丞等官杜洞等起集打手鄉兵民快旗軍分布於各通賊要路把截及前往和平麻陂等處協剿緣無賊迹窩巢盡空隨將各哨兵夫查照掣放等因各到道案照先節奉欽差提督南贛汀漳等處軍務都察院右副都御史潘鈞牌并奉欽差提督兩廣軍務兼理巡撫都察院右都御史姚某㑹同欽差總鎮兩廣等處地方內官監太監鄭某欽差鎮守兩廣地方總兵官征蠻將軍撫寧侯朱某及蒙巡案廣東監察御史蘇恩鈞牌案驗俱同前事依奉該本職㑹同分守嶺南道左參政胡璉及守偹都指揮孫瑛親詣南韶地方嚴督原委通判符錫推官趙珩等各查照約㑹江西龍南本省嶺東等處官兵併力夾剿續奉南贛提督軍門鈞牌備行本道將各官兵斬獲首級徑自紀驗贓仗婦口從宜區處生擒首從賊犯解來軍門依奉該本道看得見在翁源等縣督兵又備行南韶二府各掌印官查照閲驗區處轉解續准守偹都指揮孫瑛手本奉南贛提督軍門批查得九連山遁賊今已無多已經専責嶺東道官兵捕絶守偹孫瑛既呈各兵搜扒無蹤仰將各官軍兵夫通行掣放依奉等因又據廣東按察司等衙門巡守嶺東道僉事謝汝儀左參議周震呈為地方緊急賊情事據守偹惠潮以都指揮體統行事廣州左衛指揮僉事程鑑呈據惠潮府衛等衙門推官李喬木周楫指揮王廷璋髙瑛典史副巡檢等官林璧陳華練廷爵等各呈繳部下千百長胡王龍并新民鄭志臯等結狀前來案查先為前事已經遵奉統督各哨漢達官軍打手兵夫協同江西官兵攻剿及陸續扒捕解報連將結狀呈繳到道案照先奉南贛提督軍門兩廣三府軍門巡按廣東監察御史各案牌批行申呈動調漢達官軍兵壯打手鄉夫新民人等行委守偹指揮程鑑惠潮府衛推官周楫李喬木指揮髙瑛等分作三哨前進尅期搗巢夾攻剿捕尤恐異同又行程鑑總統續據守偹等官程鑑等并和平等縣陸續呈禀申稱統督官兵攻破賊巢新民李鑑等殺死賊首曾蛇仔即曾惟德等及奪出被虜贛州府通判董鳴鳳和平縣主簿汪清男汪權各哨官兵新民人等陸續擒斬首從强賊陳文竒號名鬼吹角談崇尚陳細面即陳積貴盧玩即盧源等四百七十名顆俘獲賊屬男婦一百六十一名口奪獲紅旗一面并贓仗牛馬解報前來俱經審驗明白通行解報節奉欽差提督南贛汀漳等處軍務都察院右副都御史潘鈞牌仰道嚴督官兵日下搜捕盡絶取具各官不致隱漏結狀備由回報以憑將兵掣放又准總司關奉欽差提督兩廣軍務兼理巡撫都察院右都御史姚某批據守備指揮程鑒呈奉批兩廣之賊往往以招之太早殺之不盡以致兵馬方回賊黨復出每一再舉兵費十倍前事有監所冝痛懲仰守巡官即如程鑑所議措畫糧餉多方運謀坐委程鑑督兵搜捕必以賊盡為期方得呈請班師如是力難偏致本省各道并江西該道官各須督率領兵官員併心協力求靖地方亦未得專取辦一人以坐誤事機等因及蒙巡按廣東監察御史蘇恩批據程鑒呈蒙批守巡兵備道㑹議通行呈奪依蒙通呈量將老弱兵夫先行揀放及節差人督責各哨官兵搜扒盡絶結報去後今據前因合無將各哨兵夫原係團操者掣回長樂與一時加調顧募之兵通行掣放等因隨據守偹指揮程鑒禀報據惠州府衛推官指揮等官李喬木雷潤等各督該哨千百長總小甲陳仕旦等生擒賊首吳宙黃尚竒二名并前後奪獲沙水牛七十八頭馬三匹奪回被虜男婦四十九名口俱解分巡嶺東道審問轉報等因各報到臣據此查得先據江西分守嶺北道左參政等官方楷等廣東守偹南韶都指揮僉事孫瑛各呈各該地方搜捕盡絶緣由已於本年六月內將二道官兵先行掣放續於八月內將嶺東道官兵併行掣放訖卷查先據江西贛州府龍南縣揭帖禀稱嘉靖六年二月初五日據新興保鄉團保長李大𢎞等飛報本月初四日五更時分有廣東强賊一大陳突來本保地名秋湖李海輦等家殺人放火劫掠家財捉拿人口未知退往何方隨行准典史沈璇呈報果有廣東河源等處强賊約有五六百人大肆猖獗屯劄未散該臣看得所屬地方招撫殘賊甚衆一夫竊發則羣醜煽動必須速為撲滅庶免滋蔓就經委調贛州府衛通判董鳴鳳指揮劉鏜等統兵剿捕間又據廣東南雄府揭帖禀據始興縣申據朔源周所保長黃秀茂等呈稱嘉靖六年二月初六日有賊一宗約六七百人在龍南縣地方羅坊等處攻劫義民李純寨與本縣連界相離八十餘里四方人民驚走等因前來又經行仰鄰界廣東和平等縣差委官兵併力截捕及行南雄府推官趙珩率領始興等縣官兵策應一面通行各該守巡兵偹守偹等官分督各兵計辦錢糧就仰各道偹呈兩廣提督總鎮總兵巡按衙門施行及江西鎮守撫按官知㑹及具本題知再照前賊哨聚日衆又經委調廣東惠潮府衛所縣推官指揮等官周楫李喬木等各統所屬慣戰官兵并行守偹惠潮指揮程鑒親統見在募操打手并借留及原調各該官軍兵快併力夾剿又經照得南贛汀漳南韶惠潮郴桂等府州縣專𨽻本院撫屬正為四省交界但有盜賊主發即該調兵夾剿不許互分彼此致誤軍機各賊見今遁回廣東地界在和平河源翁源始興龍南各縣之間牌行江廣該道守巡兵偹等官嚴督各該官兵人等分投前進不分彼此界限直抵有賊處所㑹合夾剿隨賊嚮往追殺務要搗其巢穴及搜捕盡絶有功重賞敢有延違定以軍法處治不貸續據江西贛州府衛同知等官伍佐等禀嘉靖六年三月十五日卯時原調和平縣鄉兵李鑑等在於龍南縣太平保東水村與賊交鋒殺死賊首曾蛇仔飛天鳳鑽山虎三名賊從五十餘徒并據廣東韶州府領兵通判符錫禀三月初二等日在於翁源縣地名馬子口等處與賊對敵賊衆敗走生擒賊人李思隆等二十五名前來查得先據江西分守嶺北道左參政方楷禀該龍南縣捕盜主簿蘇圭報稱二月二十五日前賊從橫岡益徑往太平保將官兵殺敗捉虜董通判在陳又據贛州府申三月初二日據健步廖允瓉齎執被虜通判董鳴鳳牒稱據和平縣曾惟德陳積貴黃尚琦等各備情詞願聽招撫緣由各報到臣隨經通行各該守巡兵偹守偹等官督發府衛所縣官兵鄉夫人等約㑹夾剿及照各賊嘯聚一千餘徒虜官告招仍肆劫掠無非詭計以緩我師又經嚴督官兵追剿及將誤事指揮劉鏜責發軍前殺賊具本題知又據廣東守偹惠潮指揮程鑒禀稱四月初九日據千百長李鑑等走報追賊至九連山奪回原虜冮西贛州府通判董鳴鳳并和平縣主簿汪清男汪權及擒斬賊徒三十二名顆俘獲賊屬六名口牛馬九頭匹等因并先據江西贛州府衛同知伍佐指揮姚璽禀稱本月初七日在地名中浰擒斬賊首鬼吹角等一百七名顆奪獲黃旗一面初八日又追至曲潭擒斬賊人賊級八名顆各報前來查得先為催督剿賊及關防詐僞事牌行各該道府衛所縣領兵等官隨賊嚮往不分縣界務將流賊剿殺盡絶儻或賊生詭計逼令虜去通判掜寫告招票帖及假稱軍門招撫榜文以緩我兵决不許聽信如賊夥中有將通判送出陳前棄戈投生者方許收候呈請定奪去後今據前因就將董鳴鳳責發軍前殺賊仍具本題知又據廣東等處提刑按察司呈奉欽差提督兩廣軍務兼理巡撫都察院右都御史姚某案驗據守偹惠潮指揮程鑑呈據惠州府和平縣知縣劉琰哨守龍川千戶所千戶吳德潤各禀報本年二月三十日據緝事軍夫項春等走報有贛州府統兵通判董鳴鳳哨兵夫二千名在江西龍南縣地方太平保銀山廟前屯劄本月二十五日未時被賊偷營計算將董通判拏獲去營等情到院㑹同欽差總鎮兩廣等處地方內官監太監鄭潤欽差鎮守兩廣地方總兵官征蠻將軍撫寧候朱麒議照江西官兵追剿流賊曾蛇仔等致被前賊將通判董鳴鳳捉虜入營移文約㑹督兵夾剿若不差官督催前進未免有失機宜除差官齎執令旗令牌前去督催外仰抄案回司轉行各道守巡兵偹等官各作速親詣前項地方督行守偹官員嚴督各該漢達官軍兵壯打手鄉夫人等約㑹江西官兵運謀設策先將通判董鳴鳳取出就將前賊或分兵撲剿或併力夾攻務要謀慮周悉計出萬全因事制宜隨機應變大收全勝之功盡消兩省之患有功重加旌賞奏請褒嘉决不相負若偏執違拗坐失事機自分彼此致誤大事則國典具存罪難輕貸軍兵人等敢有懷姦退縮不肯用命及妄殺良善重貽民害者輕則聽各官從宜責治重則照本院欽奉勑諭內事理處斬其指揮千百戶通判等官有犯拏解軍門議斬合用錢糧徑行所在官司支用事完通將用過數目及擒斬過功次緣由通行呈報仍呈提督南贛汀漳軍門及行巡按廣東監察御史各知㑹等因呈報在卷本年六月初六日准兵部咨該臣題該本部議照前項地方素有盜賊今乃生發聚衆殺人放火劫掠人財比於往時聲勢頗大若不嚴行督捕誠恐為患益深合無本部行文提督南贛汀漳都御史潘某㑹行各該鎮巡官員嚴督該道守巡兵偹等官整搠官兵尋襲風路隨賊嚮往務要運謀設法日下剿捕盡絶以靖地方事寧之日公同巡按御史將有功效勞并誤事人員逐一分明白開奏施行等因題奉聖㫖是這地方盜賊竊發便行文都御史潘希曾㑹行各該鎮巡官嚴督該道守巡兵偹等官整率官兵上緊設法剿捕務在日下盡絶以靖地方勿致滋蔓罪有所歸欽此除欽遵通行知㑹外續准兵部咨為地方緊急賊情事該巡撫江西右副都御史陳洪謨㑹同太監黎鑑巡按御史徐岱題內開稱欲即發兵追捕但㑹城到彼窵逺難以遙度且提督軍務都御史潘某駐劄在彼責任尤專况已調發同知等官伍佐等前去剿捕除再嚴行該道帶管分守左參政方楷帶管分巡兵偹副使林大輅俱親赴軍前相機撲捕等因題奉聖㫖兵部知道欽此欽遵查得先為前事該提督南贛汀漳等處軍務都御史潘某題該本部覆題偹奉前項欽依事理移咨欽遵又節准兵部咨為奪獲被虜官員并地方緊急賊情事俱經查照外今據前因看得廣東嶺東道生擒賊首鬼吹角是的其江西嶺北道先報斬獲首級係是賊從已行改正查得江廣各道前後擒斬首從賊人賊級共八百六十八名顆俘獲賊屬男婦共二百五十九名口奪回被虜男婦共六十一名口奪回牛馬共一百五十九頭匹贓銀九兩五錢七分假絹綿葛布衣服一百一十件器械共三百二十四件紅黃旗二面已經行將賊屬贓物與賞剩牛馬各變賣價銀同贓銀及給剩器械俱貯庫被虜人口審明給親斬獲賊級紀驗梟示其生擒賊犯俱發江西守巡嶺北道審決內有情詞可疑者各行勘處外今照前因臣㑹同總鎮兩廣等處地方內官監太監鄭潤提督兩廣軍務兼理巡撫都察院右都御史姚鏌鎮守兩廣地方總兵官征蠻將軍撫寧侯朱麒巡案廣東監察御史蘇恩議照賊首曾蛇仔鬼吹角盧源黃尚琦等本以浰頭餘黨乃敢反招倡亂糾合强徒開張旗號流劫鄉村而殺人放火極其凶殘襲捉職官而虜掠姦汙特其餘事茶毒一方動搖二省仰仗皇上德威廟堂至計數月之間渠魁授首凶黨悉平巢穴蕩空地方寧靖及照江西嶺北道分守左參政方楷分巡副使林大輅廣東嶺東道分守左參議周震分巡兵偹僉事謝汝儀守偹惠潮以都指揮體統行事指揮僉事程鑒嶺南道分守左參政胡璉分巡僉事劉喬守偹南韶都指揮僉事孫瑛督率惟嚴而分布應援之有方謀力畢效而調度攻圍之得策協心用命克收全功江西贛州府同知伍佐贛州衛指揮使姚璽安逺縣知縣劉信大破賊陳連搗三巢而搜獲有加廣東潮州府推官李喬木惠州府推官周楫惠州衛指揮使髙瑛指揮僉事雷潤王廷璋奪回虜官多獲首惡而掃蕩無遺韶州府通判符錫夾剿窮搜亦多俘馘福建守偹汀漳都指揮僉事吳山江西守偹南贛都指揮僉事明德廣東南雄府推官趙珩分把要害致無奔突以上各官似宜量録以明勸功贛州府捕盜通判董鳴鳳贛州衛指揮同知劉鏜始雖均於失事終則皆能獲功此二臣者似宜許贖以明使過但升賞豫奪出自朝廷非臣下所敢議也除催取擒斬功次并誤事人員文冊公同各該巡按御史查明另奏外緣係剿平流劫叛賊及節奉欽依便行文都御史潘希曾㑹行各該鎮巡官嚴督該道守巡兵偹等官整率官兵上緊設法剿捕事理未敢擅便為此具本專差千戶楊忠親齎謹題請㫖旌舉方面官員疏題為旌舉方面官員事臣奉命提督南贛汀漳等處軍務一應軍馬錢糧弭盜安民事宜督行江西福建廣東湖廣各布按二司掌印守巡兵偹等官共濟厥事中間賢能官員相應旌舉除已經升轉不開外訪得江西布政司左布政使葉相才敏達而優於剸繁志正大而足以任重右布政使張羽飭行謹而賢聲式著蒞事勤而藩政以修左參政方楷分守有保障之勞接管無因循之弊按察司副使林大輅領兵雖非所長司憲素稱執法副使喻漢風裁之持久聞兵戎之備克振僉事鍾雲瑞言行本於敬慎姦貪憚其嚴明福建布政司左布政使陳錫性端雅而行修才諳練而政舉左參政查約政疏通而不遺性嚴毅而有守按察司按察使周廣斷獄有明决之才總憲得嚴肅之體廣東布政司左布政使周宣剛嚴著風紀之司和厚敷承宣之政左參政胡璉政不擾而惠流才有為而名起按察司僉事謝汝儀肅憲足以禁姦飭兵復能靖冦湖廣布政司左布政使丁沂先任福建而聲績已著所守清約而終始不渝右布政使潘珍亷慎之行孚於人人練達之才優於事事按察司按察使盛儀操持慎而士行修才識長而憲度舉以上賢能皆堪旌舉乞勑吏部再加察訪將各官量為擢用則明揚得人而臣工知勸矣緣係旌舉方面官員事理未敢擅便為此具本專差舍人來儀親齎謹題請㫖舉劾有司官員疏題為舉劾有司官員事臣惟有司乃親民之職其賢不肖係民生之休戚見賢而不能舉非所以勸功見不肖而不能退非所以警衆臣訪得所屬江西原任贛州府今調吉安府知府張漢慎篤足以守官精勤優於治劇贛州府知府李顯風裁已見之內臺政聲復彰于劇郡南安府知府吕律謹守得奉公之宜亷平有及下之澤贛州府同知伍佐性介而守不渝官久而事益練廣東南雄府知府伍箕剛介之操不回循良之績已著潮州府知府王袍律已革前官之弊愛民有良守之風惠州府知府顧遂才敏而政日修心公而人自服揭陽縣主簿季本仕學之功有加子民之政匪懈以上各官皆賢能昭著者也江西信豐縣知縣梁材畏謹而居官鮮失疏緩而幹事不前福建歸化縣知縣彭中精力勉强而向衰政務因循而缺舉廣東程鄉縣知縣王澤宅心寬平而守不失任職尋常而政多弛此皆才力不及者也湖廣郴州知州張觀帶鄉人以代吏書舞文虐民受賊賂而致訐發被提計避江西贛州府通判薛文假嚴以濟貪初政莫測遇事而巧取醜聲遂聞此皆貪汙不職者也乞敕吏部再加察訪將張漢等量為擢用梁材等别為更調張觀等速為罷黜則有司知所勸懲政清而民安矣緣係舉劾有司官員事理未敢擅便為此具本順差舍人來儀親齎謹題請㫖竹澗集奏議卷三
