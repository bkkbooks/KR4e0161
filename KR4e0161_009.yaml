body:
  text: 竹澗集奏議卷一明潘希曾撰諫垣六首卿寺四首遵詔旨以正夤緣疏題為遵詔旨以正夤緣事近該兵部依奉詔條查奏傳乞冗員陛下酌量裁減初政維新又該節奉聖旨今後敢有仍前夤緣傳乞的著科道并該衙門指實來説臣惟先帝在位蓋嘗裁冗濫禁夤緣陛下篤於繼述既播諸詔旨矣邇者兵部參奏左監丞王潤題稱已故太監汪直生前頗有微勞乞要查伊義男汪鈺汪璥原功量與官職看守故塋一節查該奉有憲宗皇帝聖旨著革職為民間住及奉有孝宗皇帝聖旨罷難又别為議擬等因奉聖旨準他汪鈺升錦衣衛所鎮撫帶俸汪璥與做總旗照例食糧欽此竊惟方今錦衣衛所人員計見任管事外不知幾人帶俸幾人食糧再授汪鈺等職役豈非冗濫况彼冒功得官先朝纍經革罷忽於今日乞升豈非夤緣王潤此舉其欺蔽非細故也臣聞名不正則言不順理既屈則辭必窮彼稱汪直微勞以欺陛下獨不思憲廟用舍與衆為公向革汪鈺等職豈無見而負人功乎又稱孤墳可憫以欺陛下獨不思先帝賔天言猶在耳顧忍改於其道乎陛下聖心純孝通於神明初政嚴明堅如金石必不肯背憲廟以念汪直忘先帝以憫孤墳輕天下大信以徇羣小之私臣獨恨王潤等巧肆夤緣朦朧奏請致令命下衆共驚疑查得汪直先年出師得不補失而且生受蟒衣玉帶歿蒙諭祭安葬就使有功其報已為過分即今雖歿其墳未為失所不知汪直果何大功可以祿及義男汪鈺等如何守墳必須朝廷官職况世祿以及子孫鬼神不歆非類內臣本無後而強求世祿之恩義男本異姓而欲冒他鬼之廕物理人情甚是無謂其為此舉非姦則愚臣叨備言責誠恐夤緣得計則事體漸乖將來弊風不可救止雖知事干近幸不敢隱默規避以負陛下伏乞聖明加察特敕法司將王潤等究治仍革汪鈺等職役則政體歸一而姦回之徒不敢肆其欺蔽矣災異陳言疏題為災異陳言事竊惟君德莫重於體元天道不虛以示戒陛下改元伊始而上天示戒非常此固天心仁愛欲陛下省懼也然我之省懼者或不以實則天之仁愛者尤不可恃安危之兆可為寒心邇者節奉聖旨事關朕躬的自當體行事有當興革的各該衙門逐一開具來説仰惟聖慮正欲務實以應天轉危而為安也臣待罪言路且喜且懼謹以聖躬所當體行者言之若隆大孝勤聖學節遊樂逺佞幸是已以時事所當興革者言之若振因循懲玩法備勍冦勵士節是已夫天地者陛下受命之父母先帝與皇太后陛下生身之父母故事天之道不外於事親得親之心斯可以得天矣伏望陛下勤詣靈几躬禮宗廟近思先帝教育之恩逺念祖宗積纍之德又常朝於太皇太后皇太后之宫曲盡母子之情樂聞訓告之益使愛敬之念日夕在心乃所以隆大孝也至於講學一事尤帝王圖治之本可以開聰明可以養心志從容便殿之中講論片時之會其事與視朝御膳等爾於聖體未勞也頃以暑月停止經筵日講顧乃専事遊樂不避炎日陛下奈何舍有益而不肯為作無益而不憚勞也臣恐不忠之人有以先朝輟講為言殊不知先帝德性已成逸遊素少陛下年方英妙豈可借此以損至德伏望仍開經筵依舊日講使日新之功有加無已乃所以勤聖學也他如射獵遊戲往往使人心意荒惑形神勞頓甚非所以保養萬夀自求多福也千金之子猶坐不垂堂陛下以宗廟社稷之身豈不自愛哉良由左右前後不得正人希寵導非迷君誤國此遊樂固不可不節而佞幸尤不可不逺伏望明詔中外放鷹犬絶玩戲仍簡選內臣求其端謹者以充侍從斥其姦巧者以為懲戒務俾遊樂有節而佞幸不得近凡此皆聖躬所當體行之大者也天下之患莫甚於因循因循不振則國政日弊近該户部奏準欲行吏兵二部查革冗食及行光祿寺查勘內外濫費足國裕民莫急於此而乃纍旬浹月不即奉旨舉行部寺猶然諸司何責京師如此藩郡可知伏乞降旨切責各令逐一查奏從宜裁省斷在必行庶幾人心知警而因循可振也朝廷之患莫大於玩法玩法不懲則主權下移近該户部奏準查勘草場以補國用兩次差官奉有成命太監寧瑾乃敢無故奏沮若謂不宜更改待各官勘回取自上裁未晚也若謂永樂以來地土則國家政務隨時損益者孰非永樂以來事哉此其徇私罔上情罪顯然伏乞特敕法司究治庶幾威權不失而玩法可懲也方今北敵窺伺於三邊逺夷竊發於雲廣蘇松近地海冦嘯聚江西四川時各有警皆由處置失宜以致猖獗至此夫用力攻戰固在將官而運籌調度多在憲職往時巡撫起自升用者率與邊警處所及其頗積年勞漸轉內地旋擢在京此但為人擇官非為地方任人也今西北邊設立總制最為得計各處巡撫亦既有人合無今後察其不堪邊寄者取回别用果有文武長才者特加久任秩滿則加其官有功則録其嗣僨事則治其罪除遇丁憂致仕方許推補仍敕廷臣秉公議處使得展布以圖功不致茍且以避事如此而敵冦不靖臣弗信也臣又聞禮義廉恥是謂四維四維不張何以立國蓋國家必養廉恥之士而後能得忠義之臣伏覩大明律及欽定條例文武官犯公罪並許收贖守衛上直軍校犯笞杖罪俱令納鈔婦人應決杖者非姦罪不去衣此我祖宗仁至義盡扶持四維也且廷臣密邇清光不啻軍校賢者守身不異貞女近見小有過犯多受刑辱臣竊傷之乞敕法司參詳律例通行三法司鎮撫司凡常朝官員過犯非係贓惡無得去衣加辱庶幾全君臣之大體興禮教於無窮其於國家非小補也凡此皆時務所當興革之不可緩者也臣仰荷聖明叨備耳目遭時多事深切憂惶用是昧死瀝誠仰禆萬一惟陛下垂聽而實行之以答天意以慰人心宗社幸甚愚臣幸甚臣無任悚懼激切之至求封疏題為求封事先該安南國故國王黎灝孫黎晭及國人奉表奏請求封該禮部題準差臣等充正副使於正德七年二月初六日領節及奉詔書敕諭并欽賜皮辨冠服一副常服一套前往本國封黎晭為安南國王臣等行至廣西南寧府地方移文憑祥州令其馳報本國以正德八年正月十七日入其國黎晭差頭目黎德富等四員並通事人等至界首關迎接臣等授以儀注令馳付所司遵行二十三日黎晭差頭目黎儀等四員來迎又差頭目阮時雍等三員呈送儀注中間有疏繆處臣等因指示曉諭之令其改正二十五日黎晭率其官屬軍伍人等至吕瑰站迎候詔敕入站行禮畢退與臣等行禮而返二十六日黎晭至富良江邊迎候詔敕至其府中開讀行禮畢臣等以詔書付所司頒行國王黎晭退與臣等行禮具茶酒相勞送臣等出就館當日國王至館來訪仍率其頭目懇留詔書以為鎮國之寶臣等遵題奉欽依事理聽其請留二十七日請宴後殿宴畢臣等遂辭以明日早行當日國王遣頭目黎廣度等二十員齎書具贐禮送正使金四十兩銀六十兩副使金三十五兩銀五十兩生金各二十兩相金犀帶各一條相銀香帶各一條牙笏各二件沉香各五斤線香各五百枝生絹各一十匹牙梳各五副竹扇各五十把家人銀各五兩生絹各一匹臣等俱辭不受二十八日國王至富良江邊具茶酒相餞送臣等登舟仍遣頭目黎悆等五員護送另具書遣頭目黎鼐等二員將前項贐禮齎送至吕瑰站臣等固辭之二十九日復遣追送前贐至市橋站臣等終辭之乃已二月初八日頭目黎悆等送至關而回臣等看得安南國地方僻小風俗鄙陋雖習尚詭譎而其敬事天朝以及使臣之禮則靡所不至如各站遣人迎接每日三次館待所過地方刋木修路臨回逺送不敢或替此皆皇上德威逺布之所致也臣等除將原領詔書筒并節照例另繳外謹具題知劾違例朦朧奏聞疏題為違例朦朧奏聞事照得南京工部龍江瓦屑壩二抽分竹木局每年各季分收放過竹木等項數目例該造册具本批差吏典齎赴本科本科官於御前引奏送科查理我國家成法具載大明會典所以防欺蔽稽出納者百數十年於兹矣正德十年三月十三日該通政使司左通政劉達等送到龍江瓦屑壩二局各奏二本俱奉聖旨工部知道臣等看得前項本册不由本科引奏事違法例情涉朦朧所據該局大使童輝鄧崇及原差攢典曾必虎王仕乾俱合有罪及照左通政劉達等一槩奏送亦難辭責乞敕法司究治庶幾欺蔽知警而出納可稽矣公糾劾以嚴考察疏題為公糾劾以嚴考察事竊惟朝廷考察以警庶僚必藉糾劾以明公論是以去留允當臣工罔私此我祖宗良法美意所以制治而保邦者也舊例六年一考京職凡五品以下令吏部會官考察其堂上官令自陳以須上裁至於小臣茍容大官幸位又許科道劾奏國家重典行之有年近該吏部會考諸司沙汰不職然漏網之魁間亦有之大臣自陳取應故事陛下恩禮優容淑慝未别夫魁惡不除何以勸善大臣不簡何以表衆臣等叨任耳目不敢緘默謹舉不才之尤衆議共醜者為陛下數之某某云云此皆考察所不及清議所不容臣等秉公推恕求其可留而不得始敢具實以上聞也伏望皇上俯垂離照特賜乾斷將寧杲等照例罷黜庶幾姦邪不得以妨賢臣庶可期於稱職矣慎興作以隆治功疏題為慎興作以隆治功事竊惟聖王之圖成功者不作無益害有益其不得已而取諸民也則用其一緩其二是以民不告勞功克就緒天休為之滋至國祚綿於無疆我祖宗列聖之創守與皇上之繼述率是道爾頃者營建乾清坤寧二宫所以復祖宗之規正宸極之位垂燕翼之休誠不得已之舉非若離宫别殿無益而可已者也陛下猶且重於用民命廷臣集議至再此即大禹卑宫室文王戒勿亟之心也天下臣民孰不感激願效其勞哉近該內官監奏行工部修蓋太素殿天鵝房船塢等處錢糧動經巨萬軍匠不下數千臣等聞知不勝駭懼續該本部執奏欽奉聖旨這工程還著該衙門查理緩急來説臣等又有以見陛下慎重之心甚惓惓也請以今日之事理論之兹役之興有四不可夫天下之財力有限二宫之營建方始寬一分則得一分之濟早一日則享一日之安各處見興之役尚須促完以趨大工諸凡不急之務豈宜併作以妨大計此不可者一也况邊陲之軍儲告匱內外之冗食益繁山東河南近經兵燹江西四川未復瘡痍即今大木採及於逺方工料派遍於天下若復别興土木誠恐民不堪命此不可者二也近來京師風俗過奢物價騰貴豪右逞其僭踰小民艱於生理兼之舊冬少雪初夏大雹收成觖望盜賊生發或白晝驅馳或閙巷劫掠民窮盜起可為寒心節用愛人正在斯際此不可者三也古昔帝王非無臺池以供遊觀然其作以時其遊有節故民樂其樂天眷其德考之月令當夏毋起土功母發大衆今時既不宜矣况大內遊玩之處頻年營造不少必欲繼作尤非樽節之道此不可者四也臣等職叨耳目事當論諫茍有見聞不敢緘默伏望聖明察納愚忠俯從衆議特降敕旨將太素殿等處免其改作一切不急工程俱令停止仍令各該衙門查處前項時弊於奢僭則申明禁之於盜賊則設法捕之於冗食則斟酌裁之於軍儲則措置給之將見人心悅而天意順不惟宫室之大工易成而國家之治安可長保矣此疏留中備用馬匹疏奏為備用馬匹事據直𨽻和州申云云及據直𨽻滁州申云云案查前事本寺遵奉兵部劄付已經通派去後今據前因臣等照得滁和二州災傷委的不減廬鳳淮揚等處其土産馬匹矮小委的不堪交俵多致揀退荷蒙皇上軫念地方痛恤民隱特從該部議擬將今年廬鳳等府江浦等縣馬匹改徵折色文移所至萬口稱便惟滁和馬匹仍存本色是以小民懷同仁之望伸無盡之情竊計二州應納馬匹自朝廷視之為數不多自二州飢饉之民視之其徵買解俵挂欠追賠之纍所係甚重伏望皇上俯矜下情特敕該部議處合無將滁和二州本色馬匹比照廬鳳等處事例暫改折色不惟官得實用抑且民免貽纍實為便益萬萬矣自陳乞休疏下奏為自陳乞休事臣以菲材叨登𢎞治十五年進士改翰林院庶吉士尋丁母憂𢎞治十八年授兵科給事中正德三年逮杖於午門前黜為編民正德五年劉瑾敗戮仍蒙朝廷起用歷升工科都給事中正德十一年升南京太僕寺少卿萬死餘生再登仕籍論諫無益於當時尸素尚叨於今職入仕垂二十年行年四十有六俯思履歷奚補涓埃恭遇聖明紹統政化一新率土臣民歡欣願治若臣者亦宜勉䇿駑駘仰圖報稱奈何空疏蹇拙力不逮心况遭患難以來血氣衰耗每遇隂雨兩腿隱痛艱於動履若復昧於知止罪益大矣兹奉明詔許臣等自陳乃敢吐露肺腸陳乞骸骨伏望聖明垂察賜之休致使臣得與田夫野叟謳歌太平以終餘年莫大之恩莫大之幸也臣干冒天威不勝戰懼為此具本専差義男潘亮親齎謹具奏聞伏候敕旨均恩例以蘇民困疏奏為均恩例以蘇民困事伏覩詔書內一欵浙江等處十三布政司并南北直𨽻嘉靖元年分內除漕運糧斛四百萬石照舊徵兌起運其餘夏秋稅糧馬草農桑人丁絲絹布匹絲綿花絨屯田皇莊莊田子粒牧馬草場子粒租銀及甲丁二庫蠟茶銅漆銀硃等料不分存留起運以十分為率俱免五分以蘇民困欽此竊照各處牧養種馬或論田地或論人丁每年派取備用馬匹各照丁田朋納是田地以納馬為稅糧而人丁以納馬為徭役較之他處丁糧名異而實同也今嘉靖元年稅糧人丁等項俱免五分逺近聞知歡呼感戴獨備用馬匹係該臨期奏派小民未知蠲免分數不無觖望伏望皇上一視同仁特敕該部計議合無將嘉靖元年備用馬匹查照常年額數減半派取惟復分作二年減派亦免五分之數則恩例無不均而窮民無不獲矣臣等又思漕運糧斛照舊徵兑乃取足於五分既免之外此項馬匹若不減免是取足於十分全徵之內故明詔止除漕糧其餘俱免五分為恩至渥為慮至悉也仰惟聖明御宇聿興虞周之治凡百貨財悉歸公帑萬姓悅服四夷嚮風誠千載一時也為今之計寧使馬欠取辦於公帑無使恩推不均於小民况邇來邊軍交兑漸少官馬寄養頗多總計一年減免五分不過一萬二千餘匹皇上富有四海豈獨靳此而不期副大賚之初心哉臣等猥係職司不敢不豫言之惟陛下矜察天下幸甚緣係均恩例以蘇民困事理未敢擅便為此具本順差典吏劉堂親齎謹具奏聞伏候敕旨照例暫處挂欠以稍減重併疏奏為乞憐災傷照例暫處挂欠以稍減重併事準本寺寺丞吳天挺牒據直𨽻滁州申為照本州里少民貧差繁賦重兼以災傷頻仍民困已極緣本處不係産馬地方遞年備用大馬徵銀召販收買起俵到京每至揀退回還一馬不堪換買三四次者有之一年解俵併徵三四年未完者有之今查正德十一年仍挂欠馬一十匹正德十二年欠馬一十二匹正德十五年欠馬五匹正德十六年欠馬一十九匹俱經數次買換節遭揀退經該官員纍年住俸槩州百姓盡至破家今當災傷之年縱使忍心追併買馬到京未必全中不免仍有揀退之苦卷查正德十一年間為暫處挂欠以稍減重併事該蒙南京太僕寺牛寺丞奏兵部覆題內開正德十年以前其揀退不堪馬匹選委廉幹官員變賣價銀差人解部轉發太僕寺收貯買馬支用今本州與屬縣正德十六年以前挂欠之數補俵不完伏乞憫念地方凶災百姓疲困轉為具奏合無照正德十一年奏行事例變賣銀兩解京庶公事得完卷宗杜絶民困少蘇等因到職據此查得前項挂籌馬匹非獨滁州一州為然其餘淮安等府和州等州縣亦有挂欠節經解俵退回追補未完若不移牒煩為查處具奏照例改徵折色解補則節年拖欠未免重併等因到寺臣等照得各屬挂籌馬匹數雖不多然重復買解再三退換之纍民實不堪况聽民折價則積年之欠易完而收銀在官則北産之馬易買伏望皇上俯矜下情特敕該部議處合無將前項馬匹查照先年事例變賣價銀解部惟復照依折色每匹納銀一十八兩領取原批則官民兩便矣竹澗集奏議卷一
