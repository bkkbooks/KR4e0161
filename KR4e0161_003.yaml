官契三年一日如笑談更下榻出入每聯車吾道終何補公才暫可儲難逢嗟易别莫放酒杯踈風雨驚行色衘杯意渺如下江俄擊楫趨闕更膏車麗句勞相贈空囊富所儲平生久要誼不為别離踈疊前韻留别毛太卿二首名德欽前輩行藏道自如共期川作楫獨喜盖傾車伯冏書堪續梁公藥善儲公好蓄藥分攜資誨語此意未應踈世事故難料兹行信所如獨憐馳驛騎遥别看花車鄙吝思常見才猷重夙儲滁陽好山色回首暮烟踈宿遷道中大水大水來天上平原匯百川離離波下黍汎汎樹頭船野市迷崔鎮孤城浸宿遷流離愁此日何以禦來年過泗亭濟溢河奔漫泗亭官舟逆水阻脩程南風一夕開㠶好卧聽船頭軋浪聲庚辰嵗同仲實兄謁祖墓述懷故里同過豈偶然郊行仍及立春前鴒原舊事追當日馬鬛遺封望紫烟種秫有田堪客醉聚書充棟任兒傳廿年南北知何補歸老深期了宿縁謝盛希道先生枉顧谷口髙軒來故人清燈細雨一杯親江湖戀闕三千里館署論文二十春乍見共驚忙裏鬢劇談如對夢中身玉華千仞南溟上尚憶攀躋迹已陳盛居玉華峯予嘗造焉題王亞卿荆山别號巻佳山堪住仍堪號名德巖巖復似之雲出㑹符霖雨望林深真有棟梁姿平分海岱形逾勝變幻烟霞趣亦竒未遂攀躋常仰止丹崖留墨定何時沛縣黄河口南徙河入沛已十年忽又徙徐大河衝沛日湯湯十載清流眩眼黄忽徙彭城纔幾月舊渠枯盡欲生桑竹澗集卷三
