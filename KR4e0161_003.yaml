body:
  text: 竹澗集卷三明潘希曾撰古今詩一百十三首郊祀分獻四瀆壇二首丙子嵗列炬薰天蔟紫壇露華星彩溢虗寒五雲望切威嚴地四瀆名叨奠獻官禮樂雍容三代盛精誠感格百神歡遭逢未有涓埃報擬賦甘泉寓責難寰區潤澤荷神功登祀郊壇禮數崇篚帛敬將從水色四帛俱黒篝燈髙照切雲紅石龕幽䆳香烟表碧殿玲瓏樹影中對越再三分獻罷格天一德仰宸衷半隱王先生輓詞以子純都御史受封半隱先生本席珍懶從三聘試經綸此身已逐忘機鳥有子還為瑞世麟命服再膺榮晝錦林泉終老遂天真斜陽宰木今如許賸有高風激後人壽蒲菴王封君八十子雲為嚴州守白髪烏紗陸地仙逍遥心跡寄林泉蟠桃有待三千嵗甲子重過二十年閲世方曈超色界長生靈藥在丹田老萊膝下能兒戲更向黄堂啟壽筵藍都憲生祠仗鉞収秦隴成功歸廟廊金湯恩不淺爼豆報何長古栢隆中廟甘棠召伯鄉封侯一時貴未許望宫牆藍都憲凱旋巻笳皷動歡雷王師出塞回鷹揚元帥勇䑕竄衆兇摧露布三秦曉風清萬里埃等閒尊爼地真有折衝才送藍都憲陞南京刑侍分陜勞開府留都詔促裝蘇公終式敬召伯孰能忘西峙秦山重東流漢水長更懸天下望調鼎在巖廊初遊醉翁亭次韓太卿庭方韻久憶環滁勝登臨忽此亭席分溪石潤酒帶釀泉馨院靜禽時語松深露晝零古人那可作聊誦壁間銘遊琅琊寺不果次韻荅曹少卿汝學名山聞説好亭臺千里懷遊未果來空羨暮雲歸老衲竟留中路憇蒼苔泉迷庶子清難濯嶺望磨施翠不開寺有庶子泉磨施嶺明日追陪了心賞輸君先我已三回雪曉次韻朝來寒氣透重衣雪壓茅簷半掩扉院落光生花滿樹池塘清絶玉為磯舟横西澗無人渡簾捲豐山斷鳥飛竟日擁爐官事簡詩成高興轉崔巍丙子冬至次韓信山韻天地陽回又此辰履長餘慶仰皇宸年華滚滚波同逝官寺寥寥山作隣凍合硯池從閣筆暖生茶竈任添薪滁陽細酒堪消日拭眼梅花對早春立冬日有懷京師諸友東皇消息到江梅鼔吹郊迎曉色開五日新正渾醉裏百年殘夢又春來他鄉綵燕隨縁看何處雲鴻寄劄回料得故人多健在尋芳聮轡滿金䑓人日雪入春二日逢人日占嵗宜晴苦不晴凍雨作花還六出終風吹冷竟三更羊羔薦酒渾多事蟹眼烹茶漸有聲訪戴未能餘興在朗吟空對夕窻明廨舎梅久不開戯述山城春到一旬强牆角官梅尚未香索笑幾回虗杜老驚時今已負何郎空憐凍蕚凝紅蠟安得南枝出靚粧商鼎有須應忌早故含元氣混羣芳數日梅猶未開疊前韻經冬相對意差强半月東風未放香逺信不堪傳驛使幽期如待探花郎日斜籬落貪春睡月冷黄昏怯晩粧為爾興懐懐作惱强裁詩句荅年芳次韻曹霜厓梅開見寄霜葩初見隔牆枝尚及新正未是遲寒氣襲人朝夢破暗香牽興晩吟宜情多怕弄風前笛病起思傾月下巵我屋一株仍冷蘂却疑春色與君私梅始開疊前韻梅花照眼忽枝枝冠絶中園不論遲香逺自縁冰雪助格髙偏與水雲宜臨芳合有金聲賦送酒何慚玉液巵湖上孤山應更好偏舟終擬遂吾私雨中梅花盛開雪中留滯雨中開二月相逢是晩梅横水一枝仍韻在閉門終日忽春來眼憐冷艶移時立心醉幽香命酒陪正恐隂雲妨月色不教踈影到亭臺次日仍雨疊前韻懐抱經春不自開曉窻風雨正愁梅香魂避濕應歸盡粉艶驚吹易落來鐡石廣平心故在湖山和靖興難陪隂晴等爾吾遊倦為汝須登月下臺次韻曹霜厓園梅為風所苦寄語逋翁莫漫悲風狂未損好花枝芳宜送酒何愁落香欲沾衣不憚吹乍㸃宫粧慿小試漸成鼎味待深知繁華擺落尤竒絶月夕來看豫作期遊琅琊十里琅琊氣鬰葱峯回路轉興難窮禪房駕壑臨清泚石磴梯雲到碧空鍾阜一巻烟靄外長江疋練渺茫中千年帝子留竒觀多少遊人感慨同疊前韻荅曹霜厓華裾幾度望青葱咫尺西隣眼欲窮拄杖竟妨春雨濕談棋誰伴草堂空青山半落閒愁裏白日都消斷簡中薄暮詩來天漸霽尚期歌詠一樽同曹霜厓以詩謝茗并致佳酒次韻春睡昏昏頗泥人叩門詩到日加辰愧無瓊玖償投李頼有交游託飲醇餽茗敢誇陽羡勝分醅真出釀泉新枯腸醉裏還堪潤月夕風晨此興均即事滁上烟巒翠繞城悠然相對轉愁生花枝幾樹初經眼風雨連宵太薄情上國交游書久絶故園心事夢難成等閒病起春過半曵履池邉看晩晴春風底事春風喜叫呶乍聞南陌忽東郊重茅捲去隨羊角古木摧殘墮鵲巢料峭不禁輕酒力飄零餘恨付花梢尋常少出愁吹倒多半韶光睡裏抛即事四首江北江南一望中便將遲早判春風江南二月桃開盡江北梅花正作叢梅花狼藉杏花開粧㸃山窻送酒杯數日留連成底事不知春色暗相催每恨逢花易别離不因雨打即風吹亦知後㑹明年事南北東西未可期故人見夢話平生醒後依稀不自明高閣日斜消息斷垂楊一樹語流鶯南郭南郭青山映草堂兩年春夢落滁陽空慚伯問新恩命誤入歐公舊醉鄉憂極江湖天渺渺興䦨花鳥雨茫茫日長人靜惟危坐消盡幽軒幾炷香寄贈朱良矩改令丹陽暫別仙班綰縣章泌陽朞月又丹陽恢恢餘地牛刀底籍籍才名豸繡塲夜雨十年空夢寐暮雲千里益凄涼江頭香草堪紉佩已覺流芳自此長題太僕廨舎官寺東頭數畝宫兩年棲息足帡幪白雲戸牖羣山合緑水池塘曲徑通花木不殊吾土好茅茨猶有古人風天涯吏隱惟迂拙滿壁題詩不務工攜酒過曹霜厓即席次韻經旬隂雨妨乘興此日壺觴徑欵門萬里風烟行處樂幾年離合夢中論閒將象局消長晝漫逐鶯聲過小園醉倒竹根應不惡明朝重到看生孫次韻荅韓信山短鬢逢春不稱搔衙回聊免簿書勞詩償我債千篇少樓羡君家百尺髙敢謂杜陵渾漫興亦知王粲未為豪來朝作意同登眺栁外花邉任所遭遣興好詩莫苦吟好棋莫貪著苦吟徒勞嘔出心爛柯祗為貪棋錯詩以寫我情棋以撥我悶意匠心兵不自持斵喪真淳起爭論君不見三千風月醉一生十九岐路誰能明何如虗室坐終日一洗煩惱令神清孔刪羲畫不啻足超然且與吾心盟花栁吟飛花滿路春風香栁條弄日鵝兒黄如此風日亦可喜趂逐兒女如顛狂花香欲與蘭爭馥栁黄漸似栢枝緑為佩為梁自有真往往風流託空谷琅琊山椒一杯酒坐我深春亦何負吁嗟此意空寂寥眼底紛紛醉花栁曹亞卿第賞梨花梨花盈盈雪一樹照日不消半含露香氣氤氲百和餘隔牆暗逐東風度桃夭杏艶多名園春深狼藉空愁煩醒心忽到池塘路疑是江梅初返魂休將一枝看帶雨長門掩泣誰為主莫待溶溶月滿庭素娥心事尤孤苦快哉君家今日晴釀泉之酒花邉傾更饒齒頰有張谷夢回猶足消餘酲次韻信山太卿重葺竹所竹窻零落蒼苔合無復瀟湘風雨枝階下錦綳纔幾箇慿君長養看猗猗次韻韓太卿春晝見寄一官閒散共天涯忽忽春風已落花不為緑苔憐踏破杖藜終日話君家春深二首落紅無數委東流狂盡楊花風亦休春色老來堪愛處緑隂門巷似清秋喚歇鳩聲雨㸃踈春隂漠漠日長初曉衙放罷都無事多讀山窻幾巻書次韻曹霜厓清明見寄一春多夢竟難明流水飛花傷客情脩禊亭荒觴未泛登樓地僻賦初成狂風暴雨過寒食野蔌山殽入夜烹珍重詩筒相慰藉此心惟合向君傾與客嘗玉面貍次韻敢誇野味少人知詩客曾題牛尾貍紅玉飣盤爭放筯青錢沽酒共傳巵攜來江北春深日獵得山中雪霽時正自思鄉縁爾劇未能歸去是誰為栢子潭次霜厓韻栢子成林俯碧潭天光澄徹鏡中涵千年勝地來遊晩萬里塵容欲照慚雷雨震驚龍或躍江山題品我猶堪高皇注矢甘霖應長與滁人作美談野景野景向黄昏歸輿山復村鐘聲白雲寺酒斾綠楊門澗遠流花片橋危合蘚痕窅然迷處所回首憶桃源示兒徽望汝成人汝勉之汝家門地要支持箕裘不廢真吾子學問仍須自得師早致青雲䋲祖武莫將白日付兒嬉終身有益惟謙約好為書紳慎勿遺寄程甥文德後嘉靖己丑進士及第兒徽同登不多年紀好文章珍重吾家坦腹郎志篤尚須開萬卷學成何止擅三塲功名世濟方為孝冰玉人看亦有光別後自嗟心力倦猶能刮目日相望寄從子燧絅輩千里題詩寄阿咸喜看蘭玉在階前力行孝弟光門閥多讀詩書繼祖傳叔父龍鍾何足法爾曹豹變各爭先相攜亦有東山興留滯天涯又兩年逰花山花山秀滁陽不在琅琊下空谷封白雲自昔逰者寡東風三月時牡丹映山赭我來屬春去殘枝緑瀟洒品色驗根荄采之忽盈把慇勤愧良朋行厨勸杯斚一笑各盡歡顧景不能捨歸輿倚㣲醺落日淨原野次韻酬仲仁兄見寄滁陽嵗暮積離憂尺素俄傳自泰州咫尺不同逰宦地尋常空憶讀書樓泮芹香動春初采棣蕚詩成夜自謳却羡故園溪上月解分清影傍䢴溝泰州水名紀夢時伯兄家食東浙仲兄分教泰州予以太僕寓滁兩年離别書仍斷三處相思夢忽通旅食不知滁泰遠追歡如在浙江東秋來祗負茱萸揷嵗晩還期鴻鴈同自小翺翔予最後而今四十欲成翁攜張嘉運逰醉翁亭雨裏登山亦自竒古亭岑寂話深巵廿年離合誰能料一餉隂晴未可期鳥喚白雲高木落僧歸青壁暮鍾遲酒䦨漫復聮鑣去明日秋風兩地思九日孫主政莊登高佳節驚心值異鄉登臨聊復過山莊茱萸共卜明年健菊蘂猶慳此日香野外行厨溪蔌嫩雲端作戯舞衣涼樊籠潦倒圖南意撫掌西風醉欲狂寄贈張主簿鋭兼柬吉大尹師召遥憐寳婺鸞栖久忽覩金陵鴈信來膏澤賸遺桑梓福轉輸仍足國家財酒醒淮浦西風冷詩到呉江落葉催重掃縣齋應卧治長官今有魯恭才醉翁亭次徐駕部子正韻滁山偶為醉翁有終古亭臺屹不朽澗泉清淺碧玉流石刻盤拏老蛟走巒迴樹翳日色遲仰視卓午忽己酉吁嗟翁醉何時醒更上翁亭酹翁酒晩菊東籬細蘂幾黄昏過却重陽開漸繁曉袂半沾和露采吟杯初泛帶香吞娯情不減陶潜興惜晩難同杜甫論短鬢經秋還耐否一枝簮罷手重捫謝曹貳卿餽潤酒門掩斜暉坐寂寥清樽分我潤泉遥不多殘菊猶堪賞如許閒愁合得澆薄有宦情淹此日久無封事問明朝銜杯好事論心地却恐髙人不可招采菊采采踈籬滿把香曉筐攜得萬錢黄一杯淺泛仍和露兩鬢斜簮半著霜隂處懸來蜂轉趂風前乾去蝶應傷牀頭藥籠多収貯驗取仙家却老方秋盡次韻曹貳卿見寄一年草草又三秋古署風寒落木稠白鴈江南多日去黄花雨裏幾時留悲深宋玉仍羇旅夢逐莊生亦繆悠高調忽聞隣笛起倚欄賡罷自長謳次韻曹貳卿病愈見寄斷送三秋一雨中林端䇿䇿夜鳴風流年不管人間世往事真成塞上翁病喜沈郎憐帶孔閒教杜甫憶郫筒東園笑語須相過未老黄花尚幾叢聞雨江雨生寒夜不眠初聞浙瀝轉連綿鄉心破碎踈桐㡳病思凄凉斷鴈邉風急三更城逈隔官寺僻在城外草深四壁地逾偏酒醒燈暗還多事占得新詩第幾聨次韻曹貳卿食蟹畢卓嗜蟹興莫當酒杯時自傾鵝黄金膏玉髓良足貴殘甲敗戈非所傷風味十分匕筯底縱横幾許沙洲傍城昏市遠不易覔詠爾徒和琳琅章感事次曹霜厓韻二首記得仙人教下棋應酬𤣥處在先知錯教費盡紅塵力猶有臨終悔著時江干嵗晩衆芳殘閉戸經旬意鮮歡留得後園含翠栢往來只合共君看枕上作窻涵殘月夜悠悠古木空山萬籟収身似虗舟横野渡夢慿欹枕到丹丘天邉鵷侣違經嵗江上魚書動一秋叨守閒官慚肉食擁衾無寐欲奚謀次韻曹貳卿苦雪閉門風雪卧終朝偶為詩筒引興饒便欲訪朋千里去寜知待伴幾時消寒深玉宇愁空闊病減清樽坐寂寥舊隱半荒歸未得多情猶謝小山招次韻曹貳卿長至見寄官閒贏得作詩忙凍墨朝來又幾行江