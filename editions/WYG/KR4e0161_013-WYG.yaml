body:
  text: 竹澗集附録明故正議大夫資治尹兵部左侍郎贈兵部尚書竹澗潘公墓誌銘於乎竹澗而遽而化耶化者之寂滅孰樂耶生者之哀孰妄耶抑理固有常而非常而謂樂與哀皆妄耶未可知也於乎昔在壬癸之嵗偕公奉節誥封于安南歴齊魯徐揚之墟亂于江淮達于呉越惟予與公偕惟時公則先趨而歸予獨登越王臺觀㑹稽窺禹穴訪陽明之洞然後返錢塘過嚴瀬以㑹公於金華撫赤松觀皇初平化羊石然後浩然偕南泝潯横之江以出慿祥兩涯之山夾江揷天竒恠百出目眩心悸笑歌相答忘乎其為行旅矣凡相與嵗月之間無有㡬㣲相逆于心者然後知公之為盛德人也反還朝無何予以憂去繼以病不起離索者八九年及今上改元予奉召至京見公無㡬而予為祭酒以南及予方北公亦治水還朝歴貳夏官卿未及三年而公一日勿病而化於乎人生離合無常死生亦無常予安得不動今昔之悲乎其子徽以其子壻文德之狀來請誌銘予攬涕勉為誌而銘之誌曰竹澗公潘其姓希曾其名仲魯其字竹澗其號金華其里彦亨其髙祖文華其曾祖洪其祖璋其考彦亨應洪武賢良聘使江右有專對之才未官而卒文華以洪貴贈山東道御史洪以御史累官廣西按察僉事又以璋貴贈奉政大夫璋由水部郎司𣙜荆湘有聲為僉事督學於蜀有聲官至陜西副使督學卒食爼豆于蜀之名臣婺之鄉賢祠後洪璋俱以公貴贈中大夫南京太僕寺卿祖妣呉氏封孺人母姜氏封安人俱累贈淑人其世德之積累也公生七年能詩文十有四年喪憲副公於陜奉淑人以喪歸塟讀禮如成人弱冠補郡弟子員經學逈異督學者必器重焉𢎞治辛酉舉鄉試壬戌登進士皆居上第選翰林院庻吉士秋迎母淑人以疾終則扶柩還塟如喪憲副公服除授兵科給事中武廟登極恩詔贈憲副公中憲大夫母㳟人兹其出身之履歴也天性孝友簡黙惇慤接人和夷未嘗作諧謔語有德於人未嘗自言人有不禮未嘗見其非口不言人過有言人之短者則為黙然又不樂趨時進取居三品者且三考至滯也人問之則笑此其德性也沉黙不露外視之若愚及臨大事决大疑若庖丁之理牛無不迎刃而解者兹其材能也正德丙寅有汪鈺者故太監汪直義男也乞陞錦衣衛鎮撫帶俸守塋公即首疏以為世禄以及子孫鬼神不歆非類内臣本無後而强求世禄之恩義男本異姓而欲冐他鬼之䕃疏上中官皆切齒側目又上疏勸上隆大孝勤聖學節遊樂逺佞倖八事逆瑾遂謀中傷之以發前憤乃差公湖貴二省計處邊儲至則有司為備千金以請曰今瑾虐熖日熾凡差者以賂免時也勢也公毅然卻之曰我諫官也未能為朝廷除惡柰何復爾乎瑾因大怒矯詔下獄拷訊欲寘之死杖于闕下暈不知人矣瑾快曰死矣左右負以出不知公之復甦也然且除為民歸則杜門深居宅旁有水水際有竹䕃可息間招親友觴咏悠然自得因自號竹澗居士庚午瑾伏誅明年詔復其官刑科右給事中壬申奉詔持節往使安南賜一品服以行尋由吏科右給事中陞禮科左入其國逺近皆來瞻仰其儀度以為從天而下莫不起敬且為中國重非徒不辱命而已途中述作有南封録反命陞工科都給事中時内官監奏請脩太素殿天鵞房諸役費累鉅萬公抗疏力爭之曰方今邊儲告匱冗食日繁山東河南近經兵燹江西四川瘡痍未起况營建清寜二宫大木採及於逺方工料派遍於天下若復别興土木誠恐民不堪命疏上不報丙子遷南京太僕寺少卿奏易買馬為折色寛滁和之民困而馬課視昔尤易完遇災沴則請蠲貸以蘇之長淮南北之人咸德焉今上御極遷本寺卿復遇恩詔是以有祖考之贈癸未遷南京太常寺卿期月改提督四夷館乙酉晉都察院右副都御史督南贑汀漳等處軍務先是招撫新民或多以詐殺之是以往往復猖獗為民害公鑒其弊務馭以誠信惟於自相告訐者亦聽之而其黨以離有功未賞者悉令賞之以示恩信恵州黠㓂頼貴聚衆肆虐則進兵剿之空其巢凱奏賜金幣慰勞浰頭餘賊曾蛇仔七巢並興流毒江廣則發諸路兵夾攻之賊計窮襲通判董鳴鳳以要我撫公曰不可墮其計中耳乃佯曰通判自僨事不足恤督兵益力戰數合賊大敗生擒渠魁餘黨奔竄通判卒獲全遂犂其庭籍其田以業貧民亷其脅從者分配内地上功多歸之人弗以自伐曰臣子效勞常事耳俘獲渉疑似者不以報奏上㑹召入為工部侍郎故論功竟弗及人益髙之及還朝時黄河溢淤漕渠任事者方興新河之役費且數十萬死者數千人人心洶洶欲為亂嵗運不繼廷議必得公往代乃可賜璽書兼憲職以往莅事公還甫三月也於是誓殫慮畢力以濟大事夙夜思惟亷知沛漕之淤塞因黄河之旁衝黄河之旁衝因上流之未疏今宜疏支河以殺其勢築長隄以防其衝然後鑿通沛漕自無復淤之患乃上疏謂河流故道非一其大而要者若孫家渡趙皮寨乃上流之支河也沛縣飛雲橋乃下流之支河也𢎞治以前三支分流㑹于淮而入海故徐沛不受其害邇來上流二支俱就湮塞全河東下併歸飛雲橋一支下束徐吕二洪上遏閘河流水溢為游波茫無畔岸於是决隄壅沙大為漕患人以為探本之論既至濟即達觀徐沛險阻而得其利害乃復上疏以為濟沛間漕渠忽淤者盖由决河西流横衝并掣閘河之水東入昭陽湖故閘水不復南流而飛雲橋之水時復北漫故沙停而淤也今宜加築東隄以遏入湖之路更築西隄以防黄河之衝臣愚不敢求新竒之功不敢為茍且之計惟欲因舊以為功從省以濟事故捨新河而脩舊漕者圗其易也沿黄河為隄百四十里者防其溢也停槩派夫十數萬僅用河夫二萬餘者恐民勞也罷雇募而行犒助者慮繼費也上並嘉納之不期年而功成以公有定策也己丒秋河溢境山西徙三百歩亂石絶流流下射髙數仭雖虚舟不得上有冐險而下者十覆三四公乃命穿故河廣十歩以通水稍截徙河逼之東仍於徙河兩崖下埽以漸相屬埽漸逼河流激盪因决入故河奔放衝滌一夕河廣一倍二三日盡復其舊人曰今人未見禹之行水未知於公何如耳役之初興也有風公終新河之緒者有風公條新河之害以聞者公一弗從盖公之忠不欲殉人之非以僨國之是而其厚不欲揚人之短以彰已之功故功卒成而人弗病於是傅御史烱章尚書拯各疏公費省而成速畫一而有序坐收累年難就之功宜加陞賞詔陞尚書俸級總理如故然而公自此嬰疾矣盖由鞠躬盡瘁有所不顧焉耳己丒冬上疏乞骸温㫖慰留辛卯春召改兵部右侍郎五日而部署災時堂屬多被逮上察公任淺特貸之公益感奮以一身當衆務之劇收拾圗籍於散毁之餘釐革宿弊而復之舊章則其事業也是年秋遷左尋奉勑督理仁夀宫工役力疾趨事壬辰三月十九日上御正殿傳制賜進士公朝服侍班退朝同省迎進士合主賓百餘人冠盖濟濟宴㑹盡歡比日昃始歸又延接賓客罷則如卧内少休有頃則氣㣲㣲逝矣明日訃聞於朝朝紳皆驚愕以為神異天子贈公兵部尚書賜祭塟所著有竹澗集若千巻又嘗作潘氏家乗以聨屬族人公生成化丙申三月十三日距卒享年五十有七娶葉氏累封淑人前壬辰進士知和州梅澗公睦第三女性慈孝事姑姜淑人得其歡心又能逮下男子三人女子一人長男徽登己丒進士任南京刑部主事女粹適程内翰文德俱淑人出庻子紹邑庠生章氏出綬葛氏出孫男四人長承祜以公䕃為太學生次承祥承禠俱徽子承禋紹子孫女三人公卒三十有三日徽來奔自南都扶櫬而歸將以是年十二月壬寅塟於武義縣來蘇鄉牛山之原銘曰嗟公行已如公行水然順而因應莫為之先大服于于焉朝而朝天日中遊宴以周旋晷刻不息而化吁其僊賜進士出身通議大夫禮部左侍郎前國子祭酒翰林侍讀兼脩國史經筵講官增城湛若水撰大司馬竹澗潘公傳公諱希曾字仲魯浙之金華人也其先畢公髙子季孫者食采于潘子孫因以為氏宋南渡初潘為著姓待制黙成先生以清節歴事三朝為世偉人里閈稱為清潘又節度使鄭王之後尚主隨駕南渡貴傾一時居城西偏人稱為貴潘其自括之竹溪來者田宅甲一郡至景憲父子始以科第顯人稱為富潘三潘鼎居更元之亂世㣲譜散公族籍以儒稱而竟莫辨其誰裔也入國朝洪武間有彦亨者以賢良徵至朝堂問治道仍奉使江右未拜官卒彦亨生文華贈文林郎山東道監察御史文華生洪為御史論列無所避陞廣西按察司僉事累贈中大夫南京太僕寺卿洪生璋即公父也登成化壬辰進士歴官陜西按察司提學副使累贈如僉事君嘗為水部司𣙜荆湘有令譽為僉事督學於蜀推其所自得者為教士風文體翕然丕變蜀人士仰之若山斗樂之如父兄於是宿州知州萬本奏稱天下提學得人若陳選戴珊潘璋數人云云逮擢關中教士如蜀不踰年而卒時諸生以大比集省下咸奔走致奠如喪所親蜀士聞訃亦相率㑹奠三公祠下哭之盡哀後數十年蜀士夫來浙皆往吊于墓蜀名宦婺鄉賢皆爼豆焉祖母呉氏母姜氏俱有賢行累贈淑人公兄弟三人長希奭散官次希顔汝王教授公最少頴異七年能詩文十有四年喪憲副公于陜奉淑人以喪歸讀禮如成人弱冠補郡弟子員慨然慕鄉先哲何王金許四君子之傳砥行明經逈出流軰董學諸公咸器重焉試輒首選𢎞治辛酉舉于鄉明年壬戌登進士皆居上第尋被選翰林庻吉士秋迎淑人就養京邸未㡬淑人以疾終公扶柩還塟除服授兵科給事中時閹豎初熾公灼見其㡬有汪鈺者故太監汪直義男也乞陞錦衣衛鎮撫帶俸守塋公即疏奪之其畧曰臣聞名不正則言不順理既屈則辭必窮彼稱汪直㣲勞以欺陛下獨不思憲廟用舎與衆為公向革汪鈺之職豈無見而負人功乎又稱孤墳可憫以欺陛下獨不思先帝賓天言猶在耳顧忍改於其道乎况世禄以及子孫鬼神不歆非類内臣本無後而强求世禄之恩義男本異姓而欲冐他鬼之䕃物理人情甚是無謂疏上中官切齒而公之禍基矣復因災異陳言勸上隆大孝勤聖學節遊樂逺佞倖振因循懲玩法備邊事勵士節八事其畧曰事天之道不外於事親得親之心斯可以得天伏望陛下勤詣靈几躬禮宗廟近思先帝教育之恩逺念祖宗累積之德又時朝于兩宫曲盡母子之情樂聞訓誥之益乃所以隆大孝也至於講學一事尤帝皇圗治之本從容便殿之中講論片時之㑹與視朝御膳等爾於聖體未勞也顧乃專事游樂不避炎日陛下柰何舎有益而不為作無益而不憚勞耶伏望仍開經筵日講使日新之功有加無已乃所以勤聖學也如射獵遊戱往往使人心意荒惑形神勞頓千金之子坐不垂堂陛下以宗廟社稷之身豈不自愛哉此皆由左右前後不得正人希寵導非迷君誤國伏望放鷹犬絶玩戱仍簡内臣端謹者以充侍從務俾游樂有節而佞倖不得近天下之患莫甚於因循因循不振則國政日弊近該部奏准查革冗食濫費足國裕民莫急於此而乃累旬浹月不即奉行部寺猶然諸司何責京師如此藩郡可知伏乞降㫖切責斷在必行庶㡬人心知警而因循可振也朝廷之患莫大於玩法玩法不懲則主權下移近該部奏准查看草塲以補國用太監寗瑾乃敢無故奏沮此其狥私㒺上情罪顯然乞特敕法司究治庶㡬威權不失而玩法可懲也方今北敵窺視南夷竊發蘇松近地海冦嘯聚江西四川時各有警夫用力攻戰固在將官而運籌調度多在憲職往時巡撫起自陞用者率與邊境及其頗積年勞漸轉内地此但為人擇官非為地方任人也今宜察其不堪邊寄者取回别用果有文武長才者特加乆任秩滿則加其官有功則録其嗣僨事則治其罪如此而敵㓂不靖臣弗信也臣又聞國家必養亷恥之士而後能得忠義之臣律例文武官犯公罪並許收贖守御上直軍校犯笞杖罪俱令納鈔婦人應决杖者非姦罪不去衣此我祖宗仁至義盡也且廷臣宻邇不啻軍校賢者守身不異貞女小有過犯多受刑辱臣竊傷之乞敕法司鎮撫凡常朝官員過犯非係贓惡無得去衣加辱庶㡬全君臣之大體興禮教於無窮其於國家非小補也他疏語皆凱切不便近倖由是逆瑾遂謀中傷正德丁卯差湖貴二省計處邊儲陞吏科右給事中時瑾虐熖方熾凡差者必重賂蘄免禍有司亦為公備千金公毅然却之曰我為諫官不能為朝廷除惡我之罪也柰何復助之乎瑾又風公多參劾為賄地公復不從瑾大怒矯命械公下詔獄考訊欲寘之死既復杖于闕下奄然而暈瑾快曰死矣左右負以出乆乃甦當時見瑾者雖公卿必屈即被謫譴亦必辭以行公既除籍為民獨不往還鄉里杜門不出日惟課子弟讀書宅後池旁佳竹䕃可息間招親友觴咏悠然自得因自號竹澗居士時蘭谿章楓山先生懋於人少許可獨稱公清脩苦節且貽書曰世上何人號最閒司諫拂衣歸華山執事此歸賢於二十四考中書矣庚午瑾伏誅明年詔起公刑科右給事中壬申偕編脩湛公若水奉使安南錫麟袍玉帶服以行尋陞禮科左給事中入其國先諭威德正禮儀然後致命返三辭其贐皆作詩諭意足以服裔夷章王靈非徒不辱而已紀事觀風有南封録焉反命陞工科都給事中時方營建乾清坤寜二宫内官監復請脩盖太素殿天鵞房船塢諸役費累鉅萬公抗疏爭之其畧曰天下之財力有限二宫之營建方興寛一分則得一分之濟早一日則享一日之安况邊陲之軍儲告匱内外之冗食益繁山東河南近經兵燹江西四川未復瘡痍大木採及於逺方工料派通於天下若復别興土木誠恐民不堪命且古昔帝王非無臺池以供遊觀然其作有時其遊有節故民樂其樂天眷其德考之月令當夏毋起土功毋發大衆今時既不宜矣况大内遊玩之處頻年營建不少必欲繼作尤非撙節之道疏上不報丙子遷南京太僕寺少卿先是滁和之民困於納馬公為奏更折色民大稱便而馬課視昔易完每遇災沴復請蠲貸長淮南北之人咸德焉丁丑環滁大雪時聞鑾輿北幸乃作感雪賦其辭曰弭余節于滁陽兮嵗聿暮不吾與曰彊圉赤奮若兮維律中乎大吕顓頊嚴令兮使𤣥冥驅其先風伯憤噫兮雲師乗以垂天羌觱發兮逾栗烈夜淅瀝而霰先集兮晝忽繽紛而雨雪駕玉虬兮驂白螭騰踏銀漢兮濺氷屑夫何累旬月止復作兮紛委積而交加折脩竹以失聲兮封枯楊而生花巋官寺兮山之麓接曠景兮平臯阻寒氣兮空谷旦余適野之莾蒼兮雪始霽而日煜千門凍而反閉兮萬竈凄其未烟燦瓊枝兮林立瑩氷柱兮簷懸僵狐兎以屏跡兮饑鷹隼而莫騫晃六合以昭回兮斂萬籟而寂然吾方遊乎塵垢之外兮幸昭質之未窳歩余馬於白水兮按余轡於瑤圃飲沆瀣兮飱玉英懐琬琰兮佩琳琅茍余心之皎㓗兮雖逺引其何傷嗟滁之僻兮樂有餘逖彼北裔兮僻不可居層氷峨峨兮隂山萃矹豺狼侁侁兮虎豹出沒美人之遊兮轅不及攀良辰感我兮怛肺肝亂曰寒既沍兮嵗亦殫幽獨處兮誰與歡宣余力兮及時難望朔雲兮天漫漫鳳有岡兮龍有淵思美人兮不敢言在滁六年不調今上御極擢本寺卿嘉靖癸未遷南京太常寺卿期月改北提督四夷館時大禮未定議者紛紛公慮其聚訟而貽患也作大禮問以解之其畧曰或問禮官之説皇上以小宗後大宗特重大宗降其小宗亦既合禮經矣曷為議者未已也曰此宗子法也非所以定天子之大禮也其説何也曰宗法為公子卿大夫設也君不與族人為宗也為人後為繼大宗設也君無為人後之禮也且古之後大宗者必屬乎子道者也故可以為父子仲嬰齊以弟後兄非禮也而公羊髙曰為人後者為之子附㑹之過也魯僖公以兄繼弟非世及之常也而胡安國曰臣子一例以僖嘗為臣夫謂臣猶子也則可謂為之子惡乎可近世人主禰其所後則何如曰屬乎子道嘗受命為後儗諸宗法庶乎其可也非此類也何可比而同宗法耶然則其稱號柰何曰天叙有典人不可汩也其廟次柰何曰生為之臣死不得儕於君也其昭穆柰何曰父昭子穆未之有改也或世次不相當不以親親害尊尊可也仰惟我皇上即位承武宗遺詔遵祖訓兄終弟及之文揆之春秋之義克正其始矣其繼武宗之統以主宗廟之祀非若宗法必為之後而後得奉其祀者故以倫則武宗兄也孝宗伯考也以位則皆君也皇上以弟代兄以臣道事先君其為繼武宗也名正而言順矣武宗而有繼也則孝宗固未嘗絶也何得舎武宗而不繼何必考孝宗而後為繼耶由此言之興獻帝聖考也興國太后聖母也名正而言順矣若夫尊崇之典則亦有可言者宋英宗既後仁宗程頤尚謂其父濮王當别立殊稱矧我皇上聖父母乎如曰子無爵父之義周不有追王之禮乎廟祀之典則又有可言者天子為百神之主尚當祭其國之無主後者而顧不得祭其父乎别建寢廟不敢干宗廟之紀不亦可乎公言出而羣議遂定時議禮當上意輙得不次擢公嫌希附卒不以聞主議者求觀亦弗予上計已决期日下詔上寶冊宰臣猶執舊議上甚怒禍且不測公往與言遂草詔大禮卒以定而臣工隂受其福公有調和之力焉乙酉晉都察院右副都御史提督南贛汀漳等處軍務賜璽書斧鉞至則明號令脩器械時簡教亷謀勇信賞罰先是壬癸之亂招撫新民或詐殺之由是各巢往往復連比為患公鑒斯弊務馭以誠信惟自相告訐者聽之以離其黨舊有功未賞者有司或吝出納公謂此何以勸且示之不信悉賞之於是惠州黠㓂頼貴聚衆肆虐公發兵洗其巢穴凱奏上嘉悦賜金幣慰勞浰頭餘黨曾蛇仔等七巢並興大肆毒痡逺近震恐公發諸路兵夾剿賊大懼願撫且襲通判董鳴鳳以要公曰此賊故智耳昔人常墮其計容復蹈乎乃下令曰通判自僨事不足恤有能掖之出者予弗死益督進兵力戰賊大敗渠魁生禽俘馘千餘牛馬器械獲甚衆餘黨奔竄於是犁其庭籍其田業貧民審其脅從者分配内地通判卒獲全公制變决機竒中折衝尊爼之間而親臨戰陳者咸弗及也至上功獻捷初弗張皇謂臣子效勞期於成事而已希賞非我志也故紀述勞勩多歸之人其俘獲稍渉疑似即不以報㑹掾吏白故事宜納賂不者功雖髙不賞公曰我寜無功耳奏上㑹召為工部右侍郎迨論功竟弗及焉還朝值河溢淤漕任事者方興新河之役費且數十萬死者數千人人心洶洶嵗運不繼上憂之廷議必得公代乃可賜璽書兼憲職往涖事公還甫三月也既受命誓殫慮畢力以濟大事夙夜思惟考故詢謀以沛漕之淤塞因黄河之旁衝黄河之旁衝因上流之未疏今宜疏支河以殺其勢築長隄以防其衝然後挑通沛漕自無復淤之患乃上疏其畧曰河流故道非一其大而要者若孫家渡趙皮寨乃上流之支河沛縣飛雲橋乃下流之支河𢎞治以前三支分流㑹于淮而入海故徐沛不受其害邇來上流二支俱就湮塞全河東下併歸飛雲橋一支下束徐吕二洪上遏閘河流水溢為游波茫無畔岸於是决隄壅沙大為漕患今日之計固當挑濬舊漕以通糧運加築隄岸以防衝决然非疏上流之支河將來秋水復發沙雖挑而難保其不復淤隄雖築而難保其不復决探本之論固有在矣上嘉納焉至濟即達觀徐沛淤漕閲新河險阻沿黄河出豐單以求决囓奔衝之迹洞悉利害而得其要機遂築長隄起單至沛几百四十餘里時建議者欲别遣官相度意在阻公適有㫖下公計處乃復上疏其畧曰漕渠廟道口下忽淤數十里者由决河西來横衝掣閘河水入昭陽湖以致閘水不復南流而飛雲橋之水時復北漫故沙停而淤也今宜加築東隄以遏入湖之路更築西隄以防黄河之衝俾其自北而南常由故道則沙不復淤矣臣愚且拙不敢求新竒之功不敢為茍且之計惟欲因舊以為功從省以濟事順水性以除患故舎新河而脩舊漕者圗其易也沿黄河為隄者防其溢也停槩派夫十數萬僅用河夫二萬餘者恐民勞也罷雇募而行犒助者慮繼費也上復納之劉司空麟遺公書言近日議者謂趙皮寨孫家渡不足洩黄河怒漕渠或不免復淤柰何公復書云黄河為中原患非一日矣智者不與水爭地惟順其勢而導之後世或塞其决或隄其卑或疏其派皆隨時救患者也國家漕渠為南北咽喉勢不得不與河爭地𢎞治初河决荆隆口又决黄陵岡又决張秋當時嘗濬孫家渡宿遷小河而後荆隆黄陵張秋可塞此分洩河怒之驗也况自河南歴直𨽻至山東之曹縣恃長隄以禦河患亦既有年今單豐沛為隄獨不可以捍禦乎盖事理可據與人力可為者如是而已若欲别求逺圗則新河之役可為殷鑑公遂毅然行之役夫費銀不滿二萬不期年而功成沛漕流通嵗運如故每河漲隄下水退沙迴民多耕作焉其後河徙成化間故道出徐州小浮橋合運河而飛雲橋道塞無復沙淤之患矣己丒秋境山河忽西徙三百歩亂石絶河湍射下數仭雖虛舟不得上有冐險而下者十覆三四逺近駭懼舟戒弗行公命穿故河廣十歩以通水稍截徙河逼之東兩涯下埽以漸相屬及兩埽逼河流激盪乃决入故河奔放衝滌一夕河廣一倍二三日盡復其舊人謂禹之行水弗是過也是役也有風公終新河之緒者有謂當條新河之害以聞者公一弗從盖公之忠不欲狥人之非以僨國之是而其厚不欲揚人之短以彰已之功故功卒成而人弗病於是御史傅君烱疏公費省而成速上紓九重漕河之憂下遺一方民田之利工部尚書章公拯疏公區畫有方督理有序國之峻功一旦告成宜加陞賞以勵臣工上乃詔加公尚書俸級仍總理之任然公積勞成疾自此始矣是年冬疏乞骸上温㫖慰留義不敢復辭事詳治河録辛卯春召改兵部右侍郎五日而部署災時堂屬多被逮公以一身疲衆務收燬散之圗書防夤縁之奸弊罔有餘力又奏罷各省鎮守太監是年秋陞本部左侍郎冬復奉勑督理仁夀宫役力疾趨事壬辰三月十九日戊辰朝服侍上御殿傳制賜進士退朝同省集迎主賓百餘冠裳濟濟宴㑹盡歡比日昃歸復接賓客罷如卧内少休有頃則氣㣲㣲逝矣明日訃聞於朝咸驚愕以為異旁皇赴吊天子軫哀特贈兵部尚書賜塟祭公儀狀秀偉言辭辨正性孝友質直簡黙惇慤平生言動未嘗少越法度接人和夷而不喜諧謔無亢無比無賢愚大小見必稱長者使人弗逆億敦然以情尤篤於故舊鄉里後進接引不遺有德於人終不自言人有無禮未嘗見其非口不言人過聞人有言者則嘿然凡職分當為無不學而一無所炫視之若愚及臨大事决大疑若庖丁理牛無不迎刄而解雅知止足不逐時進取為太僕八年居卿貳且三考朝列鮮有同者而公裕如也平生讀書精思力究發為文章雋腴古雅詩尤清婉卓然名家所著有竹澗集若干巻嘗慮族人久而易渙乃倣古宗法作潘氏家乗僉事府君有舊廬葺之以居族人創家廟立祭規凡尊祖睦族之為罔弗至焉公生成化丙申享年僅五十有七塟武義縣牛山之原娶葉氏累封淑人前壬辰進士知和州梅澗公睦第三女性慈孝事姑姜淑人深得其歡心尤能逮下所在著聞生子徽與永康程文德同登己丒進士任刑部主事女粹適文德封孺人庶子紹邑庠生章氏出綬葛氏出孫男四人長承祜以公䕃為太學生次承祥承禠承禋禮部侍郎甘泉湛公若水為之銘諸壙云史氏文德曰夫公可謂不近名者矣當瑾之横也公而少自為可以不禠其爵也官滁陽則八年矣猶曰休厥居也總師而師㨗矣治河而河道矣而亦既勞矣而九嵗弗遷焉近名者至是乎且當發言盈庭之日一言而禮取𠂻焉公孤可立致也公著論寜獨秘焉近名者能之乎於乎寜抑其位而信其德不求知于人而求知于天若公者固三代之遺直也耶後之論世者庶有考於斯焉翰林院編脩文林郎經筵官子壻程文德撰侍郎潘公祠堂記祠在境山潘公何祠民祠之也思也德公思公圗報無地故為祠以尸祝之也民何德公之理河不擾民不激水漕舟通利國富民安飲水者思禹不能一朝忘也然則民作之乎民無敢作君子者聽之也君子何聽髙山仰止景行行止五音之於六律方員之於規矩前船後眼不能舎之而他適也於戯遺愛於民遺法於後公去猶不去也公没猶不没也大人君子其無尚於立德也已是故可以祠可以記公諱希曾字仲魯號竹澗浙江金華人嘉靖八年以工部侍郎兼都察院僉都御史奉勑總理河道祠成於十有六年之秋倡之者耆民郝端伊逵等聽之者理鹺監察御史陳公蕙洪公垣視其成者徐州整敕兵備山東按察司副使宋君圭徐州知州陸君時望記者州人馬津湖廣按察司僉事記已為歌歌曰於戱公之理河也民無知公之去河也民有祠河之水兮湯湯公之靈兮洋洋嵗時伏臘兮民曷可忘竹澗集附録
