body:
  text: 竹澗集奏議巻二明潘希曾撰都臺九首災異疏題為災異事據廣東韶州府申稱嘉靖四年十二月二十四日夜四更時分忽有電光閃爍自東南來雷震有聲凡四次後雨下如注雷聲乃止為照雷電發於春轟於夏蟄於秋收於冬乃今季冬之月雷電異常上天垂戒不為無意又據江西贛州府申稱嘉靖四年十月以來一向多雨至閏十二月二十二日大雨微霽本日起至二十四日每酉時分滿天赤雲照映牆壁俱見紅色二十七二十八日酉時赤氣仍前看係災異合就申稟各報到臣據此看得變不虚生天實示戒除臣痛自修省及行各省并該道府衛所縣等衙門一體修省以弭災變外縁係災異事理為此具本専差千戸楊忠親齎謹具題知遵勅諭陳利弊以消天變疏題為遵勅諭陳利弊以消天變事查得接管巻内准户部咨該廣東按察司副使徐文溥奏内開疏鹽法查得先因兩廣軍餉不足奏准廣鹽於南雄府抽分許行南贛發賣繼因南贛軍餉不足奏准廣鹽於贛州府抽分許行袁臨吉發賣官民便之正徳十三年三月内該本部題准廣鹽止許南贛發賣其袁臨吉三府不許擅便行賣違者照例問罪司國計者必有深見但淮鹽逆流而上三十餘程脚價反重鹽價反輕商船經年不來而廣鹽止越一程順流而下其勢甚便袁臨吉人民欲仰給淮鹽不食廣鹽其可得乎夫淮鹽廣鹽皆國家利也民隨時變易可行於南贛則亦可行於袁臨吉矣臣又訪得廣鹽自南安過嶺下貢水者多係拆賣有引官鹽稱為大路自石城過山下章水者係肩挑無引私鹽稱為小路一入贛江則官私莫辯又有畏懼南雄府太平橋查盤俱從小路越信豐縣横田江九渡水徑裝袁臨吉地方貨賣即欲禁革人民缺鹽嗟嘆何堪又况販鹽之徒豈肯棄其世業重法誅之亦難禁止贛州雖設橋船防禁秋冬水落則賂通把守賣放權貴囑託公差夾帶弊且百出春夏水漲衝散橋船則聚衆連艘執持器械乗勢徑度巡邏防守勢不能支於是乃有抽分之議以為不抽分則利歸姦雄之手官失自然之利然既係私販則法當禁捕乃從而征之是取之於盜賊也可乎頃因廣東軍餉缺乏鹽課虚耗特勅専官管理法固善矣然不濬其源而徒塞其流耳臣愚以為法既不可禁不若因其勢而利道之如蒙乞勅户部計議查照題准舊例行令廣鹽照例南雄府納税許行袁臨吉三府發賣經過贛州量行抽分以備軍餉該府年終将用過餘銀解部支用如此則廣鹽得以疏通私販以之自息民獲利濟而國用日裕矣前件查得先該欽差提督南贛汀漳等處軍務都察院右副都御史聶某題為地方事據江西按察司整飭兵備帶管分巡嶺北道副使王度呈前事照得江西一十三府先年俱係行淮鹽地方後因廣東用兵軍餉無資議抽鹽税将廣鹽奏准行南贛二府後又因南贛用兵軍餉無資議抽鹽税又将廣鹽奏准行袁臨吉三府今廣東之抽分仍舊南贛之抽分停止則廣鹽止當行於南贛而不當行於袁臨吉本道已經呈奉提督南贛汀漳等處軍務都察院右副都御史聶明文存留橋關禁止廣鹽不許越境販賣但行之已久今奉停止則商人有本折之苦地方有鹽騰之害兼且把關人役姦弊紛紜巡邏官員詰捕旁午本道日益多事伊欲稍從假貸任其下流則無藉鹽徒乗其厚利興販前鹽散入南直𨽻蘇松等處沮壊淮鹽本道亦難辭責為今之計合無於贛州龜角尾照舊開厰止抽廣鹽一件許行袁臨吉三府發賣其餘貨物不必再抽庶乎商民得販鹽之利窮民得食鹽之利江西之軍餉有資廣東之官鹽無滯似於地方有益等因到臣巻查前項抽分該前都御史王遵奉詔書停止外今據前因切照袁臨吉等府原非行廣鹽地方先年南贛二府賊盜生發錢糧無措奏准下流各府發賣抽分税銀以充軍餉因此十餘年來彼處居民以食廣鹽為便各處商人以販廣鹽為利今一旦遏止委的民興無鹽之嘆商失經營之利衆口嗷嗷羣聚告擾且南贛地方界連三省盜賊淵藪今雖頗寧不測之患難保必無軍餉之用不可不備况江西各府節遭荒旱衛所官軍月糧屢年不得關支甚切匱乏之憂如蒙皇上憫念地方俯順商民之情乞勅該部議處准令将廣鹽照舊疏通於袁臨吉三府發賣每季行委隔别府分㢘能佐貳官一員管理抽收税銀貯贛州府庫聴候軍餉支用有餘助給官軍月糧等項之乏其餘貨物俱免抽分聴臣嚴督守巡等官查革姦弊年終造冊繳部查考等因奏奉聖㫖該衙門知道欽此查行間今副使徐文溥又奏前因看係一事况所見相同揆之民情土俗似亦便順但於例未宜及事在彼中遽難定奪合行撫按衙門再行議處停當徑自奏請施行等因又查得先准本院咨為順人情宜土俗以通鹽法以充國賦事該巡按兩廣監察御史曹軒嘗奏言之續准本院咨為承詔敷陳軍民利病以恢𢎞聖治事該巡按江西監察御史黎貫亦奏言之又該前都御史聶會同廣東清軍監察御史楊銓議照袁臨吉三府雖係行淮鹽地方水逆灘險鹽船不到自奏准開抽通廣鹽以來彼處軍民惟食廣鹽商人得利興販日衆近奉例禁革民缺鹽商失利情甚不堪揆之理勢誠不可以不疏通等因咨院及據江西布按二司守巡嶺北道左參政王大用兵備副使林大輅呈稱訪諸鹽商自南雄太平橋搉税般至信豐縣九渡水下船徑抵贛河商樂其便而南安則惟章水一支河道紆淺兼以折梅亭換夫頗費脚力商人就此者少又瑞金石城小路之鹽自福建汀州而來俱舟入貢水亦為違禁若在南安抽分則信豐各縣所過之鹽俱得不税合無查照舊規准将廣鹽許行袁臨吉地方發賣於贛州龜角尾官厰照例抽税於東西浮橋如法啟閉每季於隔别府分坐委佐貳官員前去管理驗有廣東南雄府票照曾經太平橋税過每鹽十引抽一引半其餘無票者每鹽十引抽二引折收價銀送贛州府貯庫以備軍餉支用及南贛各衛所官軍月糧并各縣隄備官軍口糧缺少湊支每季贛州府将抽過銀兩數目備申合干上司衙門查考臣惟御史曹軒等奏議率與咨内事理相同參政王大用等所呈亦似議處停當利民裕國足為良法况廣鹽先年通行於袁臨吉未聞鹽法有礙近年止行於南贛未聞淮鹽有來若不仍照先年疏通徒使私販益衆官捕益勞利歸漏網之夫而鹽食愈艱禍起拒捕之輩而事勢可慮抑且軍儲無資緩急無措非計之得也伏望皇上軫念下情俯從輿論特勅户部計議施行地方幸甚縁係遵勅諭陳利弊以消天變事理未敢擅便為此具本順差千户楊忠親齎謹題請㫖請捄京營積弊以備不虞疏題為請捄京營積弊以備不虞事准兵部咨該吏科給事中楊秉義題該本部議題奉聖㫖是都准議行欽此欽遵内開一慎将令切惟為政以用人為先御軍以擇将為急見今淮揚等處地方災傷重大民窮盜起勢所必至陜西咸寧甘肅等處又各有大勢敵兵出沒侵犯選将練兵用戒不虞誠為目前急務合無本部查照先今事理通行兩京五府各部都察院通政司大理寺各堂上官并掌科掌道及在外巡撫巡按布按二司等官文書到日限一箇月以裏各從公保舉謀勇㢘能軍職官員不拘邊方腹裏寒微世胄開具履歴實跡徑自具奏本部遇有領軍及坐營等項相應員缺斟酌推舉上請簡用不許推托避嫌及濫保不實有負朝廷訪求将材至意備咨到臣除軍職才績未著及詢察未真外訪得福建總督備倭都指揮僉事王翺弓馬素習而文事兼通督備効勞而海冦遯迹湖廣守備郴桂等處地方署都指揮僉事沈鸞先經征進而擒斬有功久任邊方而軍威克振江西贛州衛見奉查勘功陞都指揮僉事吳山年力方壯而累建軍功志操可觀而亦善騎射見奉查勘功陞都指揮僉事明徳屢征冦盜而獲功已多素有勇謀而居閒頗久以上各官職雖不同才皆堪用乞勅兵部再加查訪果如臣所言将各官量才授任則将領不致缺人而軍職亦知所勵矣縁係請捄京營積弊以備不虞事理未敢擅便為此具本専差舍人謝珂親齎謹題請㫖擒斬反招黠賊功次疏題為擒斬反招黠賊功次事據廣東按察司整飭兵備兼分巡嶺東道僉事施儒呈為乞早發兵剪除反賊以安地方良民事據守備惠潮等處地方以都指揮體統行事廣州左衛指揮僉事程鑒并領哨惠州等衛指揮等官髙瑛等稟稱有名賊首賴貴張廷山張廷貴并甲從賊人劉廷珠等俱已擒斬将盡雖有敗遁一二一時難以搜扒乞行留兵戍守仍乞呈請掣兵等因據此案查先據惠州府歸善縣寛得都鄉老總甲被害民鍾明廣陳尚能等各狀訴稱桃子園首從强賊賴貴等反招聚衆劫殺人財擄姦婦女占奪田土等情已經會議備由通行呈稟及調集原借留操調達官火明伍宣等并指揮吳樹哨官軍與原顧募打手及附近龍川興寧海豐程鄉揭陽河源等縣地方慣戰鄉夫行委管操惠州衛指揮髙瑛惠潮二府推官周楫李喬木龍川等所縣千户吕員朱鼎吏目吳增等官分領哨道尅期進𠞰又因前賊遁入深險山峒仍催督原奉軍門督發截捕别起流賊指揮雷潤哨官軍并達官亦卜刺因等併勢夾攻隨奉軍門會批據本道會呈前事奉批議仰本道依擬嚴督上𦂳𠞰捕務在事機縝密計慮周詳獲功解報以靖地方重加奨賞毋容輕率怠誤貽害若究及奉提督南贛汀漳等處軍務都察院右副都御史潘批仰嚴督官兵追𠞰事平将獲過功次用過錢糧開報又蒙巡按廣東監察御史涂相批看得殘賊賴貴等背招肆惡為患地方亟宜𠞰滅動調官兵事宜悉依擬行務使賊黨悉除獲功解報仍須戒諭督兵等官程鑒等毋得濫及良民斯為善舉其合用錢糧徑自酌處事完之日造冊繳報查考依蒙督據各哨官兵擒斬首從反賊賴貴等一百七十六名顆俘獲賊屬婦女大小八十三口并器仗馬匹前來會審閲實賊人賊級轉解賊屬權宜變賣價銀添湊賞功器械馬匹給與兵壯領用餧養騎征外又經催督各哨将搜山續獲賊人張廷貴宋亞黄等六十五名顆呈報在案今據前因看得前項惡賊賴貴等已擒斬二百四十一名顆雖尚有散遁餘黨數亦不多但山峒險逺林木障翳易於藏躱一時委難搜扒盡絶必須留兵防守庶免殘黨嘯聚之患合無将本道顧募打手五百名并留指揮雷潤哨官軍四百三十員名仍在桃子園柏埔地方屯劄緝捕殘黨䕶民耕種其餘官軍打手鄉夫民壯悉行掣散呈乞照詳等因到臣案查先據守備惠潮等處地方以都指揮體統行事廣州左衛指揮僉事程鑒呈為被强賊劫掠打騙銀兩搶檢家財焚燒房屋等事據長樂守禦千户所中該蒙分巡僉事施儒案驗内開據潮州府呈據饒平縣􅀈洲都致仕知州饒金家人饒二具狀訴嘉靖四年八月内有家主前往本都安樂渡村收租本月二十九日早忽被强賊一宗二百餘徒突來本村劫掠将家主綑縛搶剥租銀七十餘兩家財衣服劫空仍劫大河壹水至三河巡檢司前隔河地名東門埔白日放火焚燒民屋三十餘家殺死民人杜大曾二仔二命仍将家主綁到竹頭坑屯劄逼銀一百兩方纔釋放各賊於大麻村登岸去訖告乞轉達施行等因據此又據海陽縣地方總甲劉廷陽呈稱前賊在於饒平􅀈洲都擄船過河突來到都擄劫鄉民陳文祐林大等家九月初七日至土名深村廷陽家住夜次日早将林大并經紀人賴大公殺死二命等因又據三河巡檢司申據饒金家人饒才告同前情及據民鄧文譽吳瀚等告稱前賊打劫饒知州又劫東門埔曹永瑄等人財放火燒屋殺人流劫大麻一路人財殺死鄉民錢大仍擄男婦二十餘名口本司督兵追捕前賊擁入崑崙銅鼔嶂去訖等因到府轉呈到道看得前賊聚集二百餘徒流劫鄉村殺人燒屋勢頗猖獗若不疾早撲滅未免釀成大患除行委該府推官李喬木等督兵追捕外今訪探得前賊越往海豐縣地方流劫縁照該縣捕盜缺官兵力寡弱恐難支持該府捕盜通判陶天祐年力衰憊亦難専責應合權宜暫委推官周楫督捕案仰本所速行守備指揮程鑒統領惠州碣石各衛所見在巡捕官軍并起取附近屯堡精壯軍餘各備鋒利器械督同推官周楫兵壯打手人等黏蹤追捕獲功解報施行依蒙備申到職切照惠潮二府地方每遇秋冬流賊往往聚衆劫掠今據報稱賊勢猖獗若仍於衛所起調巡捕并屯堡兵夫前去截遏尤恐兵力寡弱不無誤事必須呈調經戰精勇官兵督發相機跟捕方克有濟如蒙軫念乞發廣城下班休息達官二十名殺手三二百名及歇班惠州衛指揮雷潤碣石衛指揮房錦二哨旗軍協同附近地方兵夫分發併勢尋蹤擒捕其合用馬匹錢糧乞行守巡道議處備用等因具呈前來續據分巡嶺東道僉事施儒呈為走報𦂳急賊情事據潮陽縣申稱本年九月十七日被流賊江文生等打劫貴山等都人財姦汙婦女燒燬房屋捉擄吉安巡檢司巡檢施淵等因到道看係捉擄職官重情除嚴督原委推官李喬木周楫并督發管操指揮髙瑛統領見在達官千長總小甲打手共一千員名前去追捕并關福建分巡漳南道督兵把截各賊歸路及懸重賞示諭兵夫用命舉事等因前來又續據僉事施儒呈為地方𦂳急賊情事據領哨惠州衛指揮使髙瑛呈前事蒙本道紙牌備仰本職統領副巡檢練廷爵并達官千長打手兼程前去隨賊向往黏蹤追捕務将前賊全夥擒捕盡絶奪回被擄官員獲功解報依蒙統領副巡檢練廷爵并達官千長打手共一千餘名到於地方梅子坑據緝事打手走報流賊約有一百餘徒越來下莂雙頭畔田等村打劫民人張宗廣等家等因隨即統兵跟蹤追捕前賊聞知驚懼先将原擄去吉安巡檢司巡檢施淵脱放遁往地名梅林河埠擄船駕到黄牛渡隘上登岸放火燒燬本隘突入十二都巡檢司屯劄本職探得濮溪都地名葵潭係是衝要水陸要路督兵到彼截遏設法出奇分兵河埠四岸裝伏前賊駕船七隻開裝旗號灣船執旗上岸迎敵彼職督兵交鋒對敵當有千長曾元魁等衝鋒破陣被賊戳傷衆兵奮勇向前當陣擒斬打旗賊甲并賊都總江文生黄環等及戳傷數多各賊敗走兵夫追逼俱投葵潭河中淹沉難以斬取首級共擒斬獲賊人首從六十九名顆俘獲賊馬三匹奪回被擄船大小七隻省令舊役老人賴伯夀并鄉民李昭收候聴取等因又據揭陽縣千長蕭璋呈解賊級一顆長樂縣地方排年李元美等呈解生擒賊徒陳元達等六名賊級一顆各到道審閲明白今将擒斬首從賊人賊級七十七名顆呈解審閲施行等因及該軍門批發蒼梧道巡守官查審閲驗續據巡守嶺東道僉事等官施儒等呈為乞早發兵剪除反賊以安地方良民事據惠州府歸善縣寛得都鄉老鍾明廣總甲官佐民人石記全陳尚能謝本明各具狀訴稱被桃子園殘賊賴貴蕭廣朱曰廷張廷山等糾合三百餘徒反招聚衆開張黑旗鳴鑼放銃劫殺人財荼毒地方本年七月内将良民張文興等一家并朱亞狗殺滅八月十九日捉擄陳尚能妻朱氏陳細娘逼銀贖命九月二十九日殺死陳尚成譚氏等命捉擄陳尚雄石原深等入巢打逼不知生死姦占闕氏并女二口為妻日逐大肆去劫抄掠鄉村人財良善抛棄産業逃命山林况今冬熟不能收割妻兒失食告乞急救倒懸發兵𠞰捕以靖地方民賴安生等情據此查得先因桃子園賊首李文積等反招聚衆劫殺人財占奪田地已該分巡僉事施儒會同前帶管分守左參議徐度勘議明白備由通行呈奉三府并提督南贛軍門及蒙巡按察院等衙門批行動調漢達官軍兵壯行委守備指揮程鑒統督領哨同知莫相指揮等官劉璟等管領尅期𢷬巢𠞰擒渠魁黨從李文積等一千七百六十餘功解報審驗處决外續奉撫按衙門案驗批呈依奉将各哨官兵掣散仍行緝捕餘黨及借留領哨惠州衛指揮僉事吳樹哨官軍哨守地方彼因殘賊賴貴等狡黠遯匿深山搜扒不獲師還復出始及一百六十餘徒隨據甲頭賴貴王廷珠等具狀赴道告乞招撫時值春耕暫行俯順牌仰巡檢楊漢押帶賴貴等各還原居本分耕種仍處給口食牛種安插停當造冊回報在案今告前因叅照殘賊賴貴等與李文積等同夥為盜征𠞰漏刃既經撫處安插即當改過自新乃敢復肆兇頑糾集醜類劫殺人財擄姦婦女逐散良善占據田産遂致告訴紛然警報日聞若不疾早撲滅未免釀成大患又該各職督同守備指揮程鑒議照前賊積年狡黠巢穴星散若只一路進兵未免東追西竄隨會案将見在召募及借留長樂團操達官打手并添調附近歸善長樂程鄉興寧等縣慣能殺賊敢勇鄉夫共四千餘員名行委惠州衛指揮髙瑛楊昂惠潮二府推官周楫李喬木龍川千户所副千户吕員吏目吳增程鄉縣主簿陳政等官分領哨道仍行守備指揮程鑒統督尅期並進夾攻𠞰捕欲候呈請至日方行舉事縁程途逺涉往返日久恐機事預泄則賊得為備功難速成除一面督發各該官兵追𠞰前賊獲功之日另行解報外今将縁由具呈照詳等因前來已經批仰嚴督官兵追𠞰去後續據巡守嶺東道僉事等官施儒等呈為擒斬反招黠賊功次事内開據指揮髙瑛哨生擒賊首賴貴賴富賊徒謝徳勝等共三十四名斬獲賊級四十三顆俘獲賊屬劉氏等大小共七十七口奪獲賊馬三匹推官周楫哨生擒甲從賊人王大等四十五名斬獲賊級四顆俘獲賊屬張氏等四口推官李喬木哨生擒賊首張廷山賊徒廖亞伯楊阿琳等共三十六名斬獲賊級十顆奪獲賊仗腰刀二把槍一根馬一匹禽書一本黑紬旗一面千戸吕員吏目吳增哨生擒賊徒張廷興等五名斬獲賊級三顆千户朱鼎哨擒獲賊人伍世寛等四名斬獲賊級三顆把截要路巡檢楊漢擒獲賊徒鄒叔仔謝鸞等二十三名俘獲賊屬二口巡檢楊通擒獲賊人二名唐從貴沈亞二驛丞鄭文秩擒獲賊犯一名塗明主簿謝鏜擒獲賊徒江大等五名各前來審得賊首賴貴賴富等甲從賊人劉廷珠等六十六名并審究因傷中途身死首從賊人張廷山等四十七名及就近斬獲賊人劉禽總等首級六十三顆共一百七十六名顆各委的先投在李文積等手下為盜大征脱捕後隨同賴貴等聴撫反招劫殺張文興等家人財占奪田産等情是實取具口詞在案賊級委千户魏騰髙等閲驗真的及審得解來賊人數内朱亞長等四十二名各執詞有稱係近投入在彼耕田者有稱在彼附近居住者俱不曾為盜等情及數内朱亞長等三十名俱有該圖里老見在證審果係良善當即釋放其劉廷聚劉廷器黄明何木旺廖舉李元真李亞長鍾彪葉四九名止係一面之詞劉湯旺梁金保陳學仔三名跡涉疑詞俱係事干强盜重情遽難輕信發回該管河源等縣速拘里排親鄰審勘并将器仗馬匹給與見操兵壯領用餧養騎征賊屬權宜酌處就彼變賣價銀入官添湊賞功及再嚴督各哨官兵搜扒敗遯餘黨盡絶另行解報今将首從賊人賊級共一百七十六名顆呈解審驗施行等因及該軍門批仰蒼梧道分守官會審閲驗去後今據前因臣會同提督兩廣軍務兼理巡撫都察院右都御史姚鏌總鎮兩廣等處地方内官監太監鄭潤鎮守兩廣地方總兵官征蠻将軍撫寧侯朱麒巡按廣東監察御史涂相議查得别巻一宗為陳言地方利弊事節該兵部看得巡按御史髙公韶奏稱廣東之盜宜於撲捕而不宜於大征備言撲捕之有益與大征之有害切縁廣東之新寧清逺白水後山恩平陽江緑水羅傍河源龍川等處委的盜賊淵藪常年竊發不能斷絶撲捕於始發則用力易而為費少俟其猖獗而後調兵征之則用力難而為費多合無今後地方但有盜賊竊發即便督行守巡兵備等官設法撲捕不許遷延怠忽釀成大患其有功績顯著者亦與具實奏聞以憑議擬陞賞不許勢要子弟揑名插報若果賊勢重大相應大征亦須指定地方賊首姓名不許含糊延蔓惟圖報功莫辨玉石其有相應撲捕而不行早處必欲養亂自利者許巡按御史指實劾奏等因題奉欽依備行前來通行欽遵外臣等為照廣東惠潮二府饒平長樂等縣接連福建江西地方三省交界萬山盤礴谿徑聨絡多歧延袤數千餘里自昔流逋嘯聚動成大患今流賊江文生等敢以烏合之黨類流劫良善之鄉村殺擄人財而肆無忌憚姦汙婦女而白晝横行拒敵官兵捉擄職官驚駭郡邑兇惡特甚若非早為殄滅必将流禍於四方反賊賴貴等本該桃子園之殘黨復踵李文積之故智據舊巢而兇殘大肆眇官司而劫掠盛行殺人放火無所不為占産奪婦特其餘事若非急謀蕩掃亦必貽釁於他日今分巡僉事施儒乃能運謀設䇿籌畫有方於流賊江文生等既已剪其萌芽賊黨為之逺遯於叛賊賴貴等亦復𢷬其巢穴賊壘為之漸清俘馘已踰四百之衆靖冦用安兩郡之民且不多煩兵力亦無浪費錢糧其功實為可嘉分守右參議汪思亦能同心督率協力贊成計畫無遺進攻有備其功亦宜所録再照守備以都指揮體統行事指揮僉事程鑒承委𠞰賊克効勤勞亦合優奨但恩典出自朝廷非臣下所敢擅擬伏乞聖裁除行該道守巡守備官将原調征有功官軍人等查照規格犒賞以勵人心及量留官軍打手在於𠞰過地方屯劄往來緝捕殘黨䕶民耕種其餘盡行掣散放回休息外縁係擒斬反招黠賊功次及節該兵部題奉欽依備行但有盜賊竊發即便督行守巡兵備等官設法撲捕其有功績顯著者亦與具實奏聞議擬陞賞事理未敢擅便為此具本専差舍人劉髙親齎謹題請㫖議處守備官員疏題為議處守備官員事臣惟南贛乃多事之地守備為禦侮之官安攘之計擇将為急訪得守備江西南贛二府地方都指揮僉事康英年力衰憊動履艱辛徒取素餐之譏難責奮武之效且聞本官亦嘗奏稱有疾乞回調治此其自知之明不可一日安乎其位者也又訪得江西贛州衛指揮使陞都指揮僉事吳山明徳之二臣者並當壯年而累建軍功俱有謀勇而習知土俗但因奉查功次在閒日久若以見陞職銜用之功次聴查或以原任職銜用之以都指揮體統行事則皆可備将領者也伏望皇上加察勅兵部計議合無将康英放回原衛以遂其私将吳山明徳量用一員就近交代惟復别選将材速令赴任庶幾守備得人而地方有賴矣縁係議處守備官員事理未敢擅便為此具本順差舍人來儀親齎謹題請㫖謝恩疏奏為謝恩事嘉靖五年七月十二日准兵部咨為擒斬反招黠賊功次事内開該本部具題奉聖㫖是各官既能擒斬劇賊巢穴盡空其功可嘉鄭潤姚鏌朱麒潘希曾涂相各賞銀二十兩紵絲二表裏施儒汪思程鑒各賞銀十五兩紵絲一表裏欽此欽遵移咨到臣本月十七日贛州衛舍人來儀於禮部順領花銀二十兩大紅織金獬豸紵絲一表裏素紵絲一表裏齎送到臣除欽遵望闕叩頭領受外伏念草竊就殄邊陲稍安藉兵力以有成仗天威於無外雖嘗指示實匪賢勞乃蒙温㫖褒嘉槩與賞功恩典白金頒内藏之寶拜捧生輝文綺重華衮之榮被服思稱極逾涯分莫報涓埃尚當省厥躬推之揚清激濁庶以修内治期於本固邦寧臣不勝感戴天恩之至為此具本専差千户李環親齎謝恩謹具奏聞守備缺官疏題為守備缺官事照得福建守備汀漳地方以都指揮體統行事指揮僉事賈能因嘉靖二年五月内流賊劫掠長泰縣珪塘等地方該巡按衙門叅奏嘉靖四年十一月内提問隨該鎮巡衙門會委鎮海衛指揮同知徐麒暫管守備汀漳查得賈能縁事一年之上尚未回任就使問結而庸懦誤事亦難倚賴况多事地方茍非任用得人正其體統何以奮武弭盜訪得見委徐麒克効勤勞福建三司守巡官考語類多稱其練達而可當一面江西贛州衛功陞都指揮僉事見奉查功吳山先嘗經臣保舉江西三司守巡官考語類多稱其勤能而武藝優長此皆可備推選者也伏望皇上俯察臣言勅兵部計議合無将賈能放回原衛以戒不職将徐麒吳山量用一員就近接管惟復别選才能速令赴任則官不久缺而事可責成地方亦得保障矣縁係守備缺官事理未敢擅便為此具本専差舍人李環親齎謹題請㫖議處兵備官員疏題為議處兵備官員事照得湖廣整飭郴桂衡永等處兵備自副使滕謐考察去任迨今一年新除副使尚未到任該省撫按衙門始委分守上下湖南道右參政留志淑帶管尋委分巡下湖南道僉事鄭光琬又委分巡上湖南道僉事汪溱相繼帶管雖地方多故勢非得已然往來不常交代無緒虚文遥攝顧彼失此且承委官員未免遷延避難姑俟兵備之至而遂諉之也况郴桂等處乃湖南極邊與江西廣東接連𨽻臣管内縁無専管任事難以責成盜賊之行捕屢督未獲貪殘之發問屢催未結雖臣亦日俟兵備之至而卒未至也地方廢事深為可虞伏望皇上加察勅吏部計議合無将久除不到副使作缺别處另擇㢘能官員推補速令前來管事地方幸甚縁係議處兵備官員事理未敢擅便為此具本専差舍人來儀親齎謹題請㫖申明地方事宜疏題為申明地方事宜事竊照南贛汀漳與惠潮南韶郴桂等處當江西福建廣東湖廣各邊之交萬山中峙而蠻寨雜居大海外薄而蕃舶時至盜賊之出沒無常招撫之叛服靡定雖地割四省而延袤數千里間賊情略相等也臣到鎮以來嚴督各該守巡兵備守備等官練兵備盜綏善禁姦雖䑕竊狗偷時就撲滅而恃險稔惡難保無虞使非先事豫防何以圖難於易查得兩廣鎮巡衙門與臣會本内開别巻一宗為陳言地方利弊事節該兵部看得巡按御史髙公韶奏稱廣東之盜宜於撲捕而不宜於大征備言撲捕之有益與大征之有害切縁廣東之新寧清逺白水後山恩平陽江緑水羅傍河源龍川等處委的盜賊淵藪常年竊發不能斷絶撲捕於始發則用力易而為費少俟其猖獗而後調兵征之則用力難而為費多合無今後地方凡有盜賊竊發即便督行守巡兵備等官設法撲捕不許遷延怠忽釀成大患其有功績顯著者亦與具實奏聞以憑議擬陞賞不許勢要子弟揑名插報若果賊勢重大相應大征亦須指定地方賊首姓名不許含糊延蔓惟圖報功莫辨玉石其有相應撲捕而不行早處必欲養亂自利者許巡按御史指實劾奏題奉欽依備行欽遵一節臣惟先撲捕而慎大征深切廣東事宜如近𠞰惠潮叛賊賴貴等不甚費而易為功者正以此也但南贛汀漳郴桂等處皆與廣東接連事體相同前項欽依事理未蒙通行無以明示各該官司以作其奮武之心以懾彼姦宄之氣似為未便伏望皇上勅兵部計議合無查照前項欽依事理備行到臣督行各該官司一體欽遵庶幾事可早圖兵知自奮而盜将聞風消沮矣縁係申明地方事宜事理未敢擅便為此具本順差舍人來儀親齎謹題請㫖竹澗集奏議巻二
