body:
  text: 竹澗集巻八明潘希曾撰雜説譜例家記贊引題跋四十九首雜説二十一首七九皆奇數而九加多故九為老陽七為少陽而卦之陽爻稱九六八皆偶數而八加多故六為老隂八為少隂而卦之隂爻稱六或者不得其説以為聖人扶陽而抑隂殊不知天地生成之數始於一終於十自兩儀生四象觀之太陽居一而含九少隂居二而含八少陽居三而含七太隂居四而含六此理數自然之妙非人為也或曰何不直以一二三四為隂陽老少乎曰六七八九成數也今周易乃費直易程子因之作傳如乾坤卦爻辭下附以彖象文言猶不失四聖之序如各卦辭下附以彖象各爻辭下附以小象錯亂殊甚田何易十二篇乃孔氏之舊顔師古謂上下經及十翼吕伯恭定為經二巻傳十巻其序上經一下經二上彖傳一下彖傳二上象傳三下象傳四上繫辭傳五下繫辭傳六文言傳七説卦傳八序卦傳九雜卦傳十是為古易朱子所為作本義者也世儒復析本義以附程傳何也天下事貴思不貴疑然亦有當疑者乾之九四或躍在淵无咎子曰或之者疑之也故无咎龍陽物也坤之上六不言隂與陽戰而曰龍戰于野聖人扶陽抑隂之意也王介甫謂隂盛於陽故與陽俱稱龍謬矣訟凶徳也不慎於始不得已而訟貴能止也不能止而求終焉雖勝猶凶也子曰天與水違行訟君子以作事謀始絶訟之道也彖傳謙尊而光卑而不可踰程子謂謙則尊光自處雖卑而不可踰朱子謂謙則居尊者徳愈光居卑者人亦莫能過據小象卑以自牧及繫辭謙尊而光觀之程説得夫子本意六十四卦惟謙内三爻俱吉外三爻俱利可以崇徳可以濟事可以存位故君子謙之為貴重坤純隂十月之卦也十月非無陽也陽甚微也故程子曰十月謂之陽月恐疑其無陽也蓋陽雖剥於九月實漸盡於十月之小雪雖復於十一月已自小雪漸長積三十日而成一陽也邵子詩云冬至子之半天心無改移一陽初動處萬物未生時陽非冬至頓生也冬至而一陽之生方成也一陽來復於五隂之下曰復往而為臨為泰為大壯為夫以五陽夬一隂夬盡為乾則陽極而隂生矣一隂上遇五陽曰姤往而為遯為否為觀為剥以五隂剥一陽剥盡為坤則隂極而陽生矣陽生則復矣隂生則姤矣一嵗十二月往來於乾坤十二爻矣蒙以養正培其本然之善也童牛之牿禁其惡于未發也蒙與童教所先也明出地上晉君子以自昭明徳大學曰自明曰明明徳蓋本諸此明夷之為卦也内離外坤離明也坤順也晦也文王内文明而外柔順箕子晦其明徳不違乎其時也是以免於難也然而文王演易箕子敘疇當明夷之時而開文明之運者天道也節之九五得中故曰甘節甘者味之中也上六過極故曰苦節苦者炎上之味也古書疑字不宜輕改曲禮鸚鵡能言不離飛鳥猩猩能言不離禽獸吳氏纂言改禽作走殊非蓋禽獸乃飛走之通稱如易田有禽書外作禽荒皆通稱也周禮大宗伯以禽作六摯孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞則羔亦可曰禽也考工記天下之大獸五脂者膏者臝者羽者鱗者則羽亦可曰獸也仲春鷹化為鳩天地之仁心見矣其秋也鳩化為鷹天地之義氣形矣先王使鳥獸魚鼈咸若仁也田獵以禮義也見父之執不謂之進不敢進不謂之退不敢退不問不敢對無與於事親也而非愛敬其親者不能也故弟子知此禮其不孝者鮮矣鄰有喪舂不相非厚於州相周黨相救也而哀死之情易相感也故鄰里存此禮其不恤者鮮矣有無其禮而善處者以義起也将軍文子之喪既除喪而后越人來弔主人深衣練冠待于廟垂涕洟是已有有其禮而弗拘者可與權也童子汪踦能執干戈以衛社稷魯人欲勿殤是已有過為之禮以譏人者非足恭也公儀仲子舍適孫而立庶子其喪也檀弓免焉司冦惠子廢適立庶其喪也子游牡麻絰焉是已抑交游牡麻絰非禮也子游曰禮也者豈以将以正禮為禮乎成人有其兄死而不為衰者聞子臯将為成宰遂為衰楊綰拜相而郭子儀減聲樂黎幹省騶從夫有諸已者其動人不難也月令之書可以考先王順時之政而不可泥也如春行慶賜秋始行戮之類道其常耳非謂事幾當速者亦必俟時也如仲冬齋戒掩身以待隂陽之所定即周易先王以至日閉關也如孟春行夏令則雨水不時等事亦猶洪範之敘咎徵也栁子厚謂其茍以配五行而施政令離聖人之道又謂風雨變異特瞽史之語何其泥哉是書雖出於吕不韋乃假手諸儒所為要之未純在擇焉爾矣詩一發五豝朱傳云豝牡豕也據爾雅牝豝恐牡字誤豕牡曰豭春秋傳盍歸吾艾豭是以豭去其勢曰豶易豶豕之牙是已漢髙起於楚沛我朝興於金陵非自南而北耶金元之承運非自北而南耶王莽李林甫輩非北人耶陸贄張九齡范仲淹歐陽修輩非南人耶王子明據其本朝事言且知立賢無方所言未為害理邵堯夫天津聞鵑之説蓋前知一時氣數特因物而發耳愚者遂執以為通論所謂癡人前不可説夢也譜例姓氏之所從來逺矣時代變遷其上世多不可知吾所可知之世吾尊以為始祖可也譜圖界上下旁行上自髙祖下止𤣥孫為五世𤣥孫再提為九世又再提為十三世以至於無窮圖後略疏名字事蹟為傳各以其世列焉異姓冒嗣者不得書同姓而失其宗派者不得通譜凡嫡長子繼始祖者族人世宗之所謂大宗也繼禰者兄弟宗之繼祖者同堂兄弟宗之繼曾祖者再從兄弟宗之繼髙祖者三從兄弟宗之所謂小宗也大宗百世不遷者也小宗五世則遷者也世逺族衆其勢必分續圖譜者各自其所親之為𤣥孫者提焉以下繫其子孫亦小宗意也而皆以吾譜冠焉則大宗可互見也譜掌於宗子支子各藏其副每嵗必會族以讀之生子長孫增書之是為譜之例云記先祖遺翰二首右書四通我顯祖廣西僉憲府君手蹟也嵗月具書中惟第三書不具嵗月考之行狀御賜五經四書五倫書在景泰辛未也三書皆得之表叔吳康十丈吳則我祖妣姪也第四書乃與長伯父無為州節判者是年顯考陜西憲副府君暨四伯父諱瑄者将赴鄉舉故書云爾其末曰清慎勤曰謙恭小心雖為節判府君一時丁寧之言實吾家世守以為家法者也嗚呼字心畫也言心聲也思吾祖而不可得見得見其心於片言隻字間則所以感詒謀之逺而念繩武之大者不在兹乎顧自宣徳至今日九十餘年希曾生而早孤得此於淪落斷爛之餘不啻殷彞周鼎而其為吾家舊物尤不易得謹識之以遺後人我顯祖廣西僉憲府君沒世既久其手澤幸存者鮮矣右奏疏洎内臺諸公氏名蓋景泰初為御史時所書希曾近檢諸故笥裝次為巻傳曰先祖有善而弗知不明也知而弗傳不仁也兹疏係立朝大節非細善比也昔栁子厚記其先友於墓碑之隂後之君子猶得考其卓然知名者二十人矧吾祖手列一時官聯氏名名公頗多其中如鈞州馬公後至師宰顯考憲副府君洎希曾又先後與之同朝世講之誼尤足徵也為後人者尚其知此而珍藏之記先君奏疏後右先君奏疏先伯父漁隠先生手録者也疏在成化二十二年奏准至今為著令𢎞治二年先君以陜西憲副卒於官時先伯父尚康健痛先君功業未竟手録遺文遺事備史氏采擇距今已三十年而先伯父捐館十有四年矣幸此疏僅存也嗚呼觀此一疏而先君之建明先伯父之友愛與我憲宗皇帝用人從善式閭封墓之盛節皆可見矣疏已載先君集中先伯父詩文稿亦甚富從兄龍溪教諭榮方圖入梓希曾獨念此盈尺之楮具見衆美謹識其後俾潘氏子若孫永傳焉恭記御賜先臣勅後右先大夫手録憲宗皇帝所賜勅也先大夫以僉憲提學於蜀者七載日夕兢惕恪遵聖諭一時士風丕變人材奮興我國家菁莪樂育之化大行𢎞治改元陟陜西憲副提學孝宗皇帝復賜之勅視此勅詞一同惟地方職銜有異耳故事臣下領勅事竣則進繳惟提學勅例得不繳今二勅皆寶藏臣家龍章奎翰增輝永世臣希曾逮事孝宗皇帝追惟兩廟上賔先臣溘逝伏覩綸音不勝君父罔極之感謹拜手稽首而記其後記先君遺翰後右先君遺墨凡十帖略依嵗月先後為巻時一展觀永我罔極之思禮稱父沒而不能讀父之書手澤存焉爾夫書謂典籍蓋可以他求者也以父嘗讀焉而弗忍讀讀别本可也乃若手蹟遺訓不可以他求者也茍諉於弗忍讀焉而蔑棄之非所以學箕裘善繼述是惡可不讀也諸帖或拾之故篋或得之故所往還家視先君静虚集有小異者有逸不載者蓋集嘗更刪潤而此則厥初未定之稿與一時應酬之筆耳并識巻末以告我後人記舊譜序後右時舉潘公譜序特詳三潘之所自來而謂富不能以皆富貴不能以常貴而清者之後亦不能守其業夷考其時尚在元初去三潘之盛未甚久也而物換星移已有不勝其慨者後百年為我朝兵火薦更無怪其子孫寖微而世次不辨也近時上虞潘孔修憲副雖不敢祖月林嘗輯清潘遺事一編自言得黙成月林二公御勅於山隂宋君翰又得宋勳臣潘公美父子行實小像於越城士人乃知子孫不能世守顧不若異姓之好事重可慨也予録時舉公序而復書此於後俾後之人庶幾知潘氏之故而又知所警省云記髙侍講送行序後右序得諸故篋殘缺磨滅僅存首尾九十七字蓋宣徳中我祖僉憲府君掌教於淮安府之鹽城我曾祖贈御史府君嘗往遊焉此其歸而送行之作也若我髙祖徵士府君召問朝堂奉使江右之事獨賴此序可見惜弗覩全文而其事之始末不可知己故家遺文雖片楮隻字子孫可輕視哉書五賢遺像巻末寄兒紹此五賢遺像一巻付兒紹收各像跋語乃西涯李文正公手跡公文章徳業推重一世作此字時行年将六十矣而莊重雅飭一畫不茍如此觀者不待望履舄聆謦欬可以想見其為人矣後生潦草宜常捧觀以自警發倘由是而有進則五賢地位亦吾分内彼丈夫也吾獨非夫也耶紹其勉之宗伯童公贊名軒號枕肱道人浩乎其學之博確乎其志之卓故偶聖逢辰則猷為昭焯而履危厯坎非利害可奪完璧而歸枕肱自樂兹其所以為當世名臣為後學先覺也耶王處士遺像贊生彼勝國歸我皇極百五十年遺像可則氣清形癯隠徳之符布素恂恂漁樵為徒讀書循理一鄉善士餘慶所鍾視其孫子吳處士存恭像贊身長而癯貌古而澤鄉稱善士年逾大耋僅僅治生端木氏之貨殖孜孜濟物孫叔敖之隂徳親賢而賢者與之混世而世俗取則吁嗟若人三代遺直滁陽話别詩引予兄柏軒先生由泰州司訓擢魯府滋陽王傅将之任過滁話别於是兄在泰凡九載希曾以太僕寓滁亦且八載而兄因便過滁至是蓋三度矣念予與兄自幼同學未嘗一日相舍比長筮仕離合不常往往託之聲詩以寫其悲歡思慕之懐則友于之情不能自已者耳魯有周孔遺風而宗藩仁賢吾兄此行竭誠所事以無負朝廷簡任之意亦云慰矣第陟岡興懐弗勝繾綣爰賦一律為吾兄贈而凡平日悲歡思慕之作亦附書之以識嵗月他日同老林下歌此於山雲水月之間而相與賡和焉又将感慨今昔益敦壎箎之好云赤松圖詩引金華號山水佳地而赤松特勝宦遊以來常往來夢寐間頃因良工繪圖攜以自隨每一披玩輒注目久之甲申秋雲南憲副朱子文先生來京以永州十三志見示公之永予之金華也山水之勝殆不相上下而予之弗文不能如公之志永以志赤松則欠事也公且行爰以圖贈而題其後公其念與我同者不獨山水也尚為兹圖文之贈葉先生詩引予與葉師道先生自少同事筆硯而先生先大夫予之外舅也先生劬書攻文有經世志予賴其麗澤良深三十年來不意􅦓薄者偶試而才大者難為用兹授羅源司訓非其好也亦安於命而已矣為賦一律識别贈鳳山秦公詩引往嵗癸未希曾為南京太常適鳳山秦公以大司馬總留務幸獲奉顔色承謦欬以慰平生無何改官北寺方以去公左右為恨而公尋被召為大司徒退食之餘又幸獲請益也惟公文章徳業被今而垂後見乎羣公贈送之作者殊未艾也希曾拜觀諸作敢綴一詩於後蓋公為天下慶而私以自幸云治河録引戊子之秋予奉命治河明年冬厥功告成都憲梅國劉公督漕過濟詢予所從事曰盍録諸庶将來足徵乎乃俾書史録其綱要若干篇有勅㫖焉有奏議焉有文移焉有祭告之辭焉有書若記焉勅冠諸首餘篇依月日序次於是始末可覩矣是役也弭河患通國賦祗若皇上徳意不敢不竭其愚若夫荒度利導壹是皆本其故而不敢以智鑿云題章賢母傳後自古母氏稱賢率於其子之成立如所謂孟母蓋尤彰彰焉者余讀列女傳觀孟母之所為教亦誠難已其自謂夫死從子則稱未亡人久矣而卒成子之大賢可不謂難乎余嘗歎古今人未必不相及而事之難易有弗容槩論者及讀章賢母傳不能不重感焉母之以賢稱視孟母未知孰難迺若方盛年時贊夫子以廣圖厥𦙍中道而喪所天又能忍死以成其側室之子皆情之不易克也禮稱婦順備而後内和理内和理而後家可長久説詩者謂后妃之徳不妬忌故有樛木螽斯之福今章氏孝子順孫玉立蘭茁而先世之業日昌以大微母之賢而至是乎推母之心雖為事君者法可也獨内則也哉儗諸孟母之所處其難易又不同矣題李太白畫像昔人以落月照屋梁猶疑見顔色為李太白傳神詩予每讀杜集至此未嘗不三復想見其人一日過中丞何君汝𢎞見壁間畫像若道家者流諦視之衣冠偉異風神瀟洒惜綃地剥落題識無存君曰此太白本來面目也會稽東山寺舊藏此像暨王逸少謝安石靈運三像近世為貴游摹寫易去者乃元與國初所臨其逼真者宋時所臨寺僧秘之世復罕見然皆非其舊也董内翰文玉雅與其主僧善頃偕予訪之主僧具道兹事爰出本來四像於木柱中以二謝授文玉以王李授宇亦以其最久最弊不堪顧惜耳予惟物恃形以存者雖銅狄石人不能久而不壊區區毫素乃垂若千年之久而可覩而轉相臨摹者又将蔓延於無窮則四先生所為景慕於人人必有不恃形而存者矣抑東山王謝桑梓其有遺像宜也不知何縁有太白像史稱白天寶初南入會稽豈當時慕而貌之耶今脱木柱之藏裝飾一新後之觀者尚有以驗杜詩之善於傳神云跋林都憲察院題名記院署之有題名俾可考也可考則其人其政其名位所到勳業所就有不容以掩者而勸戒彰矣大中丞長樂林公家藏此刻乃廣西察院所為題名者也公在𢎞治中嘗以御史按廣西去之二十載遂以右都御史總督兩廣回視列名諸君子上下百餘年間勳名赫然無出其右者蓋公之盛固不待是以傳而是刻将藉公以為重然猶手之不置抑以自考也此古人不自滿假之心而公之所以過人者歟宜其位益崇功益懋勒鼎彞而垂竹帛不特斯名之題而已也往時公僉浙憲某在諸生中受知最久敢附其説以致景仰之私跋林都憲平蠻奏凱巻大都憲長樂林公𢎞治中以御史按廣西决䇿運籌削平諸蠻一時能言之士相與歌誦之題其巻曰平蠻奏凱後公累遷今官奉勅巡撫兩廣遂總軍戎之務焉蓋公胷中甲兵素所蓄積當時歌頌之者已卜其有今日矣孔子嘗謂有文事必有武備又謂不出樽俎而折衝千里公得之矣視彼佔畢陋儒平居誦説唐虞倉卒不能一時退敵者豈亦吾夫子之教使之然耶三復兹巻不能不為之太息跋先世遺翰三首我顯祖廣西僉憲府君景泰初為山東道監察御史手書彈章洎聖㫖移文凡二通希曾近得之從子燧拜觀之餘敬裝為軸歸之俾謹藏焉昔冢宰鈞陽馬公序我祖哀詞有云文升登景泰辛未第亦拜是官得從先生之後者數年先生正色立朝風采凜然凡院中陳大事劾大奸奏疏彈文多經先生之筆觀此則當時疏草宜不止是惜散逸無存俾我後之人懵於世徳可勝痛哉燧於我祖為曾孫實吾門繼曾之宗傳曰公侯之子孫必復其始燧尚懋之我伯父漁隠先生早承家學攻古文歌詩雅意泉石不求仕進故形之聲詩率皆沖淡蕭散而無枯槁迫促纎靡豪誇之病所著有應酬稿湖蜀紀行録其子龍溪教諭榮悉攜之任而其孫燧復輯逸稿四篇如右蓋手蹟也希曾伏讀仰思恍乎耳誨言而目儀範也敬識數語以泄其悲且以嘉燧之念爾祖云右三書我顯考陜西憲副府君手蹟也一上我祖妣諸父一與我從兄一上我漁隠伯父當時孝友之誠宛然可覩從兄之子燧乃能什襲久藏間以視希曾嗚呼吾親逺矣罔極之恨曷有窮已昔人有言讀孔明出師表而不墮淚者其人必不忠讀令伯陳情表而不墮淚者其人必不孝矧在其子孫耶三復之餘􅋞淚識此以授燧燧於此将感發焉不亦吾門賢孫子哉跋宗譜記後予之為譜不能上遡三潘而祖其所當祖斷自所知八世祖者為始祖矣猶恐其無以自别而久而復混也則因髙祖始居雙溪定為雙溪潘氏宗譜夫萬派同一源也而必祖其所知必别其始居何也親吾親也親親而疎可推也故曰人各親其親然後不獨親其親此理一分殊之㫖也跋聖教序後右唐太宗作聖教序髙宗作三藏聖記各有荅沙門𤣥奘書附其後又附𤣥奘所譯心經皆沙門懐仁集晉王右軍書咸亨三年刻石今在西安府學咸亨距今八百五十年矣此帖予家故藏相傳已百年字體遒勁不失右軍筆意可寶也跋定武蘭亭帖後右定武蘭亭真本自唐太宗得右軍手跡命歐陽詢臨摹勒石久之流落定武復失於宋之南渡翻刻紛紛而定武本多􅎓矣我朝宣徳中東陽何公士英為兩淮鹽運使浚井得之世復鮮知正徳戊寅淮隂胡汝愚來尹東陽從何氏榻數本貽予千年名刻一旦快覩其五字劖損仰字如針眼之類悉符諸家辨證而字畫之佳夐異他本則不竢辨證而可知為真定武也跋孟英三碑後右宋僧孟英篆千字文乾徳三年刻石其十八體書刻於乾徳五年其篆偏旁字源又刻於咸平二年而書法之工則當時陳希夷諸人歌詩洎郭忠恕書非溢美也三碑皆在陜西此乃𢎞治初先君以憲副督學時所榻家寶也竹澗集巻八
