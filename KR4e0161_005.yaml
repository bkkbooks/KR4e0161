body:
  text: 竹澗集巻五明潘希曽撰賦書辨記一十五首感雪賦正徳十二年冬環滁大雪余縻于官為之興懷方聞鑾輿北幸彌増感戀作感雪賦其辭曰弭予節于滁陽兮歲聿暮不吾與曰强圉赤奮若兮維律中乎大吕顓頊嚴令兮使𤣥冥驅其先風伯憤噫兮雲師乗以垂天羌觱發兮逾栗烈夜浙瀝而霰先集兮晝忽繽紛而雨雪駕玉虬兮驂白螭騰踏銀漢兮濺氷屑夫何累旬月止復作兮紛委積而交加折修竹以失聲兮封枯楊而生花巋官寺兮山之麓接曠景兮平臯阻寒氣兮空谷旦余適野之莽蒼兮雪始霽而日煜千門凍而反閉兮萬竈淒其未烟燦瓊枝兮林立瑩氷柱兮簷懸僵狐兎以屏跡兮饑鷹隼而莫騫晃六合以昭回兮歛萬籟而寂然吾方遊乎塵垢之外兮幸昭質之未窳歩余馬於白水兮按余轡於瑶圃飲沆瀣兮飡玉英叶音央懷琬琰兮佩琳琅茍余心之皎潔兮雖逺引其何傷嗟滁之僻兮樂有餘逖彼北裔兮僻不可居層氷峨峨兮陰山崒矹豺狼侁侁兮虎豹出沒美人之遊兮轅不及攀良辰感我兮怛肺肝亂曰寒既冱兮歲亦殫幽獨處兮誰與歡宣余力兮及時難望朔雲兮天漫漫鳯有門兮龍有淵思美人兮不敢言與太守劉惟馨書近鄉人到京傳云執事還任於僕有見愠之意謂僕於執事有後言也負執事也噫果有是不但負執事也負全蜀士夫也負吾先子也負同官也先子去蜀二十餘年蜀誼過厚與僕有世講之好若執事固先子所知也而僕嘗濫竽同官既又同患難人心天理不宜薄也君子居是邦猶不非其大夫矧僕於執事耶且僕之平生執事亦知之嘗好毁人耶嘗背毁八縣一官吏耶於他人未嘗毁而獨於執事毁有無可知也世有娶孤女誣撾婦翁者兹固不必深辯然反覆思之亦或有由矣僕舟之過沛河也邂逅憲副髙君則謂僕曰貴郡劉太守予嘗薦之吏部薦後人多議之傳聞其某事某事柰何僕應之曰此所傳謬爾髙曰予與渠同年也予將面告之倉卒分舟而别今之釁端或由於此則髙之語意未明而執事之過疑也執事大節為吾儕出色他日榮遷㑹貴鄉諸先生及同僚同年事當自明或㑹髙君以此柬質之亦當自明古稱賢者不相知嘗竊意其有激之言不意身親見之雖然未有賢而不相知者也僕之縷縷者贅也執事豈終不亮其心奉大司空南坦劉公書某忝側僚末辱教愛多矣瀕行又承餞贐無任感荷到濟寧即率郎中副使輩放舟沛徐以觀被淤故道及所挑新河復沿黄河東岸陸行沛豐單等縣以觀大小决口奔衝之迹乃知漕渠廟道口以下忽淤數十里者實由決河西来横衝廟道口之上并掣閘河之水東入于昭陽湖以致閘水不復南流而沛縣飛雲橋之水時復北漫故沙停而淤耳沛以下即無淤者以飛雲橋之水南流故也計濟沛間漕渠只宜加築東隄以遏入湖之路更築西隄瀕黄河一帶以防黄河之衝俾其自北而南常由故道自無沙淤之患雖舊日之淤猶有存者量加挑濬亦自無虞乃若根本之論則在䟽黄河之支流而朝議已行之矣新河既蒙罷挑無容置喙昨盛公所上圖本亦槩可見生愚且拙敢不竭心力以紓廟堂之憂俟稍有次第别當圖上尚祈不靳指教以終雅愛不宣荅豸史馬君書承諭築隄既長恐河專趨徐此蓋為徐方慮也然僕嘗慮此而究其故矣黄河自汴梁經黄陵岡至于曹縣一帶有隄自曹厯單豐沛三縣皆無隄今修長隄蓋緣單沛間黄河決口十數道横衝運河入昭陽湖以奔徐州致淤運道故因昔人所嘗議而未及行者議行之然止築林臺以下百四十里耳林臺以上曹單間七八十里原無缺口且去運河亦逺不須築隄萬一黄河漲入不過如往時漫散未為害也大抵河由溜溝與飛雲橋固是趨徐河衝運河與昭陽湖亦是趨徐俱為徐吕二洪所束不得奔放入淮故嘗為徐患惟上流趙皮寨一支至宿遷小河口入淮孫家渡一支至淮安清河口入淮可以分全河之勢而消徐沛之患但淤塞十有餘年今始䟽濬耳近七月九月間黄河水漲一次髙五尺一次髙六尺皆得趙皮寨分流故徐沛河不甚溢者亦或一驗也僕愚且拙輒請教于執事望加察而示之地方之幸漕運之幸憲節何日過濟冀得面悉也荅都憲熊公書頃辱手教特惓惓河事感謝感謝偶便輒布一二今年南旺當大挑已摘單縣隄夫七千餘名先挑湖而後完隄豐沛地勢尤下其隄一面修築黄河每年有清明水伏水秋水為患今趙皮寨與孫家渡可備分𣲖而此隄復成運河庶㡬無虞但濟沛間春泉正微舊淤盡露方摘夫三千餘名挑濬就以所挑淤沙覆東隄外壁沙既可逺隄亦易培淮安清河口之淺令該府用近便夫役加濬此皆不可緩之役而適當歲歉雖古有修城郭使民就食之政然河道錢糧有限不敢多用民也復憶去冬見諭飛雲橋口宜闢加闊誠長慮也僕嘗沿飛雲河岸上下三百里間觀之飛雲橋南十餘里有謝家溝又南五十里有北溜溝又南二三里有南溜溝皆黄河趨運河出口四口並出故飛雲似不必闢且橋兩岸髙陡民居稠宻亦不易闢也但四口皆在徐吕二洪之上每水發為決所束徐沛受患欲除此患頼上流孫家渡趙皮寨之分𣲖耳未審髙明以為何如幸不靳終教荅大司空劉公書承示近日議河事者謂趙皮寨孫家渡不足以洩黄河之怒而漕渠或不免復淤竊謂斯言慮患逺矣而所為防患者未審當何如夫黄河為中原患非一日矣智者不與水爭地惟順其勢而導之而其激盪變遷雖神禹不能使九河常如故也後世或塞其決或隄其卑或䟽其𣲖皆隨時救患者也國家漕渠為南北咽喉勢不得不與河爭地𢎞治初河決荆隆口又決黄陵岡又決張秋當時嘗濬孫家渡宿遷小河即趙皮寨河等處而後荆隆黄陵張秋等口可塞亦分洩河怒之騐也况自河南厯直隸至山東之曹縣恃長隄以禦河患亦既有年而今單豐沛為隄亦將以禦河患不使淤漕渠也蓋事理所可據與人力所可為者如是而已若曰神河叵測則固非力所及若欲别求逺圖則往者之開新河可為殷鑒去歲秋水時至湖波為新河兩岸所隔田廬淹没告訴紛紛盛公乃令閘官夏時輩決岸放水此非棄百數十里之田為巨浸不可以為河也初挑河至留城覺飛雲橋水来反髙中間平地數丈尚未挑通至是黄河決入二十餘里水落而淤盛公乃令主簿郭景輝輩挑去淤沙暫築􅄵以障之夫存􅄵無以通舟去􅄵則黄河倒灌而易淤此雖棄前百數十里之田為巨浸不可以為河也他若三河沙水之衝滕費沂嶧山水之漲皆智巧所難施而勞費不與焉是可為逺圖乎且盛公嘗塞豐沛決口矣今因而加隄焉嘗修沛漕東隄矣今因而稍培焉嘗䟽趙皮寨議孫家渡矣今因而查濬焉何獨至于開新河不因而成事歟蓋必有難成者矣顧其事已中止不欲多言今恐議者不察或誤國是乃不敢不言誠舍此而别有逺圖固不肖所願聞也執事為國孜孜素厚僚誼望垂覽而見教焉幸甚寄都憲梅國劉公書嚮以河事奉咨承手札垂答如領面教多感近日工部復以三事移咨河道漕運兩衙門㑹議施行一曰挑淤沙與前咨相同一曰整諸􅄵可以補前咨之未備皆淮陰急務也一曰築長隄則事勢恐或未便蓋自新莊至淮城其間閘壩十數處若築塞之則鮮貢糧運等船不通非細故也若留閘口壩口則河漲必自口衝入非細故也况古黄河隄去河二十里近世汴梁至山東一帶隄去河亦不下十里前年築單豐沛長隄去河率五六里或七八里皆不敢臨岸為隄者惟恐河流掃岸岸崩則隄隨之今淮陰瀕河空地若去河不逺則似不敢臨岸為隄也此管窺過計未知是否惟髙明不靳指教則同舟共濟之賴多矣他如扣存脚價動支監銀截留耗米借用運軍起𣲖廬鳯滁和人夫皆漕撫所專想髙明自有處分以濟國家之急僕仰賴餘庇而已今具公移奉㑹未敢輒述管見如前所云者恐髙明或别有處也楮筆不盡總希裁處回示幸甚大禮問辨或問禮官之説皇上以小宗後大宗特重大宗降其小宗亦既合禮經矣曷為議者未已也曰此宗子法也非所以定天子之大禮也曷為議者之説亦復引大小宗也曰兹所謂楚則失而齊亦未為得所以重紛紛也則其説何也曰宗法為公子卿大夫設也大傳别子為祖繼别為宗朱子曰君適長子為世子繼先君正統自母弟以下皆不得宗其次適為别子不得禰其父又不可宗嗣君又不可無統屬故死後立為大宗之祖其適子繼之則為大宗君不與族人為宗也大傳族人不得以其戚戚君陳澔集説謂君有絶宗之道為人後為繼大宗設也喪服傳為人後者孰後後大宗也大宗不可以絶故族人以支子後大宗也君無為人後之禮也魏明帝詔禮王后無嗣擇建支子以繼大宗然禮無王后無嗣之文明帝乃附㑹喪服傳支子後大宗之説耳且禮適子不得後大宗設使今上有弟亦必以適長入繼可見宗法不可行於君誠以君至尊也不得與臣庶同也理也亦勢也喪服自期以下諸侯絶見中庸章句而為人後者有大功焉小功焉見喪服傳故知後大宗非天子諸侯事也且古之後大宗者必屬乎子道者也故可以為父子兄弟之子謂之猶子是屬乎子道也仲嬰齊以弟後兄非禮也而公羊髙曰為人後者為之子附㑹之過也魯僖公以兄繼弟非世及之常也見禮運父子相傳曰世兄弟相傳曰及而胡安國曰臣子一例以僖嘗為臣謂臣猶子也則可謂為之子惡乎可左氏子雖齊聖不先父食之説公羊先禰後祖之説皆以父子喻君臣故胡氏謂臣子一例近世人主禰其所後則何如曰屬乎子道嘗受命為後儗諸宗法庶乎其可也若漢哀帝以猶子為成帝後宋英宗以猶子為仁宗後之類非此類也何可比而同宗法耶若商仲壬以弟魯僖公以兄漢宣帝以從孫光武以從祖今上以從弟皆不可曰後而為之子然則其稱號柰何曰天敘有典人不可汩也如父不可曰叔姪不可曰子之類其廟次柰何曰生為之臣死不得躋於君也如僖公繼閔公僖雖兄臣也閔雖弟君也僖不當躋於閔上其昭穆柰何曰父昭子穆未之有改也或世次不相當不以親親害尊尊可也如兄弟或從父祖嗣位昭仍為昭穆仍為穆但當明其君臣之義臣不得位於君上信斯言也大禮其定諸曰然明乎宗法之原而不以其所同强齊其所不同則千載不明之案可判而今日紛紛之論不崇朝可决也如哀帝英宗之事可同宗法者也故當降其小宗而師丹司馬光程頥朱熹之説為是然司馬公引魏詔不得顧私親之語則將視所生為路人又不若程子推所生至恩明尊崇正禮之説如宣武光武之事不可同宗法者也故光武當祖髙祖帝四親而張純朱浮之説為非宣帝得稱父為皇考而范鎮以小宗合大宗之譏為非然程子亦以宣帝稱所生皇考為失禮但宣帝於昭帝為姪孫叔祖不可為考所生又不稱考是竟無父矣此亦拘於為後為子之例或因一事一時而發未必其定論世且尊信程子莫如朱子而其作本義定家禮不能盡從程説亦惟其是而已仰惟我皇上之即位承武宗遺詔遵祖訓兄終弟及之文揆諸春秋之義克正其始矣其繼武宗之統以主宗廟之祀非若宗法必為之後而後得奉其祀者故以倫則武宗兄也孝宗伯考也以位則皆君也皇上以弟代兄以臣道事先君其為繼武宗也名正而言順矣假如興獻帝在以叔代姪亦以臣道事先君而繼其統武宗而有繼也則孝宗固未嘗絶也何得舍武宗而不繼何必考孝宗而後為繼耶或以宗廟無稱為疑然事有常變漢宣時亦無禰廟况孝廟在禰廟之班乎由此言之興獻帝聖考也興國太后聖母也名正而言順矣若夫尊崇之典則亦有可言者宋英宗既後仁宗程頤尚謂其父濮王當别立殊稱矧我皇上聖父母乎如曰子無爵父之義周不有追王之禮乎或疑此非尊無二上之義殊不知興獻帝本處臣道又諡號視列聖少殺又不敢稱宗何嫌於二上設宗藩入繼欲并崇其祖却難葢繼統與創業不同創業之君功德自已立故得追崇四世以報本繼統之君功德本乎創業之祖故止可及父母而不得及祖壓於創業之祖故也又疑如此父祖似乎有間據先王制禮父服三年祖期曾祖三月亦自有差等若夫廟祀之典則又有可言者天子為百神之主尚當祭其國之無主後者見王制顧不得祭其父乎别建寢廟不敢干宗廟之紀不亦可乎然則子之説無亦勦議者之説歟曰議之是者天理人心之同也議之非是者予不得而同也子盍亦上聞歟曰皇上至孝之心既已燭夫兩端之説矣大禮其次第舉矣予竊重夫禮官之固執而惜其弗加察也又慮夫紛紛之論真成聚訟而或貽患也故為是答問者將以解學士大夫之惑而明我皇上至孝之心於天下也章氏重建御書堂記御書堂藏御書而作也吾婺先正大方伯章公正統中以廣西憲使入覲詔賜五經四書五倫書凡若干巻書故有堂寶藏在溪南濮村且以處子弟之學者數十年来規法稍弛公之孫緒大懼繼述弗戡無以昭先德承天寵爰度地於所居之後以便視守建堂於厥地之阜以崇亷戺庀事於甲子之春明年冬落成面陽明以受風日履爽塏以殺水泉蠧不芸而辟潤不曝而乾輪奐有美籖軸秩秩子若孫升而游歌焉處而藏修焉起敬起孝固必于斯間屬予記之予作而歎曰可謂得我心之同然哉予大父僉憲府君與公為同門友仕之時亦同嘗以風憲近臣蒙賜書又同先子憲副府君異時語不肖孤曰吾婺章方伯與汝祖獲御賜書是誠至寶吾欲創樓尊閣之而未能不肖孤服膺乆矣顧力猶弗逮聞子兹舉能不深為之喜而重自愧哉抑是書大字楷寫版刻明凈予每讀建陽本魚魯可疑輒盥手啟笥莊誦細校聖賢精義奥語多賴以明吾知章氏子弟之學有頼矣夫敬君之賜謂之忠述祖之業謂之孝啟子弟之學而俾有所考謂之賢一舉而三善焉不可以無記矧先祖同其遇後世同其守不容以不記謹記之以貽厥後乃若垣楹門廡之詳則登堂在目而山川景物之獻秀於堂則不繫乎書者可畧也項氏先瑩記友人項聘之衰絰過余泣拜而言曰珍先處士之𦵏幸獲地矣而表塋域以示乆逺敢不為之慮請吾子為記之地延袤二十畆在赤松鄉去縣北十有五里負南面北覺慈寺翼其左澄塘浸其右孤石特秀亭亭雄峙于前者芙蓉峯也堪輿家謂芙蓉一脉自東而南鬱盤成阜中岐而成穴左一支環出寺後蜿蜒為案右一支曲枕澄塘之上若内顧然土宜松竹植之易茂尤宜桂不植而産蒼然蔚然雲木團蔭望之知其為先塋也隴封四尺碑刻曰項處士墓塋前為亭亭側為屋圖居守便祭掃也珍聞養生不足以當大事惟送死可以當大事珍之不孝不可追於生前盡心墟墓之間猶以為吾親所歸也即於是無憾焉庶㡬吾親安之也夫子嘗曰丘也不可以弗識也子盍一言俾項氏子若孫永有識哉余聞伊川論𦵏必土色光潤草木茂盛五患不及水泉不侵而晦菴之言曰以子孫而藏祖考則必致其謹重誠敬之心以為安固乆逺之計吾聘之可謂達於此而能用其孝矣凡民致死其親窀穸茍且否則泥風水拘忌諱𦵏不以禮不可謂孝矣則孝如聘之詎非風俗轉移之機哉聘之積學謹行嚮用于時所為揚名行道以終其孝者余方拭目焉庸次其説以記之張氏順則堂記義烏處士之廬有堂曰順則者張君彦成所築也其地在龍陂里西去縣三十里許臨谷向巒山縈水紆為堂三間堂之後為室傍為樓前為正門凡若干楹朴素堅完脱去綺靡經始於𢎞治辛酉越五年而落成於是起臺植花以遊以觀引泉為池可濯可湘葢隠而善居室者也昔陶唐之世有謡於康衢者曰不識不知順帝之則處士之名堂葢取諸此夫謂之順者天下何思何慮坦然由之無適不順也謂之則者天生烝民有物有則帝之則我固有之也人惟逞私智以戕天理顛倒拂戾喪其物則是雖中君叔世難乎免矣而况於帝則乎而况於順乎處士質直少文尚義而好施言動衣冠循循以禮鄉人化之而不爭令尹嘉之而知敬子弟依循之而有所成然而名弗烜于時迹弗詭于人葆光任真涵濡聖仁其不識不知而順帝之則者歟昔五柳先生自謂無懷氏之民葛天氏之民處士其陶唐氏之民歟處士仲子儒從予受經篤學謹行克振家聲予以是知處士而喜其堂之不虚名也用申其義以記之太湖分趣記太僕少卿霜厓曹公作假山于甕城南隅號太湖分趣謂予曰始僕以御史在告自適于是别去六七載湖山情景無日不往来于懷願記其事勒諸石庶㡬他日歸隠誦斯文而惬吾心焉且俾後之人知僕所樂嗜也山累太湖石為之崛起平地峯巒削出虚其中以為洞容三數人兩傍由石門以升小橋曲徑逹于絶嶺山畔有四景亭刻東坡四景帖有賢已亭設愽奕具結栢亭二一置琴磚石几一豎峭石刻小飛来三𨽻字結黄白木香亭各一桂竹屏各一栢坊一左右掩映參錯于花草竹樹間面山為書屋若干楹壁間䧟置古今諸賢石刻游息宴集于斯萃止凡園之景以山勝山之景以太湖之石勝故命之曰太湖分趣予惟人之情不能無所好也彼以聲色勢利取敗者固好之累而無知無欲如老氏之説則亦好髙而不情古稱知樂水仁樂山其適情而無累者歟公其達仁知之理者歟或曰甕城扼萬里長江東瞰大海公生長其間眼界不小頃將使命持憲節厯敭中外以極天下之大觀其胷中之太湖不啻呑若八九矣奚以分趣為哉予曰此公之所以賢於人者而人固莫測也夫舉巻石可以知山㪺勺水可以語海取諸近小以自託者易足之道也公以清才贍學荐厯卿列崇階顯秩駸駸未已乃能不以富貴移易其山林之念是又以知足為持盈者也不賢而能之乎顧予泉石膏肓聞風感興恨未能艤舟京江以少分公之趣漫為公記之公名倣字汝學以乙丑進士起家霜厓其别號云雙溪潘氏宗譜記潘氏之先出於畢公髙畢公髙本姬姓子季孫者食菜于潘因以為氏焉潘氏子孫蔓延于天下宋南渡初金華稱三潘焉待制曰清潘駙馬曰貴潘半州君曰富潘更元之亂分散微弱而吾一門至今號儒籍焉蓋元别儒於編户若今匠竈籍然入國朝吾髙祖興二府君以人才徵曾祖昌三府君卒贈監察御史而吾祖吾父諸父昆弟皆以儒起家接迹仕路蓋自洪武以来百五十餘年于兹矣自吾髙祖居城下雙溪之涯其後或居城或居鄉或居武義而城下故廬子孫猶有居者然彼此散處而隆替不齊矣予㓜而孤不得備聞遺徳思所以尊祖而睦族莫如為譜乃以舊藏先世位牌訪于族人由今而上得五世由五世而上得三世又遡而上譜殘系闕雖知其出於三潘而不知其孰為當祖則斷自所知萬八府君者為始祖嗣萬而宗而徳皆當時列行之稱而其名與字已不可考其稱宣教若朝奉又皆已不可曉矣於是為之圖以表其世系為之傳以紀其事蹟名亡則書其字字亡則書其行而宣教朝奉各仍其稱又掲凡例以示法守而譜可覩矣古者大宗小宗之法廢而人不知本人不知本而骨肉之恩薄仁孝之道衰其猶不失宗法之意者譜系之説也而譜復廢焉雖賢者無以自考此吾所深懼也夫吾父之視吾兄弟猶吾於子也吾祖之視吾從兄弟猶吾於孫也自兄弟達于族人固一本也兄弟族人而至於相虐猶一身而四肢自相戕也非背本歟鳴呼觀於吾譜而可以知本矣其孝弟之心可以油然生矣滁州龍泉庵興修記我太祖髙皇帝定天下設太僕寺于滁總攝馬政尋建廟祀馬神俾龍泉庵僧視守洪武二十三年歸併寺院勅太僕臣朱守仁等仍留兩僧自是庵為名刹且為太僕諸臣習儀祝聖壽之所庵在豐山西北麓南距栢子龍潭百武而近其名龍泉者葢以此厯年滋乆日就頽圮失今不圖後費益鉅侍御陽曲劉公按部至滁有司白其故㑹侍御武昌朱公以清戎至謂興滯補弊不可已公乃下令計財用出公帑屬經厯伍朝用吏目劉寶董其役已而歲旱公閔雨州守陳君則清諗衆曰古者修城郭使民就食兹役亦旱備也衆驩趨之經始於嘉靖癸未秋七月凡三越月而落成正殿以間計者三後堂中門間如之東西序各九間敞以外門繚以周垣惟正殿後堂撤而新之餘皆補葺以還舊觀於是伍經厯等請記其事刻諸石予惟春秋用民力雖時且義必書兹役也不可以不書也祀與戎有國大事庵為馬神廟設戎祀所係且國家舊典一宜書費出于公不厲民飭舊為新俾已成勿壞二宜書因饑募力民利其食官享其成得乘時之道三宜書予承乏太僕於是舉有頼焉謹書之以告来者劉公名欒字汝喬朱公名衣字子宜皆以進士起家有聲于時云境山河記黄河至沛縣與運河合東南百有餘里至于境山又四十里為徐州洪又六十里為吕梁洪南引江淮北達大通境山實扼其吭巳丑秋八月河溢境山西徙三百步東南流二里合故河下口以其在故河外稱曰外河去山稍逺奔流直遂視故河加闊然舟楫初無患也厥後水落湍急挽舟者患焉水益落湍益急放舟者亦患焉十月以来亂石絶河湍下射髙數仞雖虚舟不得上有冐險而下者十覆三四焉於是逺近駭愕大懼春漕弗利曰盍闢諸則嚴寒墮指疇能穴氷鑿石曰盍濬諸則故河成陸復非外河徑直疇能以兩月之力迴彼瀾倒期迫事急予不得已檄都水主事于思睿徐州判官項情召官夫陳畚鍤峙樁草十二月六日興工穿故河以俟行水長七百五十步廣十步深丈有七尺截外河而逼之東兩涯下埽使漸相屬明年正月下旬中流埽未合洪濤激盪不可施功則決之故河奔放衝刷沙隨水流一夕河廣一倍三數日盡復其舊廣凡百步二月中旬截河埽成廣凡百四十步葢假埽逼水以衝故道又乘水洩以合埽未㡬沙洄外河而亂石盡没焉經流滔滔舟行如故過而覽者不復知前日為患之處矣是役也使夫三千給銀一千八百九十兩有竒用物樁以根計榖藁柳梢蒲葦以束計共十四萬七千五百凡七十日而工畢埽法見元史兹不復詳嗟夫滄桑陵谷信有之矣境山此河患我未之前聞也一旦為患天也不乆而患息國家之福諸君之力也予也實幸焉記其事以告来者竹澗集巻五
