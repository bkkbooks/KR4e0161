body:
  text: 竹澗集卷四明潘希曽撰古今詩一百十二首元宵戴揮使第呈席間諸君暨仲實兄燈火今宵看故鄉栁臺梅榭競春光選來妙舞當筵久翻得新腔按瑟狂朋舊漫勞青眼待弟兄私喜白眉良有時投紱終同社不把離愁攪醉腸時將赴南京郊行呈仲實兄次前韻偶尋幽事過南鄉照眼晴梅泛曉光故里不迷遊子望中年翻憶少時狂垂綸未遂魚空羡緩轡相隨馬更良義重平生堪屢别強賡常棣遣回腸白閣為王太守壽夫題秦中白閣號竒峯復有髙人此託蹤玉骨崚嶒堪比德雲衣變化竟從龍窗開霄漢琴書潤路出松篁杕屨重青壁丹崖非易造幾回西望興還濃太僕舊廨辛巳歲兩年離此忽重來門巷春深次第開覆屋重茅新易瓦臨池髙檻舊登臺笑談謾喜賔僚盛南北徒驚歲月催燕語梁間如識主更將飛舞送餘杯寄贈毛礪菴太卿二年滁上漫追隨緑水青山到處詩冏命逺將官事簡歐亭頻過客情怡有才未許長間散大拜真堪託保釐慨我重來公已去祗憑詩卷説相思贈潘大參伯和憑將直道作生涯磨涅無端玉不瑕暫黜更為人望屬超遷終荷帝心嘉皂囊慷慨嘗焚草金帶輝煌忽已花千載風雲今日事髙歌茅拔為君誇漫興二首滁上羣山紫翠環山中官府有無間吾遊倦矣情誰白世事忙然鬢自班楊栁春風村市逈芙蓉秋水寺門間遙憐六一當年意野鳥山僧共往還莫向秋風歎索離環滁山水古今竒六年留戀有翁醉萬事蹉跎無我癡霜葉細飄紅冉冉晚禾將熟緑垂垂明朝試候南賔鴈帶得書來未可知江浦渡江百里到江仍問程是日發滁州江風初靜渡船輕乍穿蘆港分秋影橫擲鯨波弄晚晴鍾阜日斜金碧炫石頭潮上水雲平千年王氣誰能鑿贏得秦淮繞帝城贈仲仁兄赴泰州目斷鴒原鬢欲霜那知此會復滁陽鯉庭幼學年光逝薑被秋同夜漏長歸夢漫隨賔鴈杳素餐聊取婢魚嘗明朝驛栁仍愁折煙水吳陵正渺茫送楊太卿介福歸武陵翰苑論文沗後塵諫垣補衮復同寅重逢共訝憂時鬢一疏堅辭報主身折柳滁亭堪此日藝蘭湘浦有餘春武陵亦係東山望倘見漁人莫問津酬沈侍御子公斜日行臺古柏髙公餘清興獨揮毫先聲風裁聞驄馬出色詞華覩鳯毛株守頻年惟我拙萍逢此地幾人豪嚴裝見説朝天近極目行塵首重搔雨後寄題西廳童用中花園芳園數畝舍西偏雨霽春朝散步便池水欲平新緑膩花枝無語靚粧妍相將鶯燕還今日有待溪山更後賢八載遊歌雙鬢改惟應青眼尚依然同朱侍御子宜東郊餞客城頭曉色艷新晴十里溪橋送客行花底四筵酬勸好栁邊飛蓋往來輕平疇麥浪翻風緑深樹鶯簧隔水清歸道不勞松下喝故應驄馬避前程病中酬朱侍御見寄頗懷東郊之興鶯花滿地風日晴伏枕尚憶東郊行醉裏不禁狂態劇病來轉覺間愁輕經旬無聊藥褁苦何日共話茶甌清詩筒稠疊謝相慰賡和足課間中程嘗鰣魚次汪二卿天啓韻兼程擕至已昏黃命酒猶堪月下嘗彭老骨多非所恨西施乳膩恐難方緑兼筍縷烹調美紅點椒花七筯香安得江頭看起網百篇咀嚼老詩狂次韻東峯二卿觀竹杖履風流到竹園不知春色去還存繁華掃地誰為主蒼翠臨池自長孫鶴唳時隨清籟發茶煙間傍午陰屯偶然乘興皆萍迹戀此誰能詠謝墩次韻汪東峯詠葵露浥園葵夏景涼緑陰深處艷紅藏足能自衛如多智心喜常傾祗向陽吟筆好憑丹點鐵舞筵休羡錦為裳十年獻納同青瑣對此還應各斷腸夏日同僚小集衙罷公庭一事無官聫小集自相娛槐陰落砌午無暑棋局當軒日易晡地散未妨甘吏隱才踈何以副時須流年又看端陽近角黍蒲觴不負吾憂旱農人幸麥秋刈穫及未雨既刈天轉晴暫飽終恐餒盻盻五月來赤地極千里哀哉無辜民為此旱魃苦露禱良辛勤詎覩南羊舞作朝風雷發淋漓夕方止蹄涔乍渺漫龜坼漸泥滓麻菽僅可播分秧尚無水三日雨不繼粳稻知已矣豐山靈滁陽興雲恆自此下有柏潭龍變化莫可擬冥冥果何意為惠不終始豈無溝洫利世逺孰經理亦有桔橰功惰農棄不舉人謀或未臧天乎吾何籲素食愧官守對之空汗泚贈陸侍御騰逺陸以點馬來滁陸海才無敵滁山蓋偶傾龍蟠雲裏敕驄避道傍行襟抱三江迥冰霜六月清經邦資數馬求友願遷鶯弔古歐亭勝觀風范轡輕重聞西澗詠又動北轅情閔雨方今日為霖待老成咨諏勞使節獻納重臺評愠解薰風好行經梓里榮螭坳簪筆處翹首五雲晴秋雨歎三首旱來恨見秋霖遲淋漓浹月仍苦之禾焦豆萎已無救壞屋決梁安用為生柴價髙陳粟貴流離載道聞歔欷莫怪農家賤賣牛待餔欲給晨昏費溪頭浩浩秋水生黑雲四冪雨未晴野蕎隨波田父泣河鯽跋扈漁翁驚城中倉廩無餘積米舶初通過江客乘潮逆浪來不時到市千錢論一石雨中甘菊橫踈籬憐汝曽遭旱魃欺孤根得潤稍蘇息嫩葉欲展仍離披汝時未來須汝待霜白秋清想風采餘功尚賴延衰年何日枝頭看蓓蕾仲仁兄升魯府教授過滁話别九載黌宫道自尊曵裾今日又王門官清幸覩東平樂祿薄聊供北海樽得句漫勞千里夢懷鄉空向此時論楚天秋盡生離思鴈影參差雨氣昏長春樓為休寧楊處士賦休陽山水勝東南處士樓居倚蔚藍春占四時偏耐老雲耕千畝不嫌貪門楣喜有金章客樽酒堪供玉塵談好學郎君年更妙束書千里過江擔壽邃庵楊閣老七十黃閣歸來近十霜稀年方進九霞觴未應宰相山中久已覺神仙世外長筆底絲綸留禁署胸中兵甲在遐方梅花時節詩兼酒江上重開緑野堂壽王司訓八十魯黃門外舅八十初分度康強見幾人瞳方仍轉碧髮短任垂銀半子多朝貴諸郎有席珍投來簪紱久瀟灑出風塵發南京留都兩月太常卿被召俄驚又北行一念寅清常對越半生疏拙寡將迎龍江風水開帆好鳯闕星辰曵履輕獨有月明回首夜石城鍾阜總離情揚青道中夜泊小泊空村待月行無端風浪夜還生舟人繫纜頻相喚鈴卒巡更忽自驚天近神京偏浩蕩水通滄海却回縈陰晴未卜朝來事間倚篷窗看啓明天津值雨時南畿歲荒江南多遏糴頗仰給北粟滿地風沙麥正苗一番甘雨忽今朝土膏頓覺三春足河潤誰誇九里遙南國救荒應有望幾州遏糴轉無聊晚來喜劇還悲切兀坐船窗看長潮赴召將至京二首春明一别老滁山素食空添兩鬢斑新命忽傳天上至孤蹤猶似夢中還身依日月逢更化職忝夷夔愧押班便合彈冠向明發五雲深處覲龍顔燕山南面潞河東彩鷁歸來更得風三輔地形春日麗九重天色曉雲紅入城未覺琴書纍趨闕行看劔佩同回首十年青瑣事不孤明主有愚忠贈柏林吳封君吳豐城人以子棋為都御史受封豐城劔氣化為龍霧鬛霜鱗半倚空老去成林終苦節後來作棟亦餘功人間歲月優遊地天上栽培雨露中見説鄉閭評月旦古來徐孺可相同送周太常璧安陸祭告過雨離筵淨迎風使節輕皇華天上遣白雪郢中賡王國稱殷禮朝廷託老成歸鞭須早著祀事日寅清寄朴菴章都憲以道二紀同年幾故人天涯蹤迹苦參辰間愁誤遣霜侵鬢渴想空疑月寫神再厯容臺慚忝竊宏開憲府仰經綸何時一笑重逢地酒盞詩篇取次陳送王都憲載卿巡撫四川西南問俗付中丞才望如公簡帝心秋水落時川水穩法星明處福星臨雪山增重應逾昔玉疊題詩又到今萬里何時當報政聫斑舊誼擬重尋豫與公常同斑復清陳先生雙挽詞先生善吟工草書長子察為御史少寰為檢討復清先生清絶倫讀書不走緇衣塵中年化去夢幻身詩豪草聖全其真夫人未亡垂八旬堪與孟母為芳鄰兩郎成立俱要津含笑不愧黃泉人柏府氷霜翰苑春麒麟瑞世何振振皇家恤典來方頻松楸千載恩光新些歌遮莫徒傷神次韻酬謝內翰以中仍期枉顧髙齋足秋雨幽興迥難親理悟床頭易香酣甕面春鄉評今視昔世態假疑真何夕西城月清談共可人再次前韻酬謝內翰秋風驚逆旅鄉思正相親舟泛剡溪夜觴流曲水春幾時尋舊約一笑道吾真大隱疑堪諉終憐紫陌人題赤松山水圖贈雲南朱憲副子文朱嘗著永川十三志赤松山水擅吾鄉爭勝還聞有永陽我賴畫圖償夢想君憑文字極揄揚煙橫秋巘重重碧花點春流曲曲香携向天涯漫相贈滇雲燕月兩茫茫壽謝母太孺人板輿迢遞海東仙帝里恩光照壽筵天近重陽才二日人過七帙已三年菊花泛酒黃封好錦服趨庭綵戲便一曲南山漫相祝可酬當日柏舟篇送葉師道分教羅源斯文自昔共心期豈謂先生獨後時千里馬難逢伯樂五車書亦負男兒漫膺一命資模範逺赴三山惜别離雨霽都門秋欲暮不堪擕酒暫追隨次韻李學士夢弼會同年于隆禧寺四首遊興逐羣仙秋林梵宇鮮蒲團間獨坐莎徑偶同穿酒令難辭罰詩盟敢擅權分擕各無語已悟上乘禪南郭赴幽期秋風動客悲半生一夢過萬事二毛知交久真情見官間野性宜菊花遲亦好簪鬢莫教辭僧房分半榻坐我白雲間暫脫浮生纍聊娛此日間露松垂砌濕霜蘚綴墻斑為謝良朋引從兹得往還二紀同年友相逢幾度新鬢緣憂國改道貴任吾真飲量開今雨遊蹤避俗塵重尋曲江約屈指不多人送陳尚德分教東鄉朔風吹燕雲長空暗欲雪遊子忽南旋衝寒過豫别讀書三十年偕計來上國閶闔邃九重二載紅塵陌一朝領除書分教江右邑絳帳談舊經芹泮生春色平生經濟志樂育聊自得蕭蕭都門柳搖落不堪折渺渺官河舟尚及凍前發去住兩含情豫亦江南客東浦為汪太卿用之賦東浦風流又到君西湖自昔逺塵氛橋通屐齒尋春去寺報鐘聲隔水聞畫舫笙歌千頃月青山花鳥半窗雲題詩不盡江鄉思此樂他年肯我分甲申冬至一陽初動又晨鐘朝罷楓宸日正紅間事攪人方滚滚殘冬辭我太匆匆氷霜勢重陰餘幾梅栁春遙意已通多病年來常止酒試開涓滴待東風朝天宫看梅呈崔蕭二光祿劉尚寶見説尋梅髙興生况逢三益挈同行蓬萊乍到乾坤别姑射遙臨水月清信杳江南腸欲斷春回冀北眼偏明一尊留戀歸來晚帶得幽香兩袖盈送陳太常庠歸雲南秋風髙興落邱園謝事欣承帝語溫潛邸十年思舊學歸途三錫荷殊恩滇池釣月逢溪友玉案尋春長竹孫休羡漢家疏傅去祖筵今日盛都門送楊太僕敬之赴滁送君今日去憶我舊時遊山夾釀泉勝潮通西澗幽荒亭間載酒野渡自橫舟驥德驪黃外行看伯冏收贈南京秦司馬入為司徒中外勳名三十年亨衢仍際中興天壯猷方叔初留後相國蕭何復召還帆引龍江民望繫履聽鳯闕聖情專樗材散地知何補南北追隨似有緣時豫亦自南轉北壽菊莊溫少參先生以子仁和為吏部右侍郎加封恩命重沾八十初此身已乞草年餘地曹舊借籌邊著河省曽停泣罪車錦水一竿供晚釣菊花三徑傍雲鋤可應老去渾忘世雛鳯回翔在禁廬荆溪張處士挽詞其子大輪為刑部郎中斯文託同郡側聞長者風結屋荆溪上讀書白雲中至孝出天性哀感神明通折梅供靈几花發實作叢况復羣行懿鄉閭仰遺蹤義方篤庭訓桂子奮時庸尚憶十載前尊酒親德容胡為一轉盻宿草迷堂封我歌薤露詞濺淚揮秋空答朴菴章都憲時章在濟理漕河叩門誰遞故人書三復欣然伏枕餘河洛禹功方有賴東南民力竟何如時清不覺衰年及别久那堪萬事踈太白樓頭聞駐節暮雲千里轉愁豫題董千里孝思卷有序昔韓文公作董生行生祥下瑞在狗乳雞哺間道其實也汪太史間齋修實録凡以馴兔産芝稱孝感者皆削不書獨喜蘭溪董千里能篤於孝為賦詩美之蓋韓公意也嗟乎董氏垂千年而孝子之見於歌頌者再焉豈易得哉特次太史氏韻以播其事云董生純孝有天知又見雲孫起孝思誰似昌黎書瑞應尋常雞犬勝靈芝督軍南贛過草萍驛草萍過我已三回四壁留題半雜苔霧散曉村紅樹出雲歸晴岫翠屏開州連衢信雄東浙路繞岡巒接上台一掃塵氛天萬里清風應逐使旌來酬髙吾陳院長宗禹歲暮倚髙閣山水興遐思翩翩南翔鴈尺書忽見貽美人湖東雲為霖方濟時書傳陽春曲三歎音有遺顧慚駑駘質長途浪追隨尚幸託宿契著鞭敢後期丙戌元日贛州作城東晴旭入新年水秀山明壯古虔闕下逺來初作鎮樓頭髙坐獨籌邊光陰太向詩書欠塵俗還兼簿領纒漫把椒觴酬令節春風從此動江天元宵即事簡陳院長皎月放春晴元宵坐贛城管絃傳閙市燈火徹深更野曠狼烽熄鄉違鶴怨生不逢南浦客碧草逺含情時陳在南浦次前韻佳期積雨晴燈月爛春城獨酌同民樂長吟任僕更江湖一念在時序二毛生莫弄梅花笛東風易薄情南來南來未覺逺回首渺西江白髮生朝鏡青燈坐夜窗乾坤心獨苦老大氣難降何日五湖路扁舟蕩槳雙特恩堂為陳院長賦陳湖廣武陵人謝病當年疏纍陳豫期勿藥寵偏新暫歸五柳先生宅竟起東山宰相身江漢恩波元浩蕩武陵地望正嶙峋髙堂巨扁相輝處仰止應多善頌人三月三日花枝狼藉鳥綿蠻又是春風三月天蠧簡字訛時自校獸爐香細午初然賞心何處臨流飲歸計無端對雨眠章貢合流開府地滔滔終日不知年即事兩日東園不暇窺緑芽頓發老槐枝葵榴吐蘂已初夏蘭蕙含㽔更此時千古往來川上歎幾人夢覺枕邊炊輕絺短箑方宜我且復掀髯一詠詩贈盛程齋年兄赴南京兼簡二三同年信息遙聞一月前眼穿行斾嶺南天相逢不盡平生話後會仍留何處緣世路悠悠雙短鬢晨星落落幾同年金陵詩友重盟社莫惜連篇向我傳次韻酬陳院長登滕王閣見寄二首老我登髙欠此樓羡公乘興及清秋尚餘文字三王後三王謂勃緒仲舒不盡江湖萬里愁極浦風來樵笛起危城日落賈帆收却憐章貢遙相滙一路民風託共諏緑波芳草恨堪論髙閣難期共一尊何處江山如此好古來題刻至今存花隨流水春環砌鴈度寒雲夜呌閽自是好遊心尚壯不知秋鬢點霜痕冬夜漫興二首一燈深坐不知寒分閫天涯歲又殘部曲夜間刁斗靜衙門地僻簿書寬曽聞樽爼能全勝敢謂干戈可久安獨苦此心誰共語每憑封事達朝端嶺畔冬深亦乍寒江風吹雨夜闌珊不聞鴈信來千里空愧麟符絆一官睡少正須茶破悶病餘那用酒為歡古槐衰栁方搖落時復蕭蕭打畫欄讀書漫成白晝沉簿領不暇拈詩書愛兹冬夜永一編聊卷舒孤燈閃青熖細字迷魯魚揩眼徒自苦掩卷一長吁幼學不知要涉獵事文辭去道日以逺古人安可期驅馳二紀來五十知昨非勤事乃吾職讀書固其餘嘗聞仕優學糟粕非所須不如靜中悟默坐松窗虛憫贛市火深院夜寂寥漏下已二鼓遙聞市聲喧起視出庭户煙熖俄漲空乘風恣翔舞回祿殃我民倉卒愧為主下令速諸司奔走胥救護徹屋開火道綆缶競相助移時火幸熄焦爛良已苦吾聞天降災失政由官府赤子却何辜啼號靡寧宇恨無帡幪力為爾奠焦土贈陳都閫汝玉閥閲承三世聲名重一時璽書凡幾賜節鎮亦頻移志在吾儒事功收大將旗伏波終矍鑠未老莫辭衰喜雪二首越雪由來罕清晨忽滿墀二年初快覩三白敢深期日午消還盡簷陰凍欲垂民飢方待哺翻恨麥秋遲昨雪已難得今朝仍亂零逺山頭再白久客眼偏青瘴退梅花嶺寒疑翡翠屏還同在京日呵凍寫蘭亭遣興世事竟何憑寒宵睡未能候茶聊附火拋卷懶親燈興共青山逺年隨白髮增班超玉門願應有尺書騰陳院長城新縣有作輒次韻窮鄉荆棘已多年此日金湯更可憐澤及釡魚春水活功收刀犢夏畦便溪山頓改乾坤舊風氣還看楚粵連容易敢談疆理事吾聞定計十年前次韻答陳院長紀行見寄樓船西上路倭遲兩岸江風颭畫旗民俗正勞千里問年華休歎二毛知肇開山邑綏無賴半減田租慰阻飢老我提兵思按堵喜沾餘潤和新辭程甥文德詠雪見寄次韻四首故園今歲雪飄灑幾昏明近得詩相報遙憐興獨清綴梅橫凍影墮竹起虛聲五嶺應難見千山空復情城上北山雪曽驚雙眼明年來鄉信杳夢見旅魂清遍覆元含垢潛滋不動聲無勞添髮白猿鶴久馳情憶昔雙溪雪通宵似月明樓臨瓊島淨人在玉壺清渚鷺迷寒影江猿咽曉聲當時謝庭詠自足慰親情我屋蒼筠下忩涵積雪明映書寒亦好烹茗味偏清夜凍懸氷柱晴融滴雨聲宦遊逾二紀念此不勝情贛州春日歲事崢嶸春又來東郊鼓吹踏塵回送寒已碎黃牛土隨俗聊嘗緑蟻杯萬里乾坤同化日一時城市動歡雷流年不為人久待兩見梅花傍嶺開退食退食行臺日欲晡門扄蒼柏一塵無鳯團煮茗間吟好龍挂燃香夜坐孤萬卷懶開從插架八州遙鎮自披圖虛縻館榖天涯晚未有涓埃翊廟謨除夜空堂蠟炬輝獨坐睡何遲兩歲平分夜三更欲盡時聲殘爆竹火香入頌花詩好辦明朝起山呼祝聖慈丁亥元日去年此日憶龍顔天上初違侍從班浪迹至今千里外山呼徒自五更還乾坤開泰心同壯梅栁回春鬢獨斑十載微痾欣頓愈著鞭隨地敢辭艱元宵即事燈月交輝夜春城沸管絃柏臺深鎖鑰梅嶺接風煙不語坐三鼓回頭來二年太平多氣象萬里仰堯天詠蘭四首蘭蕙一類而蘭特少其香特勝開謝之早晚遲速亦異豫於贛之行臺並植之山人遺我蘭百里到城邑采之千仭崖故土帶砂礫瓦盆及時栽風雨相潤色空階白日靜緑葉光嶷嶷猗蘭含紫㽔經冬凍不發春風幾何時碧幹爭挺拔一幹僅一花清香乃傾國貞姿頗耐久逾月未衰落蕙本蘭之族氣味亦相似一幹五七花生香春夏際復有閩中産葉髙而稍膩誰書本草經誤以零陵視古人多佩蘭貴有君子德况為王者香尼父興歎息芳名播終古俗眼常罕識髙齋風日和相對余心懌夏夜四首夜窗無暑柏陰森湘簟間眠獨枕琴嶺畔不知天許逺還將北斗看升沉一雨猶餘幾日涼不知三伏在炎方晚來風起秋偏早却為蓴鱸憶故鄉滿天風露夜將分花樹生香隔院聞獨坐此時無一語待他日出漫云云四壁蟲聲一院花銀河淺淡月西斜此時此景清於水不動薰風也自嘉贈陽明王公督軍兩廣有序陽明先生大節出險大功錫封天下想望其風采而其得之心無待於外者則雖士大夫或莫知之也先生家居數年詔起視師蒼梧道贛江幸奉顔誨以慰闊别敬贈鄙句一封書奏險夷輕百戰功歸帶礪盟世道更為今日起心傳獨得古人精稽山峻絶雲難躡贛水迢遙蓋偶傾早定南荒報天子太平調燮待阿衡過濟贈仲仁兄有序豫昔督軍江右比還朝兩道濟寧豫兄柏軒先生為滋陽王傅得兩會焉喜論心而惜分手賦此奉贈濟上今春喜再逢蘭舟暫繫話萍蹤君顔自保丹常渥我鬢偏憐雪漸濃鴻鴈去來俱漫浪塤箎唱和未從容清時共擬涓埃報三徑終期杖屨從濟寧逢春二首忽忽浮生已向衰悠悠拙宦竟何禆碧山笑我紅塵久青鏡輸誰白髮遲治水可能尋禹迹轉漕亦復託蕭規夢遊不覺長安逺應被春風昨夜吹鼓樂迎春東郭東春風遙與故園通一時諸友誰常健三洞雙溪我欲窮官事敢云無了日古人堪慕有髙風泰山咫尺須乘興會見扶桑海日紅北山茶春來遙憶北山茶青壁丹崖傍我家采露擷煙空夢寐沿河泝濟自年華求間會了三生願知足何須七碗加燕語鶯啼春送盡又看光景到萱花嘗筍濟上初參玉板禪尋常罕見轉堪憐藥欄夜茁驚雷早茶碗晨供帶露鮮貢到氷船知幾日賜霑金闕憶當年飽諳世味還何慕只有從來水竹緣春日寫懷二首半世浮名夢未醒他鄉春色眼猶青自從河濟收功後贏得餘間點內經衰病辭官本自宜慰留有旨敢言私濟州官柳沿河緑又見春風此度吹東園漫興花發東園偶獨窺山禽相對語移時天涯形影青春伴晚節功名白髮知何處莵裘還待老他年竹帛亦虛垂杖藜緩步防苔滑筋力深嗟病後衰南司馬王公以詩留别輒次韻浚川舊同館翰苑文章同舊價南都山水屬真仙相看轉覺雙瞳碧漸老難回兩鬢玄酒興總非方壯日花時猶是未歸年陽春強和憑誰寄塞鴈依稀隔暮煙初夏即事懷友人客舍春歸不待余薰風相欵竟何如綿蠻到處鶯求友來去無時燕卜居日色漸長堪曬藥衙門多暇慣抄書故人千里應相憶試向河頭覔鯉魚壽婺源補齋潘先生有序先生前福建憲僉淡翁之子豫莫逆交也懷玉弗售放志林壑箕裘之緒付之諸子今年秋既被封命仲子薦叔尋擢福建憲副典文教焉豫惟先生得之過庭者有以遺後其不得行于時者乃於薦叔兄弟發之可謂賢且難矣賦韻語一章為先生壽三十年前憶盍簪郎君相見喜腰金鯉庭詩禮流風逺萊彩趨承愛日深紫誥回鸞榮寵錫丹崖舞鶴伴間吟秋來好飲黃花酒莫遣繁霜兩鬢侵辛卯立春日即事共喜新年見立春雪花呈瑞復兹辰梅梢半著交加重麥隴平鋪頃刻勻吟對物華川上興飲開涓滴病餘身二毛錯遣侵雙鬢欲謝塵緣葆我真濟寧聞召命寫懷爐中藥物篋中書未足功夫歲暗徂日月人間渾少暇風雲天上復相須身猶抱病慚康濟年已知非強進趨三載白樓嘗一過樓在濟寧南城上不堪臨别却踟蹰得徽子書走筆答之兒子書來勸我歸不堪衰病尚依違謂依違兒書幸逢明主真難報得謝清時會有幾六月又頒南國笋三春空老北山薇欲知退食委蛇地禁柳垂城轉夕暉時居皇城西墻下竹澗集卷四
